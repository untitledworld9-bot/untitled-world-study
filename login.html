<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Untitled World</title>

<link rel="icon" href="/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;

display:flex;
justify-content:center;
align-items:center;

color:white;

}

.login-box{
text-align:center;
max-width:380px;
width:85%;
}

.logo{
width:95px;
margin-bottom:22px;
animation: floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

h1{

font-size:28px;
margin-bottom:5px;

}

.sub{

opacity:.85;
font-size:18px;
}

.desc{

opacity:.7;
margin-top:6px;
margin-bottom:25px;

}

.google-btn{

display:flex;
align-items:center;
justify-content:center;

width:100%;

gap:12px;

background:white;
color:black;

border:none;

padding:16px 20px;

border-radius:40px;

font-weight:600;
font-size:16px;

cursor:pointer;

transition:0.25s;

box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

.google-btn:hover{
transform:scale(1.03);
}

.google-btn img{

width:20px;

}

.sub{
opacity:.9;
font-size:18px;
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:.9;}
}

</style>

</head>

<body>

<div class="login-box">

<img src="/icon-512.png" class="logo">

<h1 id="typing"></h1>

<p class="sub">Smart Study Platform</p>

<p class="desc">Learn Smarter. Stay Focused.</p>

<button class="google-btn" onclick="login()">

<img src="https://developers.google.com/identity/images/g-logo.png">

Login with Google

</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_13GJOiLQwxsirfJ7T_4WinaxVmSp7fs",
  authDomain: "untitled-world-2e645.firebaseapp.com",
  projectId: "untitled-world-2e645",
  storageBucket: "untitled-world-2e645.firebasestorage.app",
  messagingSenderId: "990115586087",
  appId: "1:990115586087:web:963f68bd59dec5ef0c6e02"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

function getTodayDate(){
 const d = new Date();
 return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

window.login = async function(){

try{

const result = await signInWithPopup(auth, provider);
const user = result.user;

const name = user.displayName;
const email = user.email;

localStorage.setItem("userName", name);
localStorage.setItem("userEmail", email);

await setDoc(doc(db,"users",name),{

 name: name,
 email: email,
 focusTime: 0,
 weeklyXP: 0,
 status: "Online",
 room: "global",
 lastActiveDate: getTodayDate()

},{merge:true});

// welcome screen logic

if(!localStorage.getItem("seenWelcome")){

window.location.href="mainwelcome.html";

}else{

window.location.href="index.html";

}catch(err){

console.log(err);
alert("Login Failed");

}

}

const text="Welcome to Untitled World";
let i=0;

function typeText(){
if(i<text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typeText,60);
}
}

typeText();

</script>

</body>
</html>
