<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Untitled World</title>

<link rel="icon" href="/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;

display:flex;
justify-content:center;
align-items:center;

color:white;

}

.login-box{

text-align:center;
max-width:350px;

}

.logo{

width:90px;
margin-bottom:20px;

}

h1{

font-size:28px;
margin-bottom:5px;

}

.sub{

opacity:.85;
font-size:18px;
}

.desc{

opacity:.7;
margin-top:6px;
margin-bottom:25px;

}

.google-btn{

display:flex;
align-items:center;
justify-content:center;

gap:10px;

background:white;
color:black;

border:none;

padding:14px 24px;

border-radius:30px;

font-weight:600;

cursor:pointer;

}

.google-btn img{

width:20px;

}

</style>

</head>

<body>

<div class="login-box">

<img src="/icon-512.png" class="logo">

<h1>Welcome to Untitled World</h1>

<p class="sub">Smart Study Platform</p>

<p class="desc">Distraction Free Learning</p>

<button class="google-btn" onclick="login()">

<img src="https://developers.google.com/identity/images/g-logo.png">

Login with Google

</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_13GJOiLQwxsirfJ7T_4WinaxVmSp7fs",
  authDomain: "untitled-world-2e645.firebaseapp.com",
  projectId: "untitled-world-2e645",
  storageBucket: "untitled-world-2e645.firebasestorage.app",
  messagingSenderId: "990115586087",
  appId: "1:990115586087:web:963f68bd59dec5ef0c6e02"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.login = async function(){

try{

const result = await signInWithPopup(auth, provider);
const user = result.user;

localStorage.setItem("userName", user.displayName);
localStorage.setItem("userEmail", user.email);

window.location.href="index.html";

}catch(err){

console.log(err);
alert("Login Failed");

}

}

</script>

</body>
</html>
