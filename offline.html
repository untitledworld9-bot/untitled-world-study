<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline – Untitled World</title>
<style>
:root {
  --primary:       #ff7a18;
  --primary-hover: #e66a10;
  --bg:            #f4f6f8;
  --text:          #1f2937;
  --muted:         #6b7280;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  padding: 16px;
}

.card {
  background: #fff;
  padding: 40px 30px;
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  width: 100%;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.icon-wrap {
  width: 80px;
  height: 80px;
  background: #fff0e6;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 36px;
  margin-bottom: 24px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%   { box-shadow: 0 0 0 0   rgba(255,122,24,.40); }
  70%  { box-shadow: 0 0 0 20px rgba(255,122,24,.00); }
  100% { box-shadow: 0 0 0 0   rgba(255,122,24,.00); }
}

h1 { font-size: 22px; margin-bottom: 8px; font-weight: 700; }

p {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 28px;
  line-height: 1.5;
}

.retry {
  width: 100%;
  padding: 14px 20px;
  border: none;
  border-radius: 12px;
  background: var(--primary);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s ease;
  box-shadow: 0 4px 12px rgba(255,122,24,.30);
}

.retry:hover  { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(255,122,24,.40); }
.retry:active { transform: translateY(0);          box-shadow: 0 2px 8px  rgba(255,122,24,.30); }

@media (min-width: 480px) {
  .card  { max-width: 400px; padding: 50px; }
  h1     { font-size: 28px; }
}

/* --- PREMIUM OFFLINE TIMER BUTTON --- */
.offline-timer-btn {
  background: #0f2027; /* Premium Dark Background */
  border: 2px solid #00ff88;
  color: #00ff88;
  padding: 14px 30px;
  border-radius: 30px;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 30px; /* Card se gap */
  box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
  transition: 0.3s;
}

.offline-timer-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<a href="/focus.html" class="offline-timer-btn">
  <i class="fa-solid fa-stopwatch"></i>Timer
</a>

<div class="card">
  <div class="icon-wrap">📡</div>
  <h1>You're Offline</h1>
  <p>Connect to the internet to continue studying🚀</p>
  <button class="retry" id="retryBtn">Retry</button>
</div>

<script>
  // Retry button → go home (SW will serve live page if back online)
  document.getElementById("retryBtn").addEventListener("click", function () {
    window.location.href = "/";
  });

  // Auto-redirect the moment the browser regains connectivity
  window.addEventListener("online", function () {
    window.location.href = "/";
  });

  // Polling fallback – navigator.onLine can lag on some Android WebViews
  var poll = setInterval(function () {
    if (navigator.onLine) {
      clearInterval(poll);
      window.location.href = "/";
    }
  }, 2000);
</script>
</body>
</html>
