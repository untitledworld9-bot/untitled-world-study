<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Offline – Study Grid Prep</title>

<!-- ✅ Theme — index.html ke saath match karega -->
<script>
(function(){
  const saved = localStorage.getItem("theme");
  const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved ? saved : (systemDark ? "dark" : "light");
  document.documentElement.setAttribute("data-theme", theme);
  // ✅ White flash rokne ke liye
  document.documentElement.style.background =
    theme === "dark" ? "#0B1220" : "#ffffff";
})();
</script>

<!-- ✅ White progress bar hatao — theme ke hisab se -->
<meta name="theme-color" content="#0B1220" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* Flash prevention */
html { visibility: hidden; }
html[data-theme] { visibility: visible; }

:root {
  --primary: #ff7a18;
  --primary-hover: #e66a10;
}

[data-theme="light"] {
  --bg: #f5f5f5;
  --card-bg: #ffffff;
  --text: #111111;
  --muted: #555555;
  --shortcut-bg: #f0f0f0;
}

[data-theme="dark"] {
  --bg: #0B1220;
  --card-bg: rgba(255,255,255,0.05);
  --text: #E2E8F0;
  --muted: #94A3B8;
  --shortcut-bg: #0f2027;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
}

body {
  min-height: 100vh;
  min-height: 100dvh; /* ✅ notch/safe area */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  padding: 20px;
  gap: 16px;
  /* ✅ White bar disable */
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
}

/* ── OFFLINE SHORTCUT BUTTONS — PWA ONLY ────────────────────── */
.offline-shortcuts {
  display: none;
  gap: 14px;
  width: 100%;
  max-width: 320px;
}

@media (display-mode: standalone) {
  .offline-shortcuts { display: flex; }
}

.shortcut-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 10px;
  border-radius: 20px;
  text-decoration: none;
  font-weight: 700;
  font-size: 13px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  background: var(--shortcut-bg);
}

.shortcut-btn.timer {
  border: 2px solid #00ff88;
  color: #00ff88;
  box-shadow: 0 0 14px rgba(0,255,136,0.18);
}
.shortcut-btn.todo {
  border: 2px solid #00f2fe;
  color: #00f2fe;
  box-shadow: 0 0 14px rgba(0,242,254,0.18);
}
.shortcut-btn:active { transform: scale(0.97); }

.btn-icon {
  width: 44px; height: 44px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.shortcut-btn.timer .btn-icon { background: rgba(0,255,136,0.12); }
.shortcut-btn.todo  .btn-icon { background: rgba(0,242,254,0.12); }

/* ── CARD ────────────────────────────────────────────────────── */
.card {
  background: var(--card-bg);
  padding: 40px 30px;
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.10);
  width: 100%;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.icon-wrap {
  width: 80px; height: 80px;
  background: rgba(255,122,24,0.12);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 36px;
  margin-bottom: 24px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%   { box-shadow: 0 0 0 0   rgba(255,122,24,.4); }
  70%  { box-shadow: 0 0 0 20px rgba(255,122,24,.0); }
  100% { box-shadow: 0 0 0 0   rgba(255,122,24,.0); }
}

h1 { font-size: 22px; margin-bottom: 8px; font-weight: 700; }

p {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 28px;
  line-height: 1.5;
}

.retry {
  width: 100%;
  padding: 14px 20px;
  border: none;
  border-radius: 12px;
  background: var(--primary);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s ease;
  box-shadow: 0 4px 12px rgba(255,122,24,.3);
}
.retry:active {
  transform: scale(0.98);
  box-shadow: 0 2px 8px rgba(255,122,24,.3);
}
</style>
</head>
<body>

<!-- PWA shortcut buttons -->
<div class="offline-shortcuts">
  <a href="/focus.html" class="shortcut-btn timer">
    <div class="btn-icon"><i class="fa-solid fa-stopwatch"></i></div>
    Timer
  </a>
  <a href="/todo.html" class="shortcut-btn todo">
    <div class="btn-icon"><i class="fa-solid fa-list-check"></i></div>
    Todo List
  </a>
</div>

<!-- Main card -->
<div class="card">
  <div class="icon-wrap">📡</div>
  <h1>You're Offline</h1>
  <p>Internet connection nahi hai.<br>Check karo aur retry karo.</p>
  <button class="retry" onclick="window.location.href='/'">🔄 Retry</button>
</div>

<script>
  // ✅ Net wapas aaya → home pe bhejo
  window.addEventListener("online", () => {
    window.location.replace("/");
  });

  // Polling fallback (Android WebView ke liye)
  const poll = setInterval(() => {
    if (navigator.onLine) {
      clearInterval(poll);
      window.location.replace("/");
    }
  }, 2000);
</script>

</body>
</html>
