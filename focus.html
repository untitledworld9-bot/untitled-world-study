<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timer | Untitled World</title>
<link rel="icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

/* --- BASE CSS --- */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
position: relative;
display: flex;
flex-direction: column;
align-items: center;
overflow-x: hidden;
}

/* --- CUSTOM TOAST POPUP (Replaces Browser Alert) --- */
.custom-toast {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    color: #fff;
    padding: 15px 30px;
    border-radius: 12px;
    border-left: 5px solid #00f2fe;
    font-weight: 600;
    font-size: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 9999;
    transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    display: flex;
    align-items: center;
    gap: 10px;
}

.custom-toast.show {
    top: 30px;
}

/* --- STUDY WITH FRIENDS BUTTON (Centered at top like screenshot) --- */
.study-friends-btn {
    width: 90%;
    max-width: 400px;
    margin-top: 20px;
    background: linear-gradient(45deg, #ff9a9e, #fecfef);
    color: #333;
    padding: 12px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    text-align: center;
    box-shadow: 0 0 15px rgba(255, 154, 158, 0.6);
    animation: glowPulse 2s infinite alternate;
    transition: 0.3s;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

@keyframes glowPulse {
    0% { box-shadow: 0 0 10px rgba(255, 154, 158, 0.4); }
    100% { box-shadow: 0 0 25px rgba(255, 154, 158, 0.9); }
}

.timer-section{
text-align:center;
padding: 20px 5%; /* Gaps reduced drastically */
display: flex;
flex-direction: column;
align-items: center;
width: 100%;
}

.header-title {
    font-size: 28px;
    font-weight: 600;
    margin-top: 10px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
}

.header-title i {
    color: #00f2fe;
}

/* --- PREMIUM EDTECH CIRCLE TIMER --- */
.timer-container {
    background: rgba(255, 255, 255, 0.03);
    border: 3px solid rgba(0, 242, 254, 0.2);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(0, 242, 254, 0.05);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 50%; /* Made it a perfect circle */
    width: 280px;
    height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
    transition: all 0.3s ease;
}

/* Green Glow Action when timer is running */
.timer-container.running {
    border-color: #00ff88;
    box-shadow: 0 0 35px rgba(0, 255, 136, 0.6), inset 0 0 25px rgba(0, 255, 136, 0.2);
}

.timer{
font-size: 55px; /* Perfect fit for circle */
font-weight:700;
color:#00f2fe;
line-height: 1;
letter-spacing: 1px;
font-variant-numeric: tabular-nums; 
text-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
}

.timer-container.running .timer {
    color: #00ff88;
    text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
}

/* --- CUSTOM INPUT STYLING --- */
.custom-time-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.05);
    padding: 10px 20px;
    border-radius: 20px;
}

.time-input {
    width: 70px;
    padding: 10px;
    border: 2px solid rgba(0, 242, 254, 0.3);
    border-radius: 10px;
    background: transparent;
    color: white;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    outline: none;
    transition: 0.3s;
}

.time-input::placeholder {
    color: rgba(255, 255, 255, 0.4);
    font-weight: 400;
}

.time-input:focus {
    border-color: #00f2fe;
    background: rgba(255, 255, 255, 0.1);
}

.colon {
    font-size: 24px;
    font-weight: bold;
    color: #00f2fe;
}

/* --- BUTTONS --- */
.btn{
margin: 5px;
padding: 12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00f2fe,#4facfe);
cursor:pointer;
font-weight:600;
color:#fff;
font-size: 15px;
box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
}

.btn:hover{
transform:scale(1.05);
transition:.3s;
}

.pause-btn{
background: linear-gradient(45deg, #f39c12, #e67e22);
box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
}

.stop-btn{
background: linear-gradient(45deg, #e74c3c, #c0392b);
box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
}

.controls {
    margin-bottom: 15px;
}

/* Responsive tweaks */
@media (max-width: 480px) {
    .timer-container {
        width: 250px;
        height: 250px;
    }
    .timer {
        font-size: 48px;
    }
}

</style>
</head>
<body>

<div id="customToast" class="custom-toast">
    <i class="fa-solid fa-bell"></i> <span id="toastMessage">Message</span>
</div>

<a href="timer.html" class="study-friends-btn">
   👩‍💻 Study with friends ✨
</a>

<section class="timer-section">
<h2 class="header-title"><i class="fa-solid fa-stopwatch"></i> Timer</h2>

<div class="timer-container" id="timerBox" onclick="toggleTimer()">
    <div class="timer" id="timer">00:00:00</div>
</div>

<div class="custom-time-container">
    <input type="number" id="customHours" class="time-input" placeholder="Hrs" min="0">
    <span class="colon">:</span>
    <input type="number" id="customMinutes" class="time-input" placeholder="Min" min="0">
    <button class="btn" onclick="startCustomTime()">Set Time</button>
</div>

<div class="controls">
    <button class="btn pause-btn" id="pauseBtn" onclick="pauseTimer()">Pause</button>
    <button class="btn stop-btn" onclick="stopTimer()">Stop</button>
</div>

<button class="btn" onclick="window.location.href='index.html'">
⬅ Back
</button>
</section>

<script>

let timerInterval;
let time = 0;
let isPaused = false;
const timerBox = document.getElementById("timerBox");

// --- Custom Popup Logic ---
function showToast(msg, isSuccess = false) {
    const toast = document.getElementById("customToast");
    const toastMsg = document.getElementById("toastMessage");
    toastMsg.innerText = msg;
    
    // Change color based on type
    toast.style.borderLeftColor = isSuccess ? "#00ff88" : "#ff4757";
    
    toast.classList.add("show");
    
    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}

function startCustomTime() {
    let hrs = parseInt(document.getElementById("customHours").value) || 0;
    let mins = parseInt(document.getElementById("customMinutes").value) || 0;

    let totalSeconds = (hrs * 3600) + (mins * 60);

    if (totalSeconds > 0) {
        startTimer(totalSeconds);
        document.getElementById("customHours").value = "";
        document.getElementById("customMinutes").value = "";
    } else {
        // Custom popup instead of browser alert
        showToast("Bhai thoda time toh enter karo! 😅");
    }
}

function startTimer(duration){
    clearInterval(timerInterval);

    if(duration){
        time = duration;
        isPaused = false;
        document.getElementById("pauseBtn").innerText = "Pause";
    }

    displayTime(time);
    
    // Add Green Glow
    timerBox.classList.add("running");

    timerInterval = setInterval(() => {
        if(time <= 0){
            clearInterval(timerInterval);
            timerBox.classList.remove("running");
            showToast("Session Complete! Great job. 🚀", true);
            return; 
        }
        
        time--;
        displayTime(time);

    }, 1000);
}

function pauseTimer(){
    let btn = document.getElementById("pauseBtn");
    
    if(time === 0) return; 

    if(!isPaused){
        clearInterval(timerInterval);
        btn.innerText = "Resume";
        isPaused = true;
        timerBox.classList.remove("running"); // Remove glow on pause
    } else {
        startTimer(); 
        btn.innerText = "Pause";
        isPaused = false;
    }
}

function stopTimer(){
    clearInterval(timerInterval);
    time = 0;
    isPaused = false;

    document.getElementById("pauseBtn").innerText = "Pause";
    document.getElementById("timer").innerHTML = "00:00:00";
    timerBox.classList.remove("running"); // Remove glow on stop
}

// Optional feature: tap circle to pause/play
function toggleTimer() {
    if(time > 0) {
        pauseTimer();
    }
}

function displayTime(time){
    let h = Math.floor(time / 3600);
    let m = Math.floor((time % 3600) / 60);
    let s = time % 60;

    document.getElementById("timer").innerHTML =
    (h < 10 ? "0" : "") + h + ":" + 
    (m < 10 ? "0" : "") + m + ":" + 
    (s < 10 ? "0" : "") + s;
}

</script>
</body>
</html>
