<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timer | Untitled World</title>
<link rel="icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

/* --- BASE CSS --- */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
position: relative;
display: flex;
flex-direction: column;
align-items: center;
overflow-x: hidden;
}

/* --- FIXED HEADER --- */
.fixed-timer-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(15, 32, 39, 0.98);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    z-index: 9999;
    padding: 15px 20px; 
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
    border-bottom: 1px solid rgba(0, 242, 254, 0.25);
    display: flex;
    justify-content: center;
    align-items: center;
}

.header-title {
    font-size: 24px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
    margin: 0;
}

.header-title i {
    color: #00f2fe;
}

/* --- CUSTOM TOAST POPUP --- */
.custom-toast {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    color: #fff;
    padding: 15px 30px;
    border-radius: 12px;
    border-left: 5px solid #00f2fe;
    font-weight: 600;
    font-size: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 10000;
    transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    display: flex;
    align-items: center;
    gap: 10px;
}

.custom-toast.show {
    top: 80px; /* Header ke niche dikhega */
}

/* --- STUDY WITH FRIENDS (Right aligned half button) --- */
.friends-btn-wrapper {
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: flex-end; /* Right side shift */
    padding-right: 20px;
    margin-top: 85px; /* Fixed header ke niche gap */
    margin-bottom: 15px;
}

.study-friends-btn {
    background: linear-gradient(45deg, #ff9a9e, #fecfef);
    color: #333;
    padding: 8px 16px;
    border-radius: 20px;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
    box-shadow: 0 0 15px rgba(255, 154, 158, 0.5);
    animation: glowPulse 2s infinite alternate;
    transition: 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

@keyframes glowPulse {
    0% { box-shadow: 0 0 10px rgba(255, 154, 158, 0.4); }
    100% { box-shadow: 0 0 20px rgba(255, 154, 158, 0.8); }
}

.timer-section {
    text-align:center;
    padding: 0 5% 40px 5%;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
}

/* --- PREMIUM BIG CIRCLE TIMER --- */
.timer-container {
    background: rgba(255, 255, 255, 0.03);
    border: 3px solid rgba(0, 242, 254, 0.2);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(0, 242, 254, 0.05);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 50%; 
    width: 320px; /* Badha diya */
    height: 320px; /* Badha diya */
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px; /* Niche ke items se proper gap */
    transition: all 0.3s ease;
}

/* Green Glow Action when timer is running */
.timer-container.running {
    border-color: #00ff88;
    box-shadow: 0 0 35px rgba(0, 255, 136, 0.6), inset 0 0 25px rgba(0, 255, 136, 0.2);
}

.timer {
    font-size: 65px; /* Digits bade kiye circle ke hisab se */
    font-weight:700;
    color:#00f2fe;
    line-height: 1;
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums; 
    text-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
}

.timer-container.running .timer {
    color: #00ff88;
    text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
}

/* --- CUSTOM INPUT STYLING --- */
.custom-time-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 25px;
    background: rgba(255,255,255,0.05);
    padding: 12px 25px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
}

.time-input {
    width: 75px;
    padding: 12px 10px;
    border: 2px solid rgba(0, 242, 254, 0.3);
    border-radius: 12px;
    background: transparent;
    color: white;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    outline: none;
    transition: 0.3s;
}

.time-input::placeholder {
    color: rgba(255, 255, 255, 0.4);
    font-weight: 400;
}

.time-input:focus {
    border-color: #00f2fe;
    background: rgba(255, 255, 255, 0.1);
}

.colon {
    font-size: 28px;
    font-weight: bold;
    color: #00f2fe;
}

/* --- BUTTONS --- */
.btn {
    margin: 5px;
    padding: 14px 28px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#00f2fe,#4facfe);
    cursor:pointer;
    font-weight:600;
    color:#fff;
    font-size: 15px;
    box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
}

.btn:hover {
    transform:scale(1.05);
    transition:.3s;
}

.pause-btn {
    background: linear-gradient(45deg, #f39c12, #e67e22);
    box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
}

.reset-btn { /* Changed from stop to reset class name */
    background: linear-gradient(45deg, #e74c3c, #c0392b);
    box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
}

.controls {
    margin-bottom: 25px;
}

/* Responsive tweaks */
@media (max-width: 400px) {
    .timer-container { width: 280px; height: 280px; margin-bottom: 30px;}
    .timer { font-size: 55px; }
}
@media (min-width: 768px) {
    .timer-container { width: 400px; height: 400px; margin-bottom: 50px;}
    .timer { font-size: 80px; }
}

</style>
</head>
<body>

<div id="customToast" class="custom-toast">
    <i class="fa-solid fa-bell"></i> <span id="toastMessage">Message</span>
</div>

<div class="fixed-timer-header">
    <h2 class="header-title"><i class="fa-solid fa-stopwatch"></i> Timer</h2>
</div>

<div class="friends-btn-wrapper">
    <a href="timer.html" class="study-friends-btn">
       👩‍💻 Study with friends ✨
    </a>
</div>

<section class="timer-section">

<div class="timer-container" id="timerBox" onclick="toggleTimer()">
    <div class="timer" id="timer">00:00:00</div>
</div>

<div class="custom-time-container">
    <input type="number" id="customHours" class="time-input" placeholder="Hrs" min="0">
    <span class="colon">:</span>
    <input type="number" id="customMinutes" class="time-input" placeholder="Min" min="0">
    <button class="btn" onclick="startCustomTime()">Set Time</button>
</div>

<div class="controls">
    <button class="btn pause-btn" id="pauseBtn" onclick="pauseTimer()">Pause</button>
    <button class="btn reset-btn" onclick="resetTimer()">Reset</button>
</div>

<button class="btn" style="margin-top: 10px;" onclick="window.location.href='index.html'">
⬅ Back
</button>

</section>

<script>
// Notification permission request on app start
document.addEventListener("DOMContentLoaded", () => {

if ("Notification" in window) {

if (Notification.permission === "default") {
Notification.requestPermission();
}

}

});

let timerInterval;
let time = 0;
let isPaused = false;
let targetEndTime = 0; // Refresh persistence ke liye naya variable
const timerBox = document.getElementById("timerBox");

// --- INITIAL LOAD (Refresh Handle Logic) ---
window.onload = () => {
    loadSavedTimer();
};

function saveTimerState() {
    localStorage.setItem("uw_timerState", JSON.stringify({
        time: time,
        isPaused: isPaused,
        targetEndTime: targetEndTime
    }));
}

function clearTimerState() {
    localStorage.removeItem("uw_timerState");
}

function loadSavedTimer() {
    const saved = JSON.parse(localStorage.getItem("uw_timerState"));
    if (saved) {
        isPaused = saved.isPaused;
        targetEndTime = saved.targetEndTime; // Global memory restore

        if (isPaused) {
            // Agar pause pe chhoda tha
            time = saved.time;
            if (time > 0) {
                displayTime(time);
                document.getElementById("pauseBtn").innerText = "Resume";
            }
        } else {
            // Agar chalte hue chhoda tha
            if (targetEndTime > Date.now()) {
                time = Math.floor((targetEndTime - Date.now()) / 1000);
                startTimer(time, true); // Resume kar rahe hain
            } else if (targetEndTime > 0 && targetEndTime <= Date.now()) {
                // Background me timer khatam ho gaya
                clearTimerState();
                displayTime(0);
                showToast("Session Completed while you were away! 🚀", true);
            }
        }
    }
}

// --- Custom Popup Logic ---
function showToast(msg, isSuccess = false) {
    const toast = document.getElementById("customToast");
    const toastMsg = document.getElementById("toastMessage");
    toastMsg.innerText = msg;

    toast.style.borderLeftColor = isSuccess ? "#00ff88" : "#ff4757";

    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}

function sendNotification(title, message){

if("Notification" in window && Notification.permission === "granted"){

new Notification(title,{
body: message,
icon: "/icon-192.png",
badge: "/icon-192.png",
vibrate: [200,100,200]
});

}

}

function startCustomTime() {
    let hrs = parseInt(document.getElementById("customHours").value) || 0;
    let mins = parseInt(document.getElementById("customMinutes").value) || 0;

    let totalSeconds = (hrs * 3600) + (mins * 60);

    if (totalSeconds > 0) {
        startTimer(totalSeconds);
        document.getElementById("customHours").value = "";
        document.getElementById("customMinutes").value = "";
    } else {
        showToast("Bhai thoda time toh enter karo! 😅");
    }
}

function startTimer(duration, isResumeFromRefresh = false){
    clearInterval(timerInterval);

    if(duration){
        time = duration;
        isPaused = false;
        document.getElementById("pauseBtn").innerText = "Pause";
    }

    // Refresh handle karne ke liye future ka timestamp set karo
    if (!isResumeFromRefresh) {
    targetEndTime = Date.now() + (time * 1000);
}
    
    saveTimerState();
    displayTime(time);
    timerBox.classList.add("running");

    timerInterval = setInterval(() => {
        // Delta time logic jisse background me drift na ho
        time = Math.floor((targetEndTime - Date.now()) / 1000);

        if(time <= 0){
            clearInterval(timerInterval);
            time = 0;
            displayTime(0);
            timerBox.classList.remove("running");
            clearTimerState();
            showToast("Session Complete! Great job. 🚀", true);
sendNotification("Untitled World Timer","Session Completed 🚀 Great Job!");
            return; 
        }

        displayTime(time);
        saveTimerState(); // Har second update save karega
    }, 1000);
}

function pauseTimer(){
    let btn = document.getElementById("pauseBtn");

    if(time === 0) return; 

    if(!isPaused){
        clearInterval(timerInterval);
        btn.innerText = "Resume";
        isPaused = true;
        timerBox.classList.remove("running");

        // remaining time save karo
        time = Math.floor((targetEndTime - Date.now()) / 1000);
        saveTimerState();

    } else {
        // resume
        targetEndTime = Date.now() + (time * 1000);
        isPaused = false;
        startTimer(time, true);
        btn.innerText = "Pause";
    }
}

function resetTimer(){
    clearInterval(timerInterval);
    time = 0;
    isPaused = false;
    targetEndTime = 0;

    document.getElementById("pauseBtn").innerText = "Pause";
    document.getElementById("timer").innerHTML = "00:00:00";
    timerBox.classList.remove("running"); 
    clearTimerState();
}

function toggleTimer() {
    if(time > 0) {
        pauseTimer();
    }
}

function displayTime(time){
    let h = Math.floor(time / 3600);
    let m = Math.floor((time % 3600) / 60);
    let s = time % 60;

    document.getElementById("timer").innerHTML =
    (h < 10 ? "0" : "") + h + ":" + 
    (m < 10 ? "0" : "") + m + ":" + 
    (s < 10 ? "0" : "") + s;
}

</script>
</body>
</html>
