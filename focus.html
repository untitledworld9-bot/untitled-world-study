<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Focus Timer | Untitled World</title>
<link rel="icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>

/* --- ORIGINAL CSS (UNTOUCHED EXCEPT TIMER FONT SIZE) --- */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

.timer-section{
text-align:center;
padding:80px 10%;
}

.timer{
/* Timer ke digits bada kar diya hai (responsive size) */
font-size:clamp(70px, 16vw, 120px); 
margin:25px 0;
font-weight:700;
color:#00f2fe;
}

.btn{
margin:10px;
padding:14px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00f2fe,#4facfe);
cursor:pointer;
font-weight:600;
color:#fff;
}

.btn:hover{
transform:scale(1.05);
transition:.3s;
}

.pause-btn{
background:orange;
}

.stop-btn{
background:#e74c3c;
}

/* --- NEW CSS ADDED FOR NEW FEATURES --- */

/* Custom Input Styling (EdTech Feel) */
.custom-time-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}

.time-input {
    width: 80px;
    padding: 12px;
    border: 2px solid rgba(0, 242, 254, 0.4);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.08);
    color: white;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    outline: none;
    transition: 0.3s;
}

.time-input::placeholder {
    color: rgba(255, 255, 255, 0.5);
    font-weight: 400;
}

.time-input:focus {
    border-color: #00f2fe;
    box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
    background: rgba(255, 255, 255, 0.15);
}

.colon {
    font-size: 28px;
    font-weight: bold;
    color: #00f2fe;
}

/* Glowing 'Study with Friends' Button */
.study-friends-btn {
    position: absolute;
    top: 5px;
    right: 10%;
    background: linear-gradient(45deg, #ff9a9e, #fecfef);
    color: #333;
    padding: 10px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    box-shadow: 0 0 10px rgba(255, 154, 158, 0.8);
    animation: glowPulse 1.5s infinite alternate;
    transition: 0.3s;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
}

.study-friends-btn:hover {
    transform: scale(1.05);
}

@keyframes glowPulse {
    0% { box-shadow: 0 0 8px rgba(255, 154, 158, 0.5); }
    100% { box-shadow: 0 0 20px rgba(255, 154, 158, 1), 0 0 30px rgba(254, 207, 239, 0.8); }
}

/* Responsive fix for small screens */
@media (max-width: 768px) {
    .study-friends-btn {
        top: 75px;
        font-size: 12px;
        padding: 8px 15px;
    }
    .timer-section {
        padding-top: 110px;
    }
}

</style>
</head>
<body>

<a href="timer.html" class="study-friends-btn">
   👩‍💻 Study with friends ✨
</a>

<section class="timer-section">
<h2>Focus Timer ⏳</h2>
<div class="timer" id="timer">00:00:00</div>

<div class="custom-time-container">
    <input type="number" id="customHours" class="time-input" placeholder="Hrs" min="0">
    <span class="colon">:</span>
    <input type="number" id="customMinutes" class="time-input" placeholder="Min" min="0">
    <button class="btn" onclick="startCustomTime()">Set Time</button>
</div>

<br>
<button class="btn pause-btn" id="pauseBtn" onclick="pauseTimer()">Pause</button>
<button class="btn stop-btn" onclick="stopTimer()">Stop</button>

<br><br>

<button class="btn" onclick="window.location.href='index.html'">
⬅ Back
</button>
</section>

<script>

// --- ORIGINAL JS VARIABLES ---
let timerInterval;
let time=0;
let isPaused=false;

// --- NEW FUNCTION FOR CUSTOM TIMER ---
function startCustomTime() {
    let hrs = parseInt(document.getElementById("customHours").value) || 0;
    let mins = parseInt(document.getElementById("customMinutes").value) || 0;

    // Calculate total seconds
    let totalSeconds = (hrs * 3600) + (mins * 60);

    if (totalSeconds > 0) {
        startTimer(totalSeconds);
        // Clear inputs nicely after starting
        document.getElementById("customHours").value = "";
        document.getElementById("customMinutes").value = "";
    } else {
        alert("Bhai thoda time toh enter karo start karne se pehle! 😅");
    }
}

// --- ORIGINAL JS FUNCTIONS (UNTOUCHED) ---
function startTimer(duration){

clearInterval(timerInterval);

if(duration){
time=duration;
isPaused=false;
document.getElementById("pauseBtn").innerText="Pause";
}

displayTime(time);

timerInterval=setInterval(()=>{

time--;
displayTime(time);

if(time<0){
clearInterval(timerInterval);
alert("Session Complete!");
}

},1000);

}

function pauseTimer(){

let btn=document.getElementById("pauseBtn");

if(!isPaused){

clearInterval(timerInterval);
btn.innerText="Resume";
isPaused=true;

}else{

startTimer();
btn.innerText="Pause";
isPaused=false;

}

}

function stopTimer(){

clearInterval(timerInterval);
time=0;
isPaused=false;

document.getElementById("pauseBtn").innerText="Pause";
document.getElementById("timer").innerHTML="00:00:00";

}

function displayTime(time){

let h=Math.floor(time/3600);
let m=Math.floor((time%3600)/60);
let s=time%60;

document.getElementById("timer").innerHTML=
(h<10?"0":"")+h+":"+(m<10?"0":"")+m+":"+(s<10?"0":"")+s;

}

</script>
</body>
</html>
