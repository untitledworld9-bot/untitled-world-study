<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Timer | Untitled World</title>
<link rel="icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

/* --- BASE CSS --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
    /* ✅ No text selection on tap */
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
}

/* Allow typing in inputs */
input, textarea {
    -webkit-user-select: text;
    user-select: text;
}

/* ✅ Dark html background — removes white flash / white loading line */
html {
    background: #0d1117;
    overscroll-behavior: none;
}

body {
    /* ✅ Matched index.html dark background from screenshot */
    background: #0d1117;
    color: white;
    min-height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    overscroll-behavior: none;
}

/* --- FIXED HEADER --- */
/* ✅ Header color matched to index.html dark header */
.fixed-timer-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(13, 17, 23, 0.98);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    z-index: 9999;
    padding: 15px 20px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.07);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: center;
    align-items: center;
}

.header-title {
    font-size: 24px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
    margin: 0;
}

.header-title i {
    color: #00f2fe;
}

/* --- CUSTOM TOAST POPUP --- */
.custom-toast {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: #161b22;
    color: #fff;
    padding: 15px 30px;
    border-radius: 12px;
    border-left: 5px solid #00f2fe;
    font-weight: 600;
    font-size: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 10000;
    transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
}

.custom-toast.show {
    top: 80px;
}

/* --- STUDY WITH FRIENDS --- */
.friends-btn-wrapper {
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: flex-end;
    padding-right: 20px;
    margin-top: 85px;
    margin-bottom: 15px;
}

.study-friends-btn {
    background: linear-gradient(45deg, #ff9a9e, #fecfef);
    color: #333;
    padding: 8px 16px;
    border-radius: 20px;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
    box-shadow: 0 0 15px rgba(255, 154, 158, 0.5);
    animation: glowPulse 2s infinite alternate;
    transition: 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

@keyframes glowPulse {
    0% { box-shadow: 0 0 10px rgba(255, 154, 158, 0.4); }
    100% { box-shadow: 0 0 20px rgba(255, 154, 158, 0.8); }
}

.timer-section {
    text-align: center;
    padding: 0 5% 40px 5%;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
}

/* --- ✅ BIG CIRCLE TIMER --- */
.timer-container {
    background: rgba(255, 255, 255, 0.03);
    border: 3px solid rgba(0, 242, 254, 0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 0 30px rgba(0, 242, 254, 0.04);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 50%;
    width: 320px;
    height: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
    transition: all 0.3s ease;
    cursor: pointer;
}

.timer-container.running {
    border-color: #00ff88;
    box-shadow: 0 0 45px rgba(0, 255, 136, 0.45), inset 0 0 30px rgba(0, 255, 136, 0.08);
}

/* ✅ Fits inside circle properly */
.timer {
    font-size: 54px;       /* 62px se kam karke 54px kar do */
    font-weight: 700;
    color: #00f2fe;
    line-height: 1;
    letter-spacing: 0px;   
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 22px rgba(0, 242, 254, 0.45);
    width: 100%;           /* Ye add kar do safety ke liye */
    text-align: center;    /* Ye bhi add kar do */
}

.timer-container.running .timer {
    color: #00ff88;
    text-shadow: 0 0 22px rgba(0, 255, 136, 0.5);
}

.timer-tap-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    margin-top: 10px;
    letter-spacing: 0.5px;
    display: none;
}

.timer-container.running .timer-tap-hint {
    color: rgba(0, 255, 136, 0.4);
}

/* --- ✅ SMALLER TIME INPUT SECTION --- */
.custom-time-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    background: rgba(255, 255, 255, 0.04);
    padding: 8px 16px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.07);
}

.time-input {
    width: 60px;
    padding: 9px 6px;
    border: 1.5px solid rgba(0, 242, 254, 0.25);
    border-radius: 10px;
    background: transparent;
    color: white;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    outline: none;
    transition: 0.3s;
}

.time-input::placeholder {
    color: rgba(255,255,255,0.3);
    font-weight: 400;
    font-size: 13px;
}

.time-input:focus {
    border-color: #00f2fe;
    background: rgba(255,255,255,0.07);
}

.colon {
    font-size: 22px;
    font-weight: bold;
    color: #00f2fe;
}

/* --- BUTTONS --- */
.btn {
    margin: 5px;
    padding: 12px 24px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    cursor: pointer;
    font-weight: 600;
    color: #fff;
    font-size: 14px;
    box-shadow: 0 4px 15px rgba(0, 242, 254, 0.25);
    transition: transform 0.2s;
}

.btn:active { transform: scale(0.97); }

.set-btn { padding: 9px 18px; font-size: 13px; }

.pause-btn {
    background: linear-gradient(45deg, #f39c12, #e67e22);
    box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
}

.reset-btn {
    background: linear-gradient(45deg, #e74c3c, #c0392b);
    box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
}

.controls { margin-bottom: 20px; }

/* --- RESPONSIVE --- */
@media (max-width: 380px) {
    .timer-container { width: 270px; height: 270px; }
    .timer { font-size: 50px; } /* 68px ki jagah 46px karein taaki circle mein aaye */
}

@media (min-width: 768px) {
    .timer-container { width: 400px; height: 400px; }
    .timer { font-size: 80px; } /* Isko bhi 100px ki jagah 80px rakhein taaki perfect lage */
}

</style>
</head>
<body>

<div id="customToast" class="custom-toast">
    <i class="fa-solid fa-bell"></i> <span id="toastMessage">Message</span>
</div>

<div class="fixed-timer-header">
    <h2 class="header-title"><i class="fa-solid fa-stopwatch"></i> Timer</h2>
</div>

<div class="friends-btn-wrapper">
    <a href="timer.html" class="study-friends-btn">
       👩‍💻 Study with friends ✨
    </a>
</div>

<section class="timer-section">

<div class="timer-container" id="timerBox" onclick="toggleTimer()">
    <div class="timer" id="timer">00:00:00</div>
    <div class="timer-tap-hint" id="tapHint">tap to pause</div>
</div>

<div class="custom-time-container">
    <input type="number" id="customHours" class="time-input" placeholder="Hrs" min="0">
    <span class="colon">:</span>
    <input type="number" id="customMinutes" class="time-input" placeholder="Min" min="0">
    <button class="btn set-btn" onclick="startCustomTime()">Set</button>
</div>

<div class="controls">
    <button class="btn pause-btn" id="pauseBtn" onclick="pauseTimer()">Pause</button>
    <button class="btn reset-btn" onclick="resetTimer()">Reset</button>
</div>

<button class="btn" style="margin-top: 10px;" onclick="window.location.href='index.html'">
⬅ Back
</button>

</section>

<script>
document.addEventListener("DOMContentLoaded", () => {
    if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
    }
});

let timerInterval;
let time = 0;
let isPaused = false;
let targetEndTime = 0;
const timerBox = document.getElementById("timerBox");

// ✅ Tell SW to schedule a background notification for when timer ends
function scheduleSwNotification() {
    if ("serviceWorker" in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
            type: 'SCHEDULE_NOTIFICATION',
            id: 'focus_timer',
            endTime: targetEndTime,
            title: 'Study Timer',
            body: 'Session Completed \uD83D\uDE80 Great Job!',
            url: '/focus.html'
        });
    }
}

// ✅ Cancel SW background notification (when page is open and handles it itself)
function cancelSwNotification() {
    if ("serviceWorker" in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
            type: 'CANCEL_NOTIFICATION',
            id: 'focus_timer'
        });
    }
}

function updateTapHint() {
    const hint = document.getElementById("tapHint");
    if (!hint) return;
    hint.style.display = (time > 0) ? "block" : "none";
}

// --- INITIAL LOAD (Refresh Handle) ---
window.onload = () => {
    loadSavedTimer();
};

function saveTimerState() {
    localStorage.setItem("uw_timerState", JSON.stringify({
        time: time,
        isPaused: isPaused,
        targetEndTime: targetEndTime
    }));
}

function clearTimerState() {
    localStorage.removeItem("uw_timerState");
}

function loadSavedTimer() {
    const saved = JSON.parse(localStorage.getItem("uw_timerState"));
    if (saved) {
        isPaused = saved.isPaused;
        targetEndTime = saved.targetEndTime;

        if (isPaused) {
            time = saved.time;
            if (time > 0) {
                displayTime(time);
                document.getElementById("pauseBtn").innerText = "Resume";
                updateTapHint();
            }
        } else {
            if (targetEndTime > Date.now()) {
                time = Math.floor((targetEndTime - Date.now()) / 1000);
                startTimer(time, true);
            } else if (targetEndTime > 0 && targetEndTime <= Date.now()) {
                clearTimerState();
                displayTime(0);
                showToast("Session Completed while you were away! \uD83D\uDE80", true);
                sendNotification("Study Timer", "Session Completed while you were away \uD83D\uDE80");
            }
        }
    }
}

function showToast(msg, isSuccess = false) {
    const toast = document.getElementById("customToast");
    const toastMsg = document.getElementById("toastMessage");
    toastMsg.innerText = msg;
    toast.style.borderLeftColor = isSuccess ? "#00ff88" : "#ff4757";
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
}

function sendNotification(title, message) {
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.ready.then(reg => {
            reg.showNotification(title, {
                body: message,
                icon: "/icon-192.png",
                badge: "/icon-192.png",
                vibrate: [200, 100, 200],
                requireInteraction: true,
                data: { url: "/focus.html" }
            });
        });
    }
}

function startCustomTime() {
    let hrs = parseInt(document.getElementById("customHours").value) || 0;
    let mins = parseInt(document.getElementById("customMinutes").value) || 0;
    let totalSeconds = (hrs * 3600) + (mins * 60);

    if (totalSeconds > 0) {
        startTimer(totalSeconds);
        document.getElementById("customHours").value = "";
        document.getElementById("customMinutes").value = "";
    } else {
        showToast("Bhai thoda time toh enter karo! \uD83D\uDE05");
    }
}

function startTimer(duration, isResumeFromRefresh = false) {
    clearInterval(timerInterval);

    if (duration) {
        time = duration;
        isPaused = false;
        document.getElementById("pauseBtn").innerText = "Pause";
    }

    if (!isResumeFromRefresh) {
        targetEndTime = Date.now() + (time * 1000);
    }

    // ✅ Show correct full time FIRST before any interval fires
    displayTime(time);
    timerBox.classList.add("running");
    updateTapHint();
    saveTimerState();

    // ✅ Schedule SW notification so it fires even if app is closed
    scheduleSwNotification();

    // ✅ 200ms interval — delta-time based, so always accurate
    // Fixes the "feels like 58" bug — display updates every 200ms not 1000ms
    timerInterval = setInterval(() => {
        const remaining = Math.floor((targetEndTime - Date.now()) / 1000);

        if (remaining <= 0) {
            clearInterval(timerInterval);
            time = 0;
            displayTime(0);
            timerBox.classList.remove("running");
            updateTapHint();
            clearTimerState();
            // ✅ Cancel SW notification (page is open, we handle it here)
            cancelSwNotification();
            showToast("Session Complete! Great job. \uD83D\uDE80", true);
            sendNotification("Study Timer", "Session Completed \uD83D\uDE80 Great Job!");
            return;
        }

        // Only re-render when second actually changes
        if (remaining !== time) {
            time = remaining;
            displayTime(time);
            saveTimerState();
        }
    }, 200);
}

function pauseTimer() {
    let btn = document.getElementById("pauseBtn");
    if (time === 0) return;

    if (!isPaused) {
        clearInterval(timerInterval);
        btn.innerText = "Resume";
        isPaused = true;
        timerBox.classList.remove("running");
        time = Math.floor((targetEndTime - Date.now()) / 1000);
        // ✅ Cancel SW notification while paused
        cancelSwNotification();
        saveTimerState();
    } else {
        targetEndTime = Date.now() + (time * 1000);
        isPaused = false;
        startTimer(time, true);
        btn.innerText = "Pause";
    }
}

function resetTimer() {
    clearInterval(timerInterval);
    // ✅ Cancel any pending SW background notification
    cancelSwNotification();
    time = 0;
    isPaused = false;
    targetEndTime = 0;
    document.getElementById("pauseBtn").innerText = "Pause";
    document.getElementById("timer").innerHTML = "00:00:00";
    timerBox.classList.remove("running");
    updateTapHint();
    clearTimerState();
}

function toggleTimer() {
    if (time > 0) {
        pauseTimer();
    }
}

function displayTime(t) {
    let h = Math.floor(t / 3600);
    let m = Math.floor((t % 3600) / 60);
    let s = t % 60;
    document.getElementById("timer").innerHTML =
        (h < 10 ? "0" : "") + h + ":" +
        (m < 10 ? "0" : "") + m + ":" +
        (s < 10 ? "0" : "") + s;
}
</script>
</body>
</html>
