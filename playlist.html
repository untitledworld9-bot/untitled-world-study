<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Study Playlist | Untitled World</title>
    <link rel="icon" href="/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
            padding-bottom: 50px; /* Mobile spacing */
        }

        .study-section {
            text-align: center;
            padding: 20px 5%;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 400;
            font-size: 1.2rem;
            color: #00f2fe;
        }

        /* Mobile Responsive Input Container */
        .input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        input {
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            width: 100%;
            max-width: 500px;
            outline: none;
            font-size: 14px;
            background: white;
            color: #333;
        }

        .button-group{
display:flex;
align-items:center;
justify-content:center;
gap:16px;
width:100%;
}

        .yt-open {
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(255, 0, 0, 0.3);
        }

        .add-btn {
            background: #00f2fe;
            color: #000;
            padding: 0 30px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            height: 50px;
            flex-grow: 0;
        }

        /* Video Grid Fix */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        /* Mobile specific grid adjustment */
        @media (max-width: 400px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }

        .video-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            margin-bottom: 15px;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            border: none;
        }

        .complete-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: #e0e0e0;
            color: #333;
            transition: 0.3s;
        }

        .complete-btn.active {
            background: #2ecc71;
            color: white;
        }

        .remove-link {
            margin-top: 12px;
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 13px;
            text-decoration: underline;
            opacity: 0.8;
        }

html,body{
width:100%;
height:auto;
overflow-x:hidden;
}

.yt-box{
display:flex;
flex-direction:column;
align-items:center;
}

.tap-text{
font-size:12px;
margin-bottom:6px;
opacity:0.85;
}

.yt-open{
width:52px;
height:52px;
border-radius:50%;
background:#ff0000;
color:white;
border:none;
font-size:20px;
cursor:pointer;
box-shadow:0 0 15px rgba(255,0,0,0.6);
transition:transform 0.2s, box-shadow 0.2s;
}

.yt-open:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(255,0,0,0.9);
}
    </style>
</head>

<body>

<section class="study-section">
    <h2>My Study Playlist</h2>

    <div class="input-container">
        <input type="text" id="ytLink" placeholder="Paste YouTube Video URL or Playlist URL"> 
                                                                   <div class="button-group">

            <div class="yt-box">
<span class="tap-text">Tap To Open</span>
<button class="yt-open" onclick="openYouTube()" title="Open YouTube">▶</button>
</div>

            <button class="add-btn" onclick="addVideo()">+ Add to List</button>
        </div>
    </div>

    <div class="video-grid" id="videoContainer">
        </div>
</section>

<script>
    // Local Storage se data nikalna
    let videos = JSON.parse(localStorage.getItem("myVideos")) || [];
    let studyData = JSON.parse(localStorage.getItem("studyGraphData")) || [0,0,0,0,0,0,0];

    // URL se ID nikalne ka sahi tarika
    function extractVideoID(url) {
        if (!url) return false;
        try {
            let u = new URL(url);
            
            // Playlist ID check
            if (u.searchParams.get("list")) {
                return "playlist:" + u.searchParams.get("list");
            }
            // Regular Video ID check
            if (u.searchParams.get("v")) {
                return u.searchParams.get("v");
            }
            // Short URL (youtu.be)
            if (u.hostname === "youtu.be") {
                return u.pathname.substring(1);
            }
            // Live or Embed links
            if (u.pathname.includes("/live/") || u.pathname.includes("/embed/")) {
                return u.pathname.split("/").pop();
            }
            return false;
        } catch (e) {
            // URL object fails if no http/https is present, try manual check
            if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
            return false;
        }
    }

    function addVideo() {
        let input = document.getElementById("ytLink");
        let url = input.value.trim();
        let videoID = extractVideoID(url);

        if (videoID) {
            // Check for duplicates
            if (videos.some(v => v.id === videoID)) {
                alert("This video is already in your playlist!");
                return;
            }
            videos.push({ id: videoID, completed: false });
            saveAndRender();
            input.value = "";
        } else {
            alert("Please enter a valid YouTube link.");
        }
    }

    function deleteVideo(index) {
        if (confirm("Remove this from your playlist?")) {
            if(videos[index].completed) updateGraph(-1);
            videos.splice(index, 1);
            saveAndRender();
        }
    }

    function toggleComplete(index) {
        videos[index].completed = !videos[index].completed;
        updateGraph(videos[index].completed ? 1 : -1);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem("myVideos", JSON.stringify(videos));
        let container = document.getElementById("videoContainer");
        container.innerHTML = "";

        if (videos.length === 0) {
            container.innerHTML = "<p style='opacity:0.5; grid-column: 1/-1;'>No videos added yet. Start learning!</p>";
        }

        videos.forEach((video, index) => {
            let isDone = video.completed ? "active" : "";
            let btnText = video.completed ? "Completed ✔" : "Mark as Finished";
            
            // Embed URL logic
            let embedURL = video.id.startsWith('playlist:') 
                ? `https://www.youtube.com/embed/videoseries?list=${video.id.replace('playlist:','')}`
                : `https://www.youtube.com/embed/${video.id}`;

            let html = `
                <div class="video-card">
                    <div class="iframe-container">
                        <iframe src="${embedURL}" loading="lazy" allowfullscreen></iframe>
                    </div>
                    <button class="complete-btn ${isDone}" onclick="toggleComplete(${index})">${btnText}</button>
                    <button class="remove-link" onclick="deleteVideo(${index})">Remove Video</button>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    function updateGraph(val) {
        let day = new Date().getDay();
        studyData[day] += val;
        if (studyData[day] < 0) studyData[day] = 0;
        localStorage.setItem("studyGraphData", JSON.stringify(studyData));
    }

    function openYouTube() {
        window.open("https://www.youtube.com", "_blank");
    }

    // Initial Load
    window.onload = saveAndRender;
</script>

</body>
</html>
