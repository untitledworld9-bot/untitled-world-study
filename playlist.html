<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Study Playlist | Untitled World</title>
    <link rel="icon" href="/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
            padding-bottom: 50px; /* Mobile spacing */
        }

        .study-section {
            text-align: center;
            padding: 20px 5%;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 400;
            font-size: 1.2rem;
            color: #00f2fe;
        }

        /* Mobile Responsive Input Container */
        .input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        input {
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            width: 100%;
            max-width: 500px;
            outline: none;
            font-size: 14px;
            background: white;
            color: #333;
        }

        .button-group{
display:flex;
align-items:center;
justify-content:center;
gap:16px;
width:100%;
}

        .yt-open {
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(255, 0, 0, 0.3);
        }

        .add-btn {
            background: #00f2fe;
            color: #000;
            padding: 0 30px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            height: 50px;
            flex-grow: 0;
        }

        /* Video Grid Fix */
        .video-row{
display:flex;
gap:16px;
overflow-x:auto;
scroll-snap-type:x mandatory;
padding-bottom:10px;
}

.video-row::-webkit-scrollbar{
display:none;
}
        /* Mobile specific grid adjustment */
        @media (max-width: 400px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }

        .video-card{
min-width:280px;
max-width:340px;
width:100%;
padding:14px;
border-radius:18px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
flex-shrink:0;
scroll-snap-align:start;
}

        .complete-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: #e0e0e0;
            color: #333;
            transition: 0.3s;
        }

        .complete-btn.active {
            background: #2ecc71;
            color: white;
        }

        .remove-link{
margin-top:12px;
display:block;
margin-left:auto;
margin-right:auto;
text-align:center;
background:none;
border:none;
color:#ff4d4d;
cursor:pointer;
font-size:13px;
text-decoration:underline;
opacity:0.8;
}

html,body{
width:100%;
height:auto;
overflow-x:hidden;
}

.yt-box{
display:flex;
flex-direction:column;
align-items:center;
}

.tap-text{
font-size:12px;
margin-bottom:6px;
opacity:0.85;
}

.yt-open{
width:52px;
height:52px;
border-radius:50%;
background:#ff0000;
color:white;
border:none;
font-size:20px;
cursor:pointer;
box-shadow:0 0 15px rgba(255,0,0,0.6);
transition:transform 0.2s, box-shadow 0.2s;
}

.yt-open:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(255,0,0,0.9);
}

.subject-select{
height:50px;
border-radius:30px;
border:none;
padding:0 15px;
font-weight:600;
background:white;
color:#333;
}

.subject-section{
margin-top:35px;
text-align:left;
}

.subject-title{
font-size:18px;
margin-bottom:10px;
color:#00f2fe;
}

.horizontal-row{
display:flex;
gap:16px;
overflow-x:auto;
padding-bottom:10px;
scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;
}

.thumbnail{
position:relative;
width:100%;
padding-bottom:56.25%;
border-radius:12px;
overflow:hidden;
}

.thumbnail iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

.thumbnail img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

.play-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
color:white;
background:rgba(0,0,0,0.5);
border-radius:50%;
padding:10px 14px;
}

.progress-bar{
height:5px;
background:#333;
margin-top:6px;
border-radius:5px;
overflow:hidden;
}

.progress{
height:100%;
background:#00f2fe;
width:0%;
}

.complete-btn{
margin-top:10px;
}

.back-home-btn{
position:fixed;
bottom:20px;
right:20px;

width:55px;
height:55px;

background:#00f2fe;
color:#000;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:24px;
font-weight:bold;

box-shadow:0 0 20px rgba(0,242,254,0.8);

z-index:9999;

cursor:pointer;

transition:0.25s;
}

.back-home-btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px rgba(0,242,254,1);
}

.remove-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:99999;
}

.popup-box{
background:#1e2f36;
padding:25px;
border-radius:14px;
text-align:center;
width:260px;
}

.popup-btns{
margin-top:20px;
display:flex;
justify-content:space-between;
}

.popup-btns button{
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

.popup-btns button:last-child{
background:#ff4d4d;
color:white;
}

@media (min-width:900px){

.video-card{
min-width:420px;
max-width:420px;
}

.study-section{
max-width:900px;
margin:auto;
}

}
    </style>
</head>

<body>

<section class="study-section">
    <h2>My Study Playlist</h2>

    <div class="input-container">
        <input type="text" id="ytLink" placeholder="Paste YouTube Video URL or Playlist URL"> 
                                                                   <div class="button-group">

            <div class="yt-box">
<span class="tap-text">Tap To Open</span>
<button class="yt-open" onclick="openYouTube()" title="Open YouTube">▶</button>
</div>

<select id="subjectSelect" class="subject-select">
<option value="Physics">Physics</option>
<option value="Chemistry">Chemistry</option>
<option value="Maths">Maths</option>
<option value="Music">Music</option>
</select>
            <button class="add-btn" onclick="addVideo()">+ Add to List</button>
        </div>
    </div>

    <div class="video-grid" id="videoContainer">
        </div>
</section>

<h3>▶ Continue Watching</h3>
<div class="video-row" id="continueRow"></div>

<h3>🎧 Study Music</h3>
<div class="video-row" id="musicRow"></div>

<div id="removePopup" class="remove-popup">
<div class="popup-box">
<p>Remove this from your playlist?</p>

<div class="popup-btns">
<button onclick="closePopup()">Cancel</button>
<button id="confirmDelete">Remove</button>
</div>

</div>
</div>

<div id="errorPopup" class="remove-popup">
<div class="popup-box">
<p>Please enter a valid YouTube link</p>

<div class="popup-btns">
<button onclick="closeError()">OK</button>
</div>

</div>
</div>

<script>

     let currentVideo = null;
     
    // Local Storage se data nikalna
    let videos = JSON.parse(localStorage.getItem("myVideos"));

if(!Array.isArray(videos)){
videos=[];
}
    let studyData = JSON.parse(localStorage.getItem("studyGraphData")) || [0,0,0,0,0,0,0];

    // URL se ID nikalne ka sahi tarika
    function extractVideoID(url) {
        if (!url) return false;
        try {
            let u = new URL(url);
            
            // Playlist ID check
            if (u.searchParams.get("list")) {
                return "playlist:" + u.searchParams.get("list");
            }
            // Regular Video ID check
            if (u.searchParams.get("v")) {
                return u.searchParams.get("v");
            }
            // Short URL (youtu.be)
            if (u.hostname === "youtu.be") {
                return u.pathname.substring(1);
            }
            // Live or Embed links
            if (u.pathname.includes("/live/") || u.pathname.includes("/embed/")) {
                return u.pathname.split("/").pop();
            }
            return false;
        } catch (e) {
            // URL object fails if no http/https is present, try manual check
            if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
            return false;
        }
    }

    function addVideo() {
        let input = document.getElementById("ytLink");
        let url = input.value.trim();
        let videoID = extractVideoID(url);
        let subject = document.getElementById("subjectSelect").value;

        if (videoID) {
            // Check for duplicates
            if (videos.some(v => v.id === videoID)) {
                showError();
                return;
            }
            videos.push({
id: videoID,
completed:false,
subject:subject
});
            saveAndRender();
            input.value = "";
        } else {
            alert("Please enter a valid YouTube link.");
        }
    }

    let deleteIndex=null;

function deleteVideo(index){
deleteIndex=index;
document.getElementById("removePopup").style.display="flex";
}

function closePopup(){
document.getElementById("removePopup").style.display="none";
}

document.getElementById("confirmDelete").onclick=function(){

if(deleteIndex!=null){

if(videos[deleteIndex].completed) updateGraph(-1);

videos.splice(deleteIndex,1);

saveAndRender();

closePopup();

}

}

    function toggleComplete(index) {
        videos[index].completed = !videos[index].completed;
        updateGraph(videos[index].completed ? 1 : -1);
        saveAndRender();
    }

    function saveAndRender(){

localStorage.setItem("myVideos", JSON.stringify(videos));

let continueRow = document.getElementById("continueRow");
continueRow.innerHTML="";

const watching = videos.filter(v=>!v.completed);

watching.forEach(video=>{

let thumb = video.id.startsWith('playlist')
? `https://img.youtube.com/vi/${video.id.replace('playlist:','')}/hqdefault.jpg`
: `https://i.ytimg.com/vi/${video.id}/hqdefault.jpg`;

let card=document.createElement("div");

card.className="video-card";

card.innerHTML=`

<div class="thumbnail" onclick="playVideo('${video.id}',this)">
<img src="${thumb}">
<div class="play-overlay">▶</div>
</div>

`;

continueRow.appendChild(card);

});

let container = document.getElementById("videoContainer");
container.innerHTML="";

if(videos.length===0){

container.innerHTML="<p style='opacity:0.5;'>No videos added yet. Start learning!</p>";
return;

}

const subjects=["Physics","Chemistry","Maths"];

subjects.forEach(sub=>{

const list = videos.filter(v=>v.subject===sub);

if(list.length===0) return;

let section=document.createElement("div");
section.className="subject-section";

section.innerHTML=`
<div class="subject-title">${sub}</div>
<div class="horizontal-row" id="row-${sub}"></div>
`;

container.appendChild(section);

let row = section.querySelector(".horizontal-row");

list.forEach((video,index)=>{

let embedURL = video.id.startsWith('playlist:')
? `https://www.youtube.com/embed/videoseries?list=${video.id.replace('playlist:','')}`
: `https://i.ytimg.com/vi/${video.id}/hqdefault.jpg`;

let card=document.createElement("div");

card.className="video-card";

card.innerHTML=`

<div class="thumbnail" onclick="playVideo('${video.id}',this)">

<img src="${embedURL}">

<div class="play-overlay">▶</div>

</div>

<div class="progress-bar">
<div class="progress" style="width:${video.completed?100:0}%"></div>
</div>

<button class="complete-btn ${video.completed?'active':''}" onclick="toggleComplete(${videos.indexOf(video)})">
${video.completed?"Completed ✔":"Mark Complete"}
</button>

<button class="remove-link" onclick="deleteVideo(${videos.indexOf(video)})">
Remove Video
</button>

`;

row.appendChild(card);

});

});

}

    function updateGraph(val) {
        let day = new Date().getDay();
        studyData[day] += val;
        if (studyData[day] < 0) studyData[day] = 0;
        localStorage.setItem("studyGraphData", JSON.stringify(studyData));
    }

    function openYouTube() {
        window.open("https://www.youtube.com", "_blank");
    }

    // Initial Load
    window.onload = saveAndRender;

    function playVideo(id,el){

let saved = localStorage.getItem("time_"+id) || 0;

let embed = id.startsWith("playlist:")
? `https://www.youtube.com/embed/videoseries?list=${id.replace('playlist:','')}&autoplay=1&start=${saved}`
: `https://www.youtube.com/embed/${id}?autoplay=1&start=${saved}`;

el.innerHTML = `
<iframe src="${embed}" allow="autoplay" allowfullscreen></iframe>
`;

document.querySelector(".back-home-btn").style.display="none";

currentVideo = id;

}

document.addEventListener("click",(e)=>{

if(e.target.closest("iframe")==null){

document.querySelector(".back-home-btn").style.display="flex";

}

});

// MUSIC SECTION
const musicList = videos.filter(v=>v.subject==="Music");

const musicRow = document.getElementById("musicRow");

musicRow.innerHTML="";

musicList.forEach(video=>{

let thumb = video.id.startsWith('playlist:')
? `https://img.youtube.com/vi/${video.id.replace('playlist:','')}/hqdefault.jpg`
: `https://i.ytimg.com/vi/${video.id}/hqdefault.jpg`;

let card=document.createElement("div");

card.className="video-card";

card.innerHTML=`

<div class="thumbnail" onclick="playVideo('${video.id}',this)">

<img src="${thumb}">

<div class="play-overlay">▶</div>

</div>

<div class="progress-bar">
<div class="progress" style="width:${video.completed?100:0}%"></div>
</div>

<button class="complete-btn ${video.completed?'active':''}"
onclick="toggleComplete(${videos.indexOf(video)})">
${video.completed?"Completed ✔":"Mark Complete"}
</button>

<button class="remove-link"
onclick="deleteVideo(${videos.indexOf(video)})">
Remove Video
</button>

`;

musicRow.appendChild(card);

});

window.addEventListener("message",(e)=>{

if(typeof e.data === "string" && e.data.includes("ended")){

playNext();

}

});

function playNext(){

let index = videos.findIndex(v=>v.id===currentVideo);

if(index>=0 && index < videos.length-1){

let next = videos[index+1];

playVideo(next.id,null);

}

}

let startX=0;

document.addEventListener("touchstart",(e)=>{

startX = e.touches[0].clientX;

});

document.addEventListener("touchend",(e)=>{

let endX = e.changedTouches[0].clientX;

if(startX-endX > 80){

playNext();

}

if(endX-startX > 80){

let index = videos.findIndex(v=>v.id===currentVideo);

if(index>0){

playVideo(videos[index-1].id,null);

}

}

});

function goHome(){
window.location.href="index.html";
}

function showError(){
document.getElementById("errorPopup").style.display="flex";
}

function closeError(){
document.getElementById("errorPopup").style.display="none";
}

</script>

<div class="back-home-btn" onclick="goHome()">
Back
</div>

</body>
</html>
