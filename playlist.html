            <div class="yt-box">
<span class="tap-text">Tap To Open</span>
<button class="yt-open" onclick="openYouTube()" title="Open YouTube">▶</button>

<select id="subjectSelect" class="subject-select">

<div class="video-row" id="musicRow"></div>

<p>Remove this from your playlist?</p>

<button onclick="closePopup()">Cancel</button>

</div>

</div>
</div>

</div>

</div>

<script>

     let currentVideo = null;
     
    // Local Storage se data nikalna
    let videos = JSON.parse(localStorage.getItem("myVideos"));

if(!Array.isArray(videos)){
videos=[];
}
    let studyData = JSON.parse(localStorage.getItem("studyGraphData")) || [0,0,0,0,0,0,0];

    // URL se ID nikalne ka sahi tarika
    function extractVideoID(url) {
        if (!url) return false;
        try {
            let u = new URL(url);
            
                        // Playlist ID check
            if (u.searchParams.get("list")) {
                let listId = u.searchParams.get("list");
                let vidId = u.searchParams.get("v");
                // Agar playlist link ke andar video bhi hai, toh dono save karo
                if (vidId) return "playlist:" + listId + ":" + vidId;
                return "playlist:" + listId;
            }
            // Regular Video ID check
            if (u.searchParams.get("v")) {
                return u.searchParams.get("v");
            }
            // Short URL (youtu.be)
            if (u.hostname === "youtu.be") {
                return u.pathname.substring(1);
            }
            // Live or Embed links
            if (u.pathname.includes("/live/") || u.pathname.includes("/embed/")) {
                return u.pathname.split("/").pop();
            }
            return false;
        } catch (e) {
            // URL object fails if no http/https is present, try manual check
            if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
            return false;
        }
    }

    function addVideo() {
        let input = document.getElementById("ytLink");
        let url = input.value.trim();
        let videoID = extractVideoID(url);
        let subject = document.getElementById("subjectSelect").value;

        if (videoID) {
            // Check for duplicates
            if (videos.some(v => v.id === videoID)) {
                showError("This video is already in your playlist");
                return;
            }
            videos.push({
id: videoID,
completed:false,
subject:subject
});
            saveAndRender();
            showSuccess(subject);
            input.value = "";
        } else {
showError("Please enter a valid YouTube link");
}
    }

    let deleteIndex=null;

function deleteVideo(index){
deleteIndex=index;
document.getElementById("removePopup").style.display="flex";
}

function closePopup(){
document.getElementById("removePopup").style.display="none";
}

document.getElementById("confirmDelete").onclick=function(){

if(deleteIndex!=null){

if(videos[deleteIndex].completed) updateGraph(-1);

videos.splice(deleteIndex,1);

saveAndRender();

closePopup();

}

}

    function toggleComplete(index){

if(videos[index].completed) return;  // already completed

videos[index].completed=true;

updateGraph(1);

addXP();
updateDailyStreak();

saveAndRender();

}

    function saveAndRender(){

localStorage.setItem("myVideos", JSON.stringify(videos));

let continueRow = document.getElementById("continueRow");
continueRow.innerHTML="";

let lastVideo = localStorage.getItem("lastVideo");

let watching = videos.filter(v=>!v.completed);

if(lastVideo){
watching.sort((a,b)=> a.id===lastVideo ? -1 : 1);
}

watching.forEach(video=>{
    let card=document.createElement("div");
    card.className="video-card";
    
        if(video.id.startsWith("playlist:")) {
        let listId = video.id.split(":")[1]; 
        card.innerHTML=`
            <div class="thumbnail" onclick="playVideo('${video.id}',this)" style="position: relative;">
                <iframe src="https://www.youtube.com/embed/videoseries?list=${listId}" style="width: 100%; height: 100%; pointer-events: none; border: none;" allowfullscreen></iframe>
                <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5;"></div>
                <div class="play-overlay" style="z-index: 10;">▶</div>
            </div>
        `;
    } else {
        let thumb = `https://i.ytimg.com/vi/${video.id}/hqdefault.jpg`;
        card.innerHTML=`
            <div class="thumbnail" onclick="playVideo('${video.id}',this)">
                <img src="${thumb}">
                <div class="play-overlay">▶</div>
            </div>
        `;
    }
    continueRow.appendChild(card);
});

let container = document.getElementById("videoContainer");
container.innerHTML="";

if(videos.length===0){

container.innerHTML="<p style='opacity:0.5;'>No videos added yet. Start learning!</p>";
return;

}

const subjects=["Physics","Chemistry","Maths"];

subjects.forEach(sub=>{

const list = videos.filter(v=>v.subject===sub);

if(list.length===0) return;

let section=document.createElement("div");
section.className="subject-section";

section.innerHTML=`
<div class="subject-title">${sub}</div>
<div class="horizontal-row" id="row-${sub}"></div>
`;

container.appendChild(section);

let row = section.querySelector(".horizontal-row");

list.forEach((video,index)=>{
    let card=document.createElement("div");
    card.className="video-card";

    let thumbHTML = "";
    if(video.id.startsWith("playlist:")) {
        let listId = video.id.split(":")[1];
        thumbHTML = `
            <div class="thumbnail">
                <iframe src="https://www.youtube.com/embed/videoseries?list=${listId}" allowfullscreen></iframe>
            </div>
        `;
    } else {
        let thumb = `https://i.ytimg.com/vi/${video.id}/hqdefault.jpg`;
        thumbHTML = `
            <div class="thumbnail" onclick="playVideo('${video.id}',this)">
                <img src="${thumb}">
                <div class="play-overlay">▶</div>
            </div>
        `;
    }

    card.innerHTML = thumbHTML + `
        <div class="progress-bar">

    function updateGraph(val) {

function updateDailyStreak(){

let today = new Date().toDateString();

let last = localStorage.getItem("lastStreakDay");

let count = parseInt(localStorage.getItem("dailyStreak")||0);

if(last===today) return;

count++;

if(count>7) count=1;

localStorage.setItem("dailyStreak",count);
localStorage.setItem("lastStreakDay",today);

renderStreak();

showFire();

}

        function playVideo(id,el){

let saved = localStorage.getItem("time_"+id) || 0;

    let vidId = parts[2];
    if(vidId) {
        embed = `https://www.youtube.com/embed/${vidId}?list=${listId}&autoplay=1&enablejsapi=1&start=${saved}`;
    } else {
        embed = `https://www.youtube.com/embed/videoseries?list=${listId}&autoplay=1&enablejsapi=1&start=${saved}`;
    }
} else {
    embed = `https://www.youtube.com/embed/${id}?autoplay=1&enablejsapi=1&start=${saved}`;
}

currentVideo = id;
localStorage.setItem("lastVideo", id);

// 1. Iframe ko thumbnail ki jagah naye Player Overlay me daalo

<iframe id="ytPlayer" src="${embed}&playsinline=1" allow="autoplay" allowfullscreen></iframe>

function updateXPBar(){
    let xp = parseInt(localStorage.getItem("xpPoints") || 0);
    let percent = 0;

    // Badge milestones ke hisaab se progress calculate karna
    if(xp < 50) {
        // Beginner (0 se 50)
        percent = (xp / 50) * 100;
    } else if (xp < 150) {
        // Rising Learner (50 se 150) - Beech ka gap 100 hai
        percent = ((xp - 50) / 100) * 100;
    } else if (xp < 300) {
        // Focused Learner (150 se 300) - Beech ka gap 150 hai
        percent = ((xp - 150) / 150) * 100;
    } else if (xp < 500) {
        // Study Master (300 se 500) - Beech ka gap 200 hai
        percent = ((xp - 300) / 200) * 100;
    } else {
        // Untitled Champion (Max Level) - Bar poora bhara rahega
        percent = 100;
    }

    let bar = document.getElementById("xpBar");
    if(bar){
        bar.style.width = percent + "%";
    }
}


function getLevel(){

let xp = parseInt(localStorage.getItem("xpPoints") || 0);

return Math.floor(xp/100)+1;

}

function updateBadge(){

let xp=parseInt(localStorage.getItem("xpPoints")||0);

let badge="🏅 Beginner";

if(xp>=500){
badge="🏆 Untitled Champion";
}
else if(xp>=300){
badge="⚡ Study Master";
}
else if(xp>=150){
badge="🔥 Focused Learner";
}
else if(xp>=50){
badge="⭐ Rising Learner";
}

let oldBadge=localStorage.getItem("userBadge");

if(oldBadge!==badge){
localStorage.setItem("userBadge",badge);
showBadgePopup("New Badge Unlocked: "+badge);
}

let box=document.getElementById("badgeBox");

if(box){
box.innerText=badge;
}

}

// --- SENSOR BASED AUTO-ROTATE (YOUTUBE APP STYLE) ---
let isVideoFullscreen = false;

// Track karo jab video fullscreen me jaye ya bahar aaye
document.addEventListener("fullscreenchange", () => {
    isVideoFullscreen = !!document.fullscreenElement;
    
    // Agar fullscreen se bahar aa gaya, toh orientation lock hata do
    if (!isVideoFullscreen) {
        if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock().catch(err => console.log(err));
        }
    }
});

// Phone ke physical movement (Gyroscope) ko track karo
window.addEventListener("deviceorientation", (event) => {
    // Ye code sirf tab chalega jab video fullscreen me ho
    if (!isVideoFullscreen) return;

    let gamma = event.gamma; // Phone ka Left/Right tilt
    let beta = event.beta;   // Phone ka Up/Down tilt

    if (!gamma || !beta) return; // Agar device me sensor nahi hai toh ignore karo

    // Agar phone ko teda (Landscape) pakda gaya hai (45 degrees se zyada tilt)
    if (Math.abs(gamma) > 45) {
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock("landscape").catch(err => console.log("Lock failed:", err));
        }
    } 
    // Agar phone ko seedha (Portrait) pakda gaya hai
    else if (Math.abs(beta) > 45 && Math.abs(gamma) < 30) {
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock("portrait").catch(err => console.log("Lock failed:", err));
        }
    }
});
