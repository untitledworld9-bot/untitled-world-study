<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Playlist | Untitled World</title>

<link rel="icon" href="/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
}

.site-title{
display:flex;
align-items:center;
font-size:clamp(18px,3.5vw,28px);
font-weight:700;
}

.logo-img{
width:36px;
height:36px;
border-radius:10px;
margin-right:10px;
}

.study-section{
text-align:center;
padding:30px 10%;
}

.input-container{
margin-bottom:25px;
}

input{
padding:15px;
border-radius:30px;
border:none;
width:70%;
max-width:500px;
margin-right:10px;
outline:none;
padding-left:20px;
}

.yt-open{
background:#ff0000;
color:white;
border:none;
border-radius:50%;
width:45px;
height:45px;
font-size:18px;
cursor:pointer;
margin-right:10px;
}

.add-btn{
background:#00f2fe;
color:#000;
padding:14px 30px;
border-radius:30px;
border:none;
font-weight:bold;
cursor:pointer;
}

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
margin-top:25px;
}

.video-card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
display:flex;
flex-direction:column;
align-items:center;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

iframe{
width:100%;
height:200px;
border-radius:15px;
border:none;
margin-bottom:15px;
}

.complete-btn{
width:100%;
padding:10px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
background:#e0e0e0;
color:#333;
}

.complete-btn.active{
background:#2ecc71;
color:white;
}

</style>

</head>

<body>

<header>
<h1 class="site-title">
<img src="/icon-512.png" class="logo-img">
Untitled World
</h1>
</header>

<section class="study-section">

<h2>Your Study Playlist</h2>

<div class="input-container">

<input type="text" id="ytLink" placeholder="Paste YouTube URL here (e.g. https://youtu.be/xyz...)">

<button class="yt-open" onclick="openYouTube()">▶</button>

<button class="add-btn" onclick="addVideo()">Add Video</button>

</div>

<div class="video-grid" id="videoContainer"></div>

</section>

<script>

let videos = JSON.parse(localStorage.getItem("myVideos")) || [];

function extractVideoID(url){
try{

let u=new URL(url);

if(u.searchParams.get("list")){
return "playlist:"+u.searchParams.get("list");
}

if(u.hostname.includes("youtu.be")){
return u.pathname.slice(1,12);
}

if(u.searchParams.get("v")){
return u.searchParams.get("v");
}

if(u.pathname.includes("/live/")){
return u.pathname.split("/live/")[1].substring(0,11);
}

if(u.pathname.includes("/embed/")){
return u.pathname.split("/embed/")[1].substring(0,11);
}

return false;

}catch{
return false;
}
}

function addVideo(){

let input=document.getElementById("ytLink");

let url=input.value.trim();

let videoID=extractVideoID(url);

if(videoID){

videos.push({id:videoID,completed:false});

saveAndRender();

input.value="";

}else{

alert("Please enter a valid YouTube URL");

}

}

function deleteVideo(index){

if(confirm("Delete this video?")){

videos.splice(index,1);

saveAndRender();

}

}

function toggleComplete(index){

videos[index].completed=!videos[index].completed;

if(videos[index].completed){
updateGraph(1);
}else{
updateGraph(-1);
}

saveAndRender();

}

function saveAndRender(){

localStorage.setItem("myVideos",JSON.stringify(videos));

let container=document.getElementById("videoContainer");

container.innerHTML="";

videos.forEach((video,index)=>{

let isDone=video.completed?"active":"";

let btnText=video.completed?"Completed ✔":"Mark Complete";

let html=`

<div class="video-card">

<iframe src="${
video.id.startsWith('playlist:')
? \`https://www.youtube.com/embed/videoseries?list=\${video.id.replace('playlist:','')}\`
: \`https://www.youtube.com/embed/\${video.id}\`
}"
loading="lazy"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>

<button class="complete-btn ${isDone}" onclick="toggleComplete(${index})">${btnText}</button>

<button onclick="deleteVideo(${index})"
style="margin-top:10px;background:none;border:none;color:white;opacity:0.6;cursor:pointer;font-size:12px;">
Remove
</button>

</div>

`;

container.innerHTML+=html;

});

}

window.onload=function(){
saveAndRender();
}

function openYouTube(){
window.open("https://m.youtube.com","_blank");
}

let studyData = JSON.parse(localStorage.getItem("studyGraphData")) || [0,0,0,0,0,0,0];

function updateGraph(val){

let day=new Date().getDay();

studyData[day]+=val;

if(studyData[day]<0)studyData[day]=0;

localStorage.setItem("studyGraphData",JSON.stringify(studyData));

}

</script>

</body>
</html>
