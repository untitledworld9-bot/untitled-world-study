<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mock Test — Study Grid Prep</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="/icon-192.png">
<meta name="theme-color" content="#0f2027">

<!-- AUTH GATE — no blink -->
<script>
(function(){
  var isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(isPWA && !localStorage.getItem("userName")){
    document.documentElement.style.display='none';
    window.location.replace("login.html");
  }
})();
</script>

<!-- THEME — instant -->
<script>
(function(){
  var saved = localStorage.getItem("theme");
  var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var theme = saved ? saved : (systemDark ? "dark" : "light");
  document.documentElement.setAttribute("data-theme", theme);
})();
</script>

<style>html{ visibility:hidden; } html[data-theme]{ visibility:visible; }</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">

<style>
/* =====================================================
   DESIGN SYSTEM — mirrors existing pages
===================================================== */
:root {
  --bg-start:       #ffffff;
  --bg-end:         #f0f4f8;
  --primary:        #22D3EE;
  --primary-dark:   #06B6D4;
  --secondary:      #34D399;
  --accent:         #F43F5E;
  --text-primary:   #111111;
  --text-secondary: #555555;
  --card-bg:        rgba(0,0,0,0.04);
  --card-border:    rgba(0,0,0,0.08);
  --header-bg:      #ffffff;
  --glass-bg:       rgba(0,0,0,0.03);
  --radius:         14px;
  --shadow:         0 4px 20px rgba(0,0,0,0.10);
  --transition:     0.25s ease;

  /* Exam palette */
  --q-grey:    #9CA3AF;
  --q-green:   #10B981;
  --q-purple:  #8B5CF6;
  --q-red:     #EF4444;
  --q-orange:  #F59E0B;
}

[data-theme="dark"] {
  --bg-start:       #0B1220;
  --bg-end:         #0F172A;
  --text-primary:   #E2E8F0;
  --text-secondary: #94A3B8;
  --card-bg:        rgba(255,255,255,0.04);
  --card-border:    rgba(255,255,255,0.08);
  --header-bg:      rgba(11,18,32,0.98);
  --glass-bg:       rgba(255,255,255,0.04);
  --shadow:         0 4px 20px rgba(0,0,0,0.35);
}

/* =====================================================
   BASE
===================================================== */
*, *::before, *::after {
  margin:0; padding:0; box-sizing:border-box;
  font-family:'Poppins', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html { background: var(--bg-start); height:100%; overflow:hidden; }

body {
  background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  overscroll-behavior-y: none;
}

/* =====================================================
   PAGE TRANSITION
===================================================== */
#pageTransition {
  position:fixed; inset:0;
  background: var(--bg-start);
  z-index:99999; opacity:0;
  pointer-events:none; transition:opacity 0.22s ease;
}
#pageTransition.leaving { opacity:1; pointer-events:all; }

/* =====================================================
   LOADING SCREEN
===================================================== */
#loadingScreen {
  position:fixed; inset:0; z-index:9999;
  background: linear-gradient(160deg, var(--bg-start), var(--bg-end));
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:20px;
  transition: opacity 0.4s ease;
}
#loadingScreen.hidden { opacity:0; pointer-events:none; }

.loading-logo {
  font-size:18px; font-weight:700; color:var(--primary);
  letter-spacing:0.03em;
}
.loading-text {
  font-size:14px; font-weight:500; color:var(--text-secondary);
  animation: loadingPulse 1.4s ease infinite;
}
@keyframes loadingPulse {
  0%,100% { opacity:0.5; } 50% { opacity:1; }
}
.loading-bar-wrap {
  width:200px; height:3px;
  background: var(--card-border);
  border-radius:99px; overflow:hidden;
}
.loading-bar-fill {
  height:100%;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  border-radius:99px;
  animation: loadBar 1.8s ease-in-out infinite;
}
@keyframes loadBar {
  0% { width:0%; margin-left:0; }
  50% { width:60%; margin-left:20%; }
  100% { width:0%; margin-left:100%; }
}

/* =====================================================
   NTA-STYLE HEADER (sticky)
===================================================== */
#examHeader {
  display:flex; align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  background: var(--header-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--card-border);
  flex-shrink:0; z-index:900;
  gap:10px;
  min-height:54px;
}

.hdr-exam-name {
  font-size:13px; font-weight:700;
  color: var(--primary);
  letter-spacing:0.05em;
  text-transform:uppercase;
  flex-shrink:0;
  max-width:90px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

.hdr-center {
  flex:1; text-align:center;
  font-size:13px; font-weight:600;
  color: var(--text-primary);
  letter-spacing:0.02em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

.hdr-right {
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}

/* Timer */
#timerBox {
  display:flex; align-items:center; gap:6px;
  background: var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:10px; padding:6px 12px;
  font-size:14px; font-weight:700;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
  letter-spacing:0.04em;
  transition: background 0.3s, color 0.3s;
  min-width:80px; text-align:center;
}
#timerBox.warning {
  background: rgba(245,158,11,0.12);
  border-color: rgba(245,158,11,0.4);
  color: #F59E0B;
}
#timerBox.danger {
  background: rgba(239,68,68,0.12);
  border-color: rgba(239,68,68,0.4);
  color: #EF4444;
  animation: timerPulse 1s ease infinite;
}
@keyframes timerPulse {
  0%,100%{opacity:1;} 50%{opacity:0.6;}
}

.timer-icon { font-size:12px; }

/* Profile avatar */
.hdr-avatar {
  width:34px; height:34px; border-radius:50%;
  background: linear-gradient(135deg, #22D3EE, #06B6D4);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:#0B1220;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(34,211,238,0.35);
}

/* =====================================================
   SECTION TABS
===================================================== */
#sectionTabs {
  display:flex; align-items:center;
  gap:0; flex-shrink:0;
  background: var(--header-bg);
  border-bottom: 1px solid var(--card-border);
  overflow-x:auto; overflow-y:hidden;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#sectionTabs::-webkit-scrollbar { display:none; }

.sec-tab {
  flex-shrink:0; padding:10px 18px;
  font-size:12px; font-weight:600;
  color: var(--text-secondary);
  background: none; border:none;
  border-bottom: 2.5px solid transparent;
  cursor:pointer; transition: all 0.2s;
  white-space:nowrap; scroll-snap-align:start;
  letter-spacing:0.03em;
}
.sec-tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
  background: rgba(34,211,238,0.05);
}
.sec-tab:active { opacity:0.7; }

/* JEE sub-section badge */
.sec-badge {
  display:inline-block;
  font-size:9px; font-weight:700;
  background: var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:4px; padding:1px 5px;
  margin-left:5px; vertical-align:middle;
  color: var(--text-secondary);
}

/* =====================================================
   LAYOUT — question area + side panel
===================================================== */
#examBody {
  flex:1; display:flex;
  overflow:hidden;
  position:relative;
}

/* LEFT: Question panel */
#questionPanel {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:16px;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}
#questionPanel::-webkit-scrollbar { width:3px; }
#questionPanel::-webkit-scrollbar-track { background:transparent; }
#questionPanel::-webkit-scrollbar-thumb { background:var(--card-border); border-radius:99px; }

/* RIGHT: Palette drawer (desktop always visible, mobile drawer) */
#paletteDrw {
  width:220px; flex-shrink:0;
  background: var(--header-bg);
  border-left: 1px solid var(--card-border);
  display:flex; flex-direction:column;
  overflow:hidden;
  transition: transform 0.3s ease;
}

/* =====================================================
   MOBILE — palette is a bottom drawer
===================================================== */
@media(max-width:700px){
  #paletteDrw {
    position:fixed; bottom:0; left:0; right:0;
    width:100%; height:auto; max-height:75vh;
    border-left:none;
    border-top: 1px solid var(--card-border);
    border-radius:18px 18px 0 0;
    z-index:800;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 -8px 32px rgba(0,0,0,0.18);
  }
  #paletteDrw.open { transform: translateY(0); }

  #paletteOverlay {
    display:block;
    position:fixed; inset:0;
    background: rgba(0,0,0,0.45);
    z-index:799;
    opacity:0; pointer-events:none;
    transition: opacity 0.3s ease;
  }
  #paletteOverlay.open { opacity:1; pointer-events:all; }

  /* Palette toggle button (floating) */
  #paletteToggleBtn {
    display:flex;
  }
}
@media(min-width:701px){
  #paletteToggleBtn { display:none; }
  #paletteOverlay { display:none !important; }
}

/* Palette drag handle */
.palette-handle {
  display:none; justify-content:center; padding:10px 0 6px;
  flex-shrink:0;
}
@media(max-width:700px){ .palette-handle { display:flex; } }
.palette-handle-bar {
  width:40px; height:4px; border-radius:99px;
  background: var(--card-border);
}

/* Palette header */
.palette-hdr {
  padding:10px 14px 8px;
  font-size:12px; font-weight:700;
  color: var(--text-secondary);
  letter-spacing:0.06em; text-transform:uppercase;
  border-bottom: 1px solid var(--card-border);
  flex-shrink:0;
}

/* Palette legend */
.palette-legend {
  display:flex; flex-wrap:wrap; gap:6px;
  padding:10px 14px;
  border-bottom: 1px solid var(--card-border);
  flex-shrink:0;
}
.legend-item {
  display:flex; align-items:center; gap:5px;
  font-size:10px; color:var(--text-secondary);
}
.legend-dot {
  width:12px; height:12px; border-radius:3px;
}

/* Palette grid */
#paletteGrid {
  display:flex; flex-wrap:wrap;
  gap:7px; padding:12px 14px;
  overflow-y:auto; flex:1;
  -webkit-overflow-scrolling:touch;
}
#paletteGrid::-webkit-scrollbar { width:3px; }
#paletteGrid::-webkit-scrollbar-thumb { background:var(--card-border); border-radius:99px; }

.q-bubble {
  width:34px; height:34px;
  border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700;
  cursor:pointer;
  border: 1.5px solid transparent;
  transition: transform 0.15s, box-shadow 0.15s;
  flex-shrink:0;
}
.q-bubble:active { transform:scale(0.9); }

/* Bubble states */
.q-bubble.not-visited  { background:rgba(156,163,175,0.15); border-color:var(--q-grey); color:var(--q-grey); }
.q-bubble.answered     { background:rgba(16,185,129,0.18);  border-color:var(--q-green);  color:var(--q-green); }
.q-bubble.marked       { background:rgba(139,92,246,0.18);  border-color:var(--q-purple); color:var(--q-purple); }
.q-bubble.not-answered { background:rgba(239,68,68,0.18);   border-color:var(--q-red);    color:var(--q-red); }
.q-bubble.current {
  box-shadow: 0 0 0 2.5px var(--primary);
  transform:scale(1.12);
}

/* =====================================================
   QUESTION CARD
===================================================== */
.question-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding:18px;
  margin-bottom:14px;
  animation: qIn 0.25s ease;
}
@keyframes qIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

.q-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px; gap:10px;
}
.q-num {
  font-size:12px; font-weight:700;
  color: var(--primary);
  letter-spacing:0.05em;
  text-transform:uppercase;
}
.q-type-badge {
  font-size:10px; font-weight:600;
  padding:3px 9px; border-radius:99px;
  background: var(--card-bg);
  border:1px solid var(--card-border);
  color: var(--text-secondary);
  letter-spacing:0.04em;
}
.q-marks {
  font-size:11px; color: var(--text-secondary);
  margin-left:auto;
}

.q-text {
  font-size:14px; line-height:1.7;
  color: var(--text-primary);
  margin-bottom:18px;
  user-select:text; -webkit-user-select:text;
  word-break:break-word;
}

/* OPTIONS — NTA style */
.options-list {
  display:flex; flex-direction:column; gap:10px;
}

.option-item {
  display:flex; align-items:flex-start; gap:12px;
  padding:13px 15px;
  background: var(--glass-bg);
  border:1.5px solid var(--card-border);
  border-radius:12px;
  cursor:pointer;
  transition: all 0.18s ease;
  position:relative;
  user-select:none;
}
.option-item:active { transform:scale(0.985); }
.option-item.selected {
  background: rgba(34,211,238,0.08);
  border-color: var(--primary);
}
.option-item.selected .opt-letter {
  background: var(--primary);
  color: #0B1220;
  border-color: var(--primary);
}

/* Integer input */
.int-input-wrap { margin-top:6px; }
.int-input {
  width:140px; padding:12px 16px;
  background: var(--glass-bg);
  border: 1.5px solid var(--card-border);
  border-radius:12px;
  font-size:18px; font-weight:700;
  color: var(--text-primary);
  outline:none; text-align:center;
  transition: border-color 0.2s;
  font-variant-numeric: tabular-nums;
  -webkit-appearance:none;
}
.int-input:focus { border-color: var(--primary); }
.int-input.filled { border-color: var(--q-green); }

.opt-letter {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700;
  background: var(--glass-bg);
  border:1.5px solid var(--card-border);
  color: var(--text-secondary);
  flex-shrink:0;
  transition: all 0.18s;
}
.opt-text {
  font-size:13px; line-height:1.55;
  color: var(--text-primary);
  flex:1; word-break:break-word;
  padding-top:2px;
}

/* =====================================================
   CONTROLS BAR
===================================================== */
#controlsBar {
  display:flex; align-items:center;
  gap:8px; padding:10px 14px;
  background: var(--header-bg);
  border-top: 1px solid var(--card-border);
  flex-shrink:0;
  flex-wrap:wrap;
}

.ctrl-btn {
  padding:9px 14px;
  border-radius:10px;
  font-size:12px; font-weight:600;
  border:none; cursor:pointer;
  transition: all 0.18s;
  display:flex; align-items:center; gap:6px;
  letter-spacing:0.02em;
  flex-shrink:0;
}
.ctrl-btn:active { transform:scale(0.94); }

.btn-prev {
  background: var(--card-bg);
  border:1px solid var(--card-border);
  color: var(--text-primary);
}
.btn-save {
  background: var(--primary);
  color: #0B1220; font-weight:700;
  box-shadow:0 3px 12px rgba(34,211,238,0.3);
}
.btn-save:hover { background: var(--primary-dark); }
.btn-mark {
  background: rgba(139,92,246,0.12);
  border:1px solid rgba(139,92,246,0.3);
  color: var(--q-purple);
}
.btn-clear {
  background: rgba(239,68,68,0.08);
  border:1px solid rgba(239,68,68,0.25);
  color: var(--q-red);
}
.btn-palette {
  background: var(--card-bg);
  border:1px solid var(--card-border);
  color: var(--text-secondary);
  margin-left:auto;
}
.btn-submit {
  background: linear-gradient(135deg, var(--accent), #e11d48);
  color: #fff; font-weight:700;
  box-shadow:0 3px 12px rgba(244,63,94,0.3);
  padding:9px 16px;
}

/* =====================================================
   EMPTY / NO QUESTIONS STATE
===================================================== */
.no-questions {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; padding:60px 24px;
  text-align:center;
}
.no-q-icon { font-size:40px; color:var(--text-secondary); }
.no-q-title { font-size:16px; font-weight:600; color:var(--text-primary); }
.no-q-sub { font-size:13px; color:var(--text-secondary); }

/* =====================================================
   CONFIRM / SUBMIT MODAL
===================================================== */
.modal-overlay {
  position:fixed; inset:0; z-index:9000;
  background: rgba(0,0,0,0.55);
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none;
  transition: opacity 0.25s ease;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal-overlay.open .modal-sheet { transform:translateY(0); }

.modal-sheet {
  background: var(--header-bg);
  border-radius:20px 20px 0 0;
  padding:24px 20px 32px;
  width:100%; max-width:500px;
  transform:translateY(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
  border:1px solid var(--card-border);
}
.modal-drag {
  width:40px; height:4px; border-radius:99px;
  background: var(--card-border);
  margin:0 auto 20px;
}
.modal-title {
  font-size:17px; font-weight:700;
  color:var(--text-primary); margin-bottom:10px;
  text-align:center;
}
.modal-sub {
  font-size:13px; color:var(--text-secondary);
  text-align:center; line-height:1.6; margin-bottom:20px;
}
.submit-stats {
  display:flex; gap:10px; margin-bottom:20px;
  flex-wrap:wrap; justify-content:center;
}
.stat-pill {
  display:flex; align-items:center; gap:6px;
  padding:8px 14px; border-radius:10px;
  font-size:12px; font-weight:600;
  background:var(--card-bg); border:1px solid var(--card-border);
  color:var(--text-primary);
}
.stat-pill .dot {
  width:10px; height:10px; border-radius:3px; flex-shrink:0;
}
.modal-actions {
  display:flex; gap:10px;
}
.modal-btn {
  flex:1; padding:13px;
  border-radius:12px; border:none;
  font-size:14px; font-weight:700;
  cursor:pointer; transition:all 0.18s;
}
.modal-btn:active { transform:scale(0.97); }
.modal-cancel-btn {
  background: var(--card-bg);
  border:1px solid var(--card-border);
  color: var(--text-primary);
}
.modal-confirm-btn {
  background: var(--accent);
  color:#fff;
  box-shadow:0 4px 14px rgba(244,63,94,0.3);
}

/* =====================================================
   PALETTE TOGGLE FLOATING BUTTON (mobile)
===================================================== */
#paletteToggleBtn {
  align-items:center; gap:6px;
  padding:9px 14px;
  border-radius:10px;
  font-size:12px; font-weight:600;
  background: var(--card-bg);
  border:1px solid var(--card-border);
  color: var(--text-secondary);
  cursor:pointer; transition:all 0.18s;
}

/* =====================================================
   TOAST
===================================================== */
#toastWrap {
  position:fixed; bottom:120px; left:50%;
  transform:translateX(-50%);
  z-index:9999; display:flex;
  flex-direction:column; align-items:center; gap:8px;
  pointer-events:none;
}
.toast-msg {
  background: var(--text-primary);
  color: var(--bg-start);
  padding:9px 18px; border-radius:99px;
  font-size:12px; font-weight:600;
  animation: toastIn 0.22s ease, toastOut 0.22s ease 1.8s forwards;
  white-space:nowrap;
}
@keyframes toastIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(-6px)} }

/* =====================================================
   PALETTE SUMMARY FOOTER (inside palette)
===================================================== */
.palette-stats {
  padding:10px 14px;
  border-top: 1px solid var(--card-border);
  display:flex; flex-wrap:wrap; gap:8px;
  flex-shrink:0;
}
.p-stat {
  font-size:10px; font-weight:600;
  color: var(--text-secondary);
  display:flex; align-items:center; gap:4px;
}
.p-stat-val { font-weight:700; color:var(--text-primary); }
</style>
</head>

<body>

<!-- Loading Screen -->
<div id="loadingScreen">
  <div class="loading-logo">Study Grid Prep</div>
  <div class="loading-text">Preparing your test...</div>
  <div class="loading-bar-wrap"><div class="loading-bar-fill"></div></div>
</div>

<!-- Page Transition -->
<div id="pageTransition"></div>

<!-- Palette overlay (mobile) -->
<div id="paletteOverlay" onclick="closePalette()"></div>

<!-- ===== NTA HEADER ===== -->
<header id="examHeader">
  <div class="hdr-exam-name" id="hdrExamName">CUET</div>
  <div class="hdr-center">Study Grid Prep</div>
  <div class="hdr-right">
    <div id="timerBox"><span class="timer-icon"><i class="fa-regular fa-clock"></i></span><span id="timerVal">60:00</span></div>
    <div class="hdr-avatar" id="hdrAvatar">S</div>
  </div>
</header>

<!-- ===== SECTION TABS ===== -->
<div id="sectionTabs"></div>

<!-- ===== EXAM BODY ===== -->
<div id="examBody">

  <!-- LEFT: Question Panel -->
  <div id="questionPanel">
    <div id="questionContent"></div>
  </div>

  <!-- RIGHT: Palette -->
  <div id="paletteDrw">
    <div class="palette-handle"><div class="palette-handle-bar"></div></div>
    <div class="palette-hdr">Question Palette</div>

    <div class="palette-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--q-grey);"></div>Not Visited</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--q-green);"></div>Answered</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--q-purple);"></div>Marked</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--q-red);"></div>Not Answered</div>
    </div>

    <div id="paletteGrid"></div>

    <div class="palette-stats" id="paletteStats"></div>
  </div>

</div>

<!-- ===== CONTROLS BAR ===== -->
<div id="controlsBar">
  <button class="ctrl-btn btn-prev" onclick="prevQuestion()">
    <i class="fa-solid fa-chevron-left"></i> Prev
  </button>
  <button class="ctrl-btn btn-clear" onclick="clearResponse()">
    <i class="fa-solid fa-eraser"></i> Clear
  </button>
  <button class="ctrl-btn btn-mark" onclick="markForReview()">
    <i class="fa-solid fa-bookmark"></i> Mark
  </button>
  <button class="ctrl-btn btn-save" onclick="saveAndNext()">
    Save &amp; Next <i class="fa-solid fa-chevron-right"></i>
  </button>
  <button class="ctrl-btn btn-palette" id="paletteToggleBtn" onclick="togglePalette()">
    <i class="fa-solid fa-grip"></i> Palette
  </button>
  <button class="ctrl-btn btn-submit" onclick="openSubmitModal()">
    <i class="fa-solid fa-flag-checkered"></i> Submit
  </button>
</div>

<!-- ===== SUBMIT MODAL ===== -->
<div class="modal-overlay" id="submitModal" onclick="handleModalBg(event)">
  <div class="modal-sheet">
    <div class="modal-drag"></div>
    <div class="modal-title">Submit Test?</div>
    <div class="modal-sub" id="submitModalSub">You are about to submit the test. Please review your answers.</div>
    <div class="submit-stats" id="submitStats"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-cancel-btn" onclick="closeSubmitModal()">Review</button>
      <button class="modal-btn modal-confirm-btn" onclick="submitTest()">Submit Now</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toastWrap"></div>

<!-- Theme.js -->
<script src="theme.js"></script>

<!-- Main Script -->
<script type="module">
import {
  auth, onAuthStateChanged,
  db, collection, getDocs, query, where, addDoc, doc, setDoc, serverTimestamp
} from './firebase.js';

/* =====================================================
   STATE
===================================================== */
const STATE = {
  user: null,
  exam: '',       // cuet | jee
  year: null,
  shift: '',
  subjects: [],   // array of subject strings

  sections: [],   // [{subject, section?, questions:[]}]
  currentSec: 0,
  currentQ: 0,    // index within current section

  // answers[subject][qNo] = {answer, marked, visited, type}
  answers: {},

  timer: null,
  totalSeconds: 0,
  remainingSeconds: 0,

  submitted: false
};

/* =====================================================
   INIT — Auth then load
===================================================== */
onAuthStateChanged(auth, user => {
  if (!user) { navigate('login.html'); return; }
  STATE.user = user;

  // Avatar
  const initial = (user.displayName || 'S').charAt(0).toUpperCase();
  document.getElementById('hdrAvatar').textContent = initial;

  loadExamConfig();
});

/* =====================================================
   LOAD CONFIG FROM LOCALSTORAGE
===================================================== */
function loadExamConfig() {
  STATE.exam     = (localStorage.getItem('selectedExam') || 'cuet').toLowerCase();
  STATE.year     = parseInt(localStorage.getItem('selectedYear')) || 2024;
  STATE.shift    = localStorage.getItem('selectedShift') || 'Shift 1';
  const savedSubs = localStorage.getItem('selectedSubjects');
  STATE.subjects = savedSubs ? JSON.parse(savedSubs) : [];

  document.getElementById('hdrExamName').textContent = STATE.exam.toUpperCase();

  // Set timer
  if (STATE.exam === 'jee') {
    STATE.totalSeconds = 180 * 60; // 180 min
  } else {
    STATE.totalSeconds = 60 * 60 * STATE.subjects.length || 60 * 60; // 60 min per subject
  }
  STATE.remainingSeconds = STATE.totalSeconds;

  fetchQuestions();
}

/* =====================================================
   FETCH QUESTIONS FROM FIRESTORE
===================================================== */
async function fetchQuestions() {
  try {
    let q;
    if (STATE.exam === 'jee') {
      q = query(
        collection(db, 'mockQuestions'),
        where('exam', '==', 'jee')
      );
    } else {
      q = query(
        collection(db, 'mockQuestions'),
        where('exam', '==', 'cuet'),
        where('year', '==', STATE.year),
        where('shift', '==', STATE.shift)
      );
    }

    const snap = await getDocs(q);
    const allQ = [];
    snap.forEach(d => allQ.push({ id: d.id, ...d.data() }));

    organizeQuestions(allQ);
  } catch(err) {
    console.error('Fetch error:', err);
    showToast('Failed to load questions. Check connection.');
    hideLoading();
  }
}

/* =====================================================
   ORGANIZE INTO SECTIONS
===================================================== */
function organizeQuestions(allQ) {
  STATE.sections = [];

  if (STATE.exam === 'jee') {
    // JEE: Physics / Chemistry / Maths, each has Section A (MCQ) and B (Integer)
    const jeeSubjects = ['Physics', 'Chemistry', 'Mathematics'];
    jeeSubjects.forEach(sub => {
      const subQ = allQ.filter(q => q.subject === sub || q.subject === sub.toLowerCase());
      const secA = subQ.filter(q => (q.section || 'A') === 'A').sort((a,b)=> (a.questionNo||0)-(b.questionNo||0));
      const secB = subQ.filter(q => q.section === 'B').sort((a,b)=> (a.questionNo||0)-(b.questionNo||0));

      // Combined in one section object per subject (A then B)
      const questions = [...secA, ...secB];
      if (questions.length > 0) {
        STATE.sections.push({ subject: sub, label: sub, questions, hasAB: true });
      }
    });
  } else {
    // CUET: one section per selected subject
    const subs = STATE.subjects.length > 0 ? STATE.subjects : [...new Set(allQ.map(q => q.subject))];
    subs.forEach(sub => {
      const subQ = allQ
        .filter(q => q.subject === sub)
        .sort((a,b) => (a.questionNo||0) - (b.questionNo||0));
      STATE.sections.push({ subject: sub, label: sub, questions: subQ });
    });

    // Fallback: if no subject filter matched, group all questions
    if (STATE.sections.every(s => s.questions.length === 0)) {
      const allSubjects = [...new Set(allQ.map(q => q.subject))];
      STATE.sections = allSubjects.map(sub => ({
        subject: sub, label: sub,
        questions: allQ.filter(q => q.subject === sub).sort((a,b) => (a.questionNo||0)-(b.questionNo||0))
      }));
    }
  }

  // Init answers map
  STATE.sections.forEach(sec => {
    if (!STATE.answers[sec.subject]) STATE.answers[sec.subject] = {};
    sec.questions.forEach((q, i) => {
      if (!STATE.answers[sec.subject][i]) {
        STATE.answers[sec.subject][i] = { answer: null, marked: false, visited: false };
      }
    });
  });

  buildTabs();
  renderQuestion();
  startTimer();
  hideLoading();
}

/* =====================================================
   BUILD SECTION TABS
===================================================== */
function buildTabs() {
  const tabs = document.getElementById('sectionTabs');
  tabs.innerHTML = '';
  STATE.sections.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'sec-tab' + (i === 0 ? ' active' : '');
    btn.textContent = sec.label;
    btn.onclick = () => switchSection(i);
    tabs.appendChild(btn);
  });
  // Hide tabs if only one section
  if (STATE.sections.length <= 1) tabs.style.display = 'none';
}

function switchSection(idx) {
  STATE.currentSec = idx;
  STATE.currentQ = 0;
  document.querySelectorAll('.sec-tab').forEach((t,i) => t.classList.toggle('active', i === idx));
  renderQuestion();
  renderPalette();
}

/* =====================================================
   RENDER QUESTION
===================================================== */
function renderQuestion() {
  const sec = STATE.sections[STATE.currentSec];
  if (!sec || sec.questions.length === 0) {
    document.getElementById('questionContent').innerHTML = `
      <div class="no-questions">
        <div class="no-q-icon"><i class="fa-regular fa-circle-question"></i></div>
        <div class="no-q-title">No Questions Available</div>
        <div class="no-q-sub">Questions for this section haven't been uploaded yet.<br>Please ask your administrator to add questions.</div>
      </div>`;
    renderPalette();
    return;
  }

  const q = sec.questions[STATE.currentQ];
  if (!q) return;

  // Mark as visited
  STATE.answers[sec.subject][STATE.currentQ].visited = true;

  const ans = STATE.answers[sec.subject][STATE.currentQ];
  const isInteger = (q.type || 'mcq') === 'integer';
  const secLabel = q.section ? `Section ${q.section}` : '';
  const marks = isInteger ? '+4 / 0' : '+4 / -1';

  let optionsHTML = '';
  if (isInteger) {
    optionsHTML = `
      <div class="int-input-wrap">
        <input type="number" class="int-input ${ans.answer !== null ? 'filled' : ''}"
          id="intInput"
          placeholder="Enter integer"
          value="${ans.answer !== null ? ans.answer : ''}"
          oninput="handleIntegerInput(this.value)">
      </div>`;
  } else {
    const opts = q.options || [];
    const letters = ['A','B','C','D','E'];
    optionsHTML = `<div class="options-list">` +
      opts.map((opt, oi) => `
        <div class="option-item ${ans.answer === letters[oi] ? 'selected' : ''}"
             onclick="selectOption('${letters[oi]}')">
          <div class="opt-letter">${letters[oi]}</div>
          <div class="opt-text">${escHtml(opt)}</div>
        </div>`).join('') +
      `</div>`;
  }

  document.getElementById('questionContent').innerHTML = `
    <div class="question-card">
      <div class="q-header">
        <span class="q-num">Q.${STATE.currentQ + 1} of ${sec.questions.length}</span>
        ${secLabel ? `<span class="q-type-badge">${escHtml(secLabel)}</span>` : ''}
        <span class="q-type-badge">${isInteger ? 'Integer' : 'MCQ'}</span>
        <span class="q-marks">${marks}</span>
      </div>
      <div class="q-text">${escHtml(q.question || 'Question text not available.')}</div>
      ${optionsHTML}
    </div>`;

  renderPalette();
}

/* =====================================================
   OPTION SELECTION
===================================================== */
window.selectOption = function(letter) {
  const sec = STATE.sections[STATE.currentSec];
  if (!sec) return;
  STATE.answers[sec.subject][STATE.currentQ].answer = letter;
  // Re-render options
  document.querySelectorAll('.option-item').forEach((el, i) => {
    const l = ['A','B','C','D','E'][i];
    el.classList.toggle('selected', l === letter);
    el.querySelector('.opt-letter').style.background = l === letter ? 'var(--primary)' : '';
    el.querySelector('.opt-letter').style.color = l === letter ? '#0B1220' : '';
    el.querySelector('.opt-letter').style.borderColor = l === letter ? 'var(--primary)' : '';
  });
  renderPalette();
};

window.handleIntegerInput = function(val) {
  const sec = STATE.sections[STATE.currentSec];
  if (!sec) return;
  const parsed = val.trim() !== '' ? val.trim() : null;
  STATE.answers[sec.subject][STATE.currentQ].answer = parsed;
  const inp = document.getElementById('intInput');
  if (inp) inp.classList.toggle('filled', parsed !== null);
  renderPalette();
};

/* =====================================================
   CONTROLS
===================================================== */
window.saveAndNext = function() {
  const sec = STATE.sections[STATE.currentSec];
  if (!sec) return;
  // Save answer (already tracked live)
  // Unmark if marked
  STATE.answers[sec.subject][STATE.currentQ].marked = false;

  if (STATE.currentQ < sec.questions.length - 1) {
    STATE.currentQ++;
    scrollToTop();
    renderQuestion();
  } else {
    showToast('Last question in this section.');
  }
  saveToLocalStorage();
};

window.prevQuestion = function() {
  if (STATE.currentQ > 0) {
    STATE.currentQ--;
    scrollToTop();
    renderQuestion();
  } else if (STATE.currentSec > 0) {
    switchSection(STATE.currentSec - 1);
    const prevSec = STATE.sections[STATE.currentSec];
    STATE.currentQ = prevSec ? prevSec.questions.length - 1 : 0;
    renderQuestion();
  }
};

window.markForReview = function() {
  const sec = STATE.sections[STATE.currentSec];
  if (!sec) return;
  const a = STATE.answers[sec.subject][STATE.currentQ];
  a.marked = !a.marked;
  showToast(a.marked ? 'Marked for review.' : 'Mark removed.');
  renderPalette();
  if (STATE.currentQ < sec.questions.length - 1) {
    STATE.currentQ++;
    scrollToTop();
    renderQuestion();
  }
};

window.clearResponse = function() {
  const sec = STATE.sections[STATE.currentSec];
  if (!sec) return;
  STATE.answers[sec.subject][STATE.currentQ].answer = null;
  STATE.answers[sec.subject][STATE.currentQ].marked = false;
  renderQuestion();
  showToast('Response cleared.');
};

function scrollToTop() {
  const panel = document.getElementById('questionPanel');
  if (panel) panel.scrollTo({ top:0, behavior:'smooth' });
}

/* =====================================================
   JUMP TO QUESTION (from palette)
===================================================== */
window.jumpToQuestion = function(secIdx, qIdx) {
  STATE.currentSec = secIdx;
  STATE.currentQ = qIdx;
  document.querySelectorAll('.sec-tab').forEach((t,i) => t.classList.toggle('active', i === secIdx));
  scrollToTop();
  renderQuestion();
  closePalette();
};

/* =====================================================
   PALETTE RENDER
===================================================== */
function renderPalette() {
  const grid = document.getElementById('paletteGrid');
  const stats = document.getElementById('paletteStats');
  if (!grid) return;

  const sec = STATE.sections[STATE.currentSec];
  if (!sec) { grid.innerHTML = ''; return; }

  let answered = 0, marked = 0, notAnswered = 0, notVisited = 0;

  grid.innerHTML = sec.questions.map((q, i) => {
    const a = STATE.answers[sec.subject]?.[i] || {};
    let cls = 'not-visited';
    if (a.visited && a.answer !== null) { cls = 'answered'; answered++; }
    else if (a.marked) { cls = 'marked'; marked++; }
    else if (a.visited && a.answer === null) { cls = 'not-answered'; notAnswered++; }
    else { notVisited++; }
    const isCurrent = (STATE.currentSec === STATE.currentSec && STATE.currentQ === i);
    return `<div class="q-bubble ${cls} ${isCurrent ? 'current' : ''}"
      onclick="jumpToQuestion(${STATE.currentSec}, ${i})">${i+1}</div>`;
  }).join('');

  // Stats
  if (stats) {
    stats.innerHTML = `
      <div class="p-stat"><div class="legend-dot" style="background:var(--q-green);border-radius:3px;width:10px;height:10px;"></div> <span class="p-stat-val">${answered}</span> Answered</div>
      <div class="p-stat"><div class="legend-dot" style="background:var(--q-red);border-radius:3px;width:10px;height:10px;"></div> <span class="p-stat-val">${notAnswered}</span> Not Ans.</div>
      <div class="p-stat"><div class="legend-dot" style="background:var(--q-purple);border-radius:3px;width:10px;height:10px;"></div> <span class="p-stat-val">${marked}</span> Marked</div>
      <div class="p-stat"><div class="legend-dot" style="background:var(--q-grey);border-radius:3px;width:10px;height:10px;"></div> <span class="p-stat-val">${notVisited}</span> Not Visited</div>`;
  }
}

/* =====================================================
   PALETTE TOGGLE (mobile)
===================================================== */
window.togglePalette = function() {
  document.getElementById('paletteDrw').classList.toggle('open');
  document.getElementById('paletteOverlay').classList.toggle('open');
  renderPalette();
};
window.closePalette = function() {
  document.getElementById('paletteDrw').classList.remove('open');
  document.getElementById('paletteOverlay').classList.remove('open');
};

/* =====================================================
   TIMER
===================================================== */
function startTimer() {
  updateTimerDisplay();
  STATE.timer = setInterval(() => {
    STATE.remainingSeconds--;
    updateTimerDisplay();
    if (STATE.remainingSeconds <= 0) {
      clearInterval(STATE.timer);
      autoSubmit();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const s = STATE.remainingSeconds;
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;

  let display;
  if (h > 0) {
    display = `${pad(h)}:${pad(m)}:${pad(sec)}`;
  } else {
    display = `${pad(m)}:${pad(sec)}`;
  }

  const box = document.getElementById('timerBox');
  const val = document.getElementById('timerVal');
  if (val) val.textContent = display;

  if (box) {
    box.classList.remove('warning','danger');
    if (s <= 300 && s > 60) box.classList.add('warning');
    if (s <= 60) box.classList.add('danger');
  }
}

function pad(n) { return String(n).padStart(2,'0'); }

function autoSubmit() {
  showToast('Time is up! Submitting test...');
  setTimeout(submitTest, 1500);
}

/* =====================================================
   SUBMIT MODAL
===================================================== */
window.openSubmitModal = function() {
  const stats = computeStats();
  const sub = document.getElementById('submitModalSub');
  if (sub) sub.textContent = `Total Questions: ${stats.total} — Are you sure you want to submit?`;

  const statsEl = document.getElementById('submitStats');
  if (statsEl) {
    statsEl.innerHTML = `
      <div class="stat-pill"><div class="dot" style="background:var(--q-green)"></div>${stats.answered} Answered</div>
      <div class="stat-pill"><div class="dot" style="background:var(--q-red)"></div>${stats.notAnswered} Not Answered</div>
      <div class="stat-pill"><div class="dot" style="background:var(--q-purple)"></div>${stats.marked} Marked</div>
      <div class="stat-pill"><div class="dot" style="background:var(--q-grey)"></div>${stats.notVisited} Not Visited</div>`;
  }

  document.getElementById('submitModal').classList.add('open');
};

window.closeSubmitModal = function() {
  document.getElementById('submitModal').classList.remove('open');
};

window.handleModalBg = function(e) {
  if (e.target === document.getElementById('submitModal')) closeSubmitModal();
};

function computeStats() {
  let total = 0, answered = 0, notAnswered = 0, marked = 0, notVisited = 0;
  STATE.sections.forEach(sec => {
    sec.questions.forEach((q, i) => {
      total++;
      const a = STATE.answers[sec.subject]?.[i] || {};
      if (a.answer !== null) answered++;
      else if (a.visited) notAnswered++;
      else notVisited++;
      if (a.marked) marked++;
    });
  });
  return { total, answered, notAnswered, marked, notVisited };
}

/* =====================================================
   SUBMIT TEST
===================================================== */
window.submitTest = async function() {
  if (STATE.submitted) return;
  STATE.submitted = true;
  clearInterval(STATE.timer);
  closeSubmitModal();

  // Build result object
  const stats = computeStats();
  const timeTaken = STATE.totalSeconds - STATE.remainingSeconds;
  let score = 0, correct = 0, incorrect = 0, unattempted = 0;

  STATE.sections.forEach(sec => {
    sec.questions.forEach((q, i) => {
      const a = STATE.answers[sec.subject]?.[i];
      if (!a || a.answer === null) { unattempted++; return; }
      if (String(a.answer).toUpperCase() === String(q.correctAnswer).toUpperCase()) {
        score += 4; correct++;
      } else {
        // Integer: no negative, MCQ: -1
        if ((q.type||'mcq') !== 'integer') score -= 1;
        incorrect++;
      }
    });
  });

  const result = {
    uid: STATE.user?.uid || '',
    exam: STATE.exam,
    year: STATE.year,
    shift: STATE.shift,
    subjects: STATE.subjects,
    score, correct, incorrect, unattempted,
    total: stats.total,
    timeTaken,
    answers: STATE.answers,
    submittedAt: serverTimestamp()
  };

  // Save to localStorage for result page
  localStorage.setItem('lastTestResult', JSON.stringify({
    ...result, submittedAt: Date.now()
  }));

  // Save to Firestore
  try {
    await addDoc(collection(db, 'testResults'), result);
  } catch(e) { console.warn('Firestore save error:', e); }

  // Navigate to result
  navigate('result-summary.html');
};

/* =====================================================
   LOCALSTORAGE SAVE (periodic backup)
===================================================== */
function saveToLocalStorage() {
  try {
    localStorage.setItem('mockAnswers_' + STATE.exam, JSON.stringify(STATE.answers));
  } catch(e){}
}

setInterval(saveToLocalStorage, 15000);

/* =====================================================
   HELPERS
===================================================== */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast-msg';
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

function hideLoading() {
  const ls = document.getElementById('loadingScreen');
  if (ls) { ls.classList.add('hidden'); setTimeout(() => ls.remove(), 500); }
}

window.navigate = function(url) {
  const veil = document.getElementById('pageTransition');
  if (veil) veil.classList.add('leaving');
  setTimeout(() => { window.location.href = url; }, 210);
};

</script>
