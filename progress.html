<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Study Analytics | Study Grid Prep</title>
    <link rel="icon" href="/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- ✅ INSTANT THEME — same pattern as indexmy.html -->
    <script>
    (function(){
      var saved = localStorage.getItem("theme");
      var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved ? saved : (systemDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
    </script>

    <!-- ✅ FLASH PREVENTION -->
    <style>
    html{ visibility: hidden; }
    html[data-theme]{ visibility: visible; }
    </style>

    <style>
        /* ===== THEME VARIABLES — matches indexmy.html exactly ===== */
        :root {
            /* LIGHT MODE */
            --bg-start: #ffffff;
            --bg-end: #f5f5f5;
            --text-primary: #111111;
            --text-secondary: #555555;
            --card-bg: rgba(0,0,0,0.04);
            --card-border: rgba(0,0,0,0.08);
            --header-bg: rgba(255,255,255,0.98);
            --header-border: rgba(0,0,0,0.08);
            --header-shadow: 0 4px 15px rgba(0,0,0,0.08);
            --chart-box-bg: rgba(0,0,0,0.03);
            --chart-box-border: rgba(0,0,0,0.08);
            --chart-box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            --chart-tick: #555555;
            --chart-grid: rgba(0,0,0,0.06);
            --chart-legend: #111111;
            --subtitle-color: #555555;
            --back-btn-text: #0B1220;
        }

        [data-theme="dark"] {
            /* DARK MODE */
            --bg-start: #0B1220;
            --bg-end: #0F172A;
            --text-primary: #E2E8F0;
            --text-secondary: #94A3B8;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.08);
            --header-bg: rgba(11,18,32,0.98);
            --header-border: rgba(0,242,254,0.15);
            --header-shadow: 0 4px 15px rgba(0,0,0,0.4);
            --chart-box-bg: rgba(255,255,255,0.05);
            --chart-box-border: rgba(255,255,255,0.08);
            --chart-box-shadow: 0 20px 40px rgba(0,0,0,0.35);
            --chart-tick: rgba(255,255,255,0.75);
            --chart-grid: rgba(255,255,255,0.05);
            --chart-legend: #E2E8F0;
            --subtitle-color: #94A3B8;
            --back-btn-text: #0B1220;
        }

        /* ===== RESET ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        html { background: var(--bg-start); }

        body {
            background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            animation: pageIn 0.3s ease forwards;
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== FIXED HEADER ===== */
        .fixed-analytics-header {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            background: var(--header-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            padding: 15px 20px;
            box-shadow: var(--header-shadow);
            border-bottom: 1px solid var(--header-border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header-title {
            font-size: 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
            margin: 0;
        }

        .header-title i {
            color: #22D3EE;
        }

        /* ===== MAIN SECTION ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .graph-section {
            text-align: center;
            padding: 100px 5% 50px 5%;
            max-width: 900px;
            margin: auto;
            animation: fadeInUp 0.5s ease-out;
        }

        p.subtitle {
            color: var(--subtitle-color);
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 400;
        }

        /* ===== CHART BOX ===== */
        .chart-box {
            position: relative;
            height: 380px;
            width: 100%;
            background: var(--chart-box-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--chart-box-border);
            box-shadow: var(--chart-box-shadow);
            backdrop-filter: blur(10px);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .chart-box:hover {
            border-color: rgba(34, 211, 238, 0.3);
            box-shadow: var(--chart-box-shadow), 0 0 0 1px rgba(34,211,238,0.1);
        }

        /* ===== SYNC INDICATOR ===== */
        .sync-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            padding: 4px 12px;
            margin-bottom: 16px;
            transition: 0.3s;
        }

        .sync-badge .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #94A3B8;
            transition: background 0.3s;
        }

        .sync-badge.live .dot { background: #34D399; }
        .sync-badge.error .dot { background: #F43F5E; }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            margin-top: 32px;
            padding: 13px 36px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #22D3EE, #06B6D4);
            cursor: pointer;
            font-weight: 700;
            color: var(--back-btn-text);
            font-size: 14px;
            box-shadow: 0 6px 20px rgba(34,211,238,0.3);
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(34,211,238,0.45);
        }

        .back-btn:active { transform: scale(0.97); }

        /* ===== MOBILE ===== */
        @media (max-width: 600px) {
            .chart-box { height: 300px; padding: 14px; }
            .graph-section { padding-top: 88px; }
        }
    </style>
</head>

<body>

<!-- Fixed Header -->
<div class="fixed-analytics-header">
    <h2 class="header-title">
        <i class="fa-solid fa-chart-simple"></i> Weekly Analytics
    </h2>
</div>

<section class="graph-section">

    <p class="subtitle">Track your daily consistency and study progress</p>

    <!-- Live sync badge -->
    <div class="sync-badge" id="syncBadge">
        <span class="dot"></span>
        <span id="syncText">Loading data…</span>
    </div>

    <div class="chart-box">
        <canvas id="studyChart"></canvas>
    </div>

    <button class="back-btn" onclick="window.location.href='index.html'">
        ⬅ Back
    </button>

</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_13GJOiLQwxsirfJ7T_4WinaxVmSp7fs",
  authDomain: "untitled-world-2e645.firebaseapp.com",
  projectId: "untitled-world-2e645",
  storageBucket: "untitled-world-2e645.firebasestorage.app",
  messagingSenderId: "990115586087",
  appId: "1:990115586087:web:963f68bd59dec5ef0c6e02"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Helper: detect current theme ──
function isDark() {
    return document.documentElement.getAttribute("data-theme") === "dark";
}

// ── Chart colors based on theme ──
function getChartColors() {
    return isDark()
        ? { tick: "rgba(255,255,255,0.75)", grid: "rgba(255,255,255,0.05)", legend: "#E2E8F0" }
        : { tick: "#666666",               grid: "rgba(0,0,0,0.07)",        legend: "#111111" };
}

// ── Render chart ──
let chartInstance = null;

function renderChart(data) {
    const canvas = document.getElementById("studyChart");
    const ctx = canvas.getContext("2d");

    // Destroy previous chart if exists (theme change re-render)
    if (chartInstance) { chartInstance.destroy(); }

    const c = getChartColors();

    // Gradient bar fill
    const grad = ctx.createLinearGradient(0, 0, 0, 360);
    grad.addColorStop(0, "#22D3EE");
    grad.addColorStop(1, "rgba(6,182,212,0.15)");

    chartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"],
            datasets: [{
                label: "Videos Completed",
                data: data,
                backgroundColor: grad,
                borderColor: "#22D3EE",
                borderWidth: 1.5,
                borderRadius: 10,
                hoverBackgroundColor: "#06B6D4"
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 1200, easing: "easeOutQuart" },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks:  { color: c.tick,  font: { size: 12 } },
                    grid:   { color: c.grid }
                },
                x: {
                    ticks: { color: c.tick, font: { size: 12 } },
                    grid:  { display: false }
                }
            },
            plugins: {
                legend: {
                    display: true,
                    labels: { color: c.legend, font: { weight: "600" } }
                },
                tooltip: {
                    backgroundColor: isDark() ? "rgba(11,18,32,0.95)" : "rgba(255,255,255,0.97)",
                    titleColor:      isDark() ? "#E2E8F0"              : "#111111",
                    bodyColor:       isDark() ? "#94A3B8"              : "#555555",
                    borderColor:     "rgba(34,211,238,0.3)",
                    borderWidth:     1,
                    titleFont: { family: "Poppins" },
                    bodyFont:  { family: "Poppins" },
                    cornerRadius: 10,
                    padding: 12
                }
            }
        }
    });
}

// ── Sync badge helper ──
function setBadge(state, text) {
    const badge = document.getElementById("syncBadge");
    const txt   = document.getElementById("syncText");
    badge.className = "sync-badge" + (state ? " " + state : "");
    txt.textContent = text;
}

// ── Main: load data ──
// Step 1: Render immediately with localStorage (instant, offline-safe)
const localData = JSON.parse(localStorage.getItem("studyGraphData")) || [0,0,0,0,0,0,0];
renderChart(localData);
setBadge("", "Loading from cloud…");

// Step 2: Try Firestore for fresher/cross-device data
async function loadFromFirestore() {
    try {
        const userName = localStorage.getItem("userName");
        if (!userName) {
            setBadge("", "Local data");
            return;
        }

        const snap = await getDoc(doc(db, "users", userName));

        if (snap.exists()) {
            const firestoreData = snap.data().studyGraphData;

            if (Array.isArray(firestoreData) && firestoreData.length === 7) {
                // Merge: take the max of local + Firestore for each day
                // (in case local has newer unsync'd data)
                const merged = localData.map((localVal, i) =>
                    Math.max(localVal, firestoreData[i] || 0)
                );

                // Update localStorage with merged data
                localStorage.setItem("studyGraphData", JSON.stringify(merged));

                // Re-render chart with live data
                renderChart(merged);
                setBadge("live", "Synced from cloud ✓");
            } else {
                // Firestore doc exists but studyGraphData not set yet — use local
                setBadge("", "Local data (not yet synced)");
            }
        } else {
            setBadge("", "Local data");
        }
    } catch (err) {
        console.warn("[Progress] Firestore read failed:", err);
        setBadge("error", "Offline — showing local data");
    }
}

loadFromFirestore();

// ── Re-render chart when theme changes (localStorage "theme" key) ──
window.addEventListener("storage", function(e) {
    if (e.key === "theme") {
        const currentData = JSON.parse(localStorage.getItem("studyGraphData")) || [0,0,0,0,0,0,0];
        renderChart(currentData);
    }
});
</script>

<script src="theme.js"></script>

</body>
</html>
