<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Untitled World</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  min-height:100vh;
}

.contact-container{
  max-width:700px;
  margin:80px auto;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:40px;
  border-radius:20px;
}

h1{
  text-align:center;
  margin-bottom:15px;
}

.subtitle{
  text-align:center;
  opacity:0.8;
  margin-bottom:40px;
}

form{
  display:flex;
  flex-direction:column;
  gap:20px;
}

input, textarea{
  padding:15px;
  border-radius:10px;
  border:none;
  outline:none;
  font-size:15px;
}

textarea{
  resize:none;
  height:120px;
}

button{
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#00f2fe,#4facfe);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.direct-email{
  margin-top:20px;
  font-size:14px;
  opacity:0.9;
  text-align:center;
}

.direct-email a{
  color:white;
  text-decoration:none;
  border-bottom:1.5px dotted rgba(255,255,255,0.6);
  padding-bottom:2px;
}

/* Follow Section */
.follow{
  margin-top:40px;
  text-align:center;
}

.follow a{
  color:white;
  text-decoration:none;
  border-bottom:1.5px dotted rgba(255,255,255,0.7);
  padding-bottom:3px;
}

.follow img{
  width:18px;
  vertical-align:middle;
  margin-right:6px;
}

/* Footer Links */
.bottom-links{
  margin-top:40px;
  text-align:center;
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
}

.bottom-links a{
  color:white;
  text-decoration:none;
  border-bottom:1.5px dotted rgba(255,255,255,0.7);
  padding-bottom:3px;
}

footer{
  text-align:center;
  margin-top:40px;
  padding:20px;
  background:rgba(0,0,0,.5);
  font-size:15px;
}

@media(max-width:768px){
  .contact-container{
    margin:30px 15px;
  }
}
</style>
</head>

<body>

<div class="contact-container">

<h1>Contact Untitled World</h1>
<p class="subtitle">Have questions or feedback? We’d love to hear from you.</p>

<form action="https://formsubmit.co/support@untitledworld.us.cc" method="POST" id="contactForm">

  <!-- Hidden Settings (ONLY ONCE) -->
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_subject" value="New Contact Message - Untitled World">
  <input type="hidden" name="_template" value="table">
  <input type="hidden" name="_next" value="https://untitledworld.us.cc/contact.html?success=true">

  <!-- User Fields -->
  <input type="text" name="name" placeholder="Your Name" required>
  <input type="email" name="email" placeholder="Your Email" required>
  <input type="text" name="phone" placeholder="+91 (Optional)">
  <textarea name="message" placeholder="Write your message..." required></textarea>

  <button type="submit">Submit Message</button>

</form>

<p class="direct-email">
  For queries, email us at:
  <a href="mailto:support@untitledworld.us.cc">
    support@untitledworld.us.cc
  </a>
</p>

<div class="follow">
  <p style="margin-bottom:10px;">Follow us on</p>
  <a href="https://youtube.com/@jexplain0001" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
    Untitled World
  </a>
</div>

<div class="bottom-links">
  <a href="terms.html">Terms</a>
  <a href="privacy.html">Privacy Policy</a>
  <a href="about.html">About Us</a>
</div>

</div>

<footer>
© 2026 Untitled World. All rights reserved.
</footer>

<script>
if(window.location.search.includes("success=true")){
    alert("Your message has been sent successfully!");
}
</script>

</body>
</html>
