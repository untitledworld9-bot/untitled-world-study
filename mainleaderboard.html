<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070f1f" />
  <title>Leaderboard — Study Grid Prep</title>
  <link rel="icon" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script type="module" src="/uw-core.js"></script>
  <!-- ✅ THEME EARLY INIT — prevents flash, matches dashboard-home -->
  <script>
  (function(){
    const saved = localStorage.getItem("theme");
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = saved ? saved : (systemDark ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  })();
  </script>
  <style>html{ visibility: hidden; } html[data-theme]{ visibility: visible; }</style>
  <style>
    /* ── LIGHT MODE (default) — Dashboard-Home matched ── */
    :root {
      --bg:          #F5F7FA;
      --surface:     #FFFFFF;
      --surface2:    #F0F3F8;
      --border-c:    #E5E9F0;
      --text:        #0F172A;
      --text-2:      #64748B;
      --text-3:      #94A3B8;
      --header-bg:   rgba(255,255,255,0.97);
      --shadow-sm:   0 1px 4px rgba(0,0,0,0.06);
      --shadow:      0 2px 12px rgba(0,0,0,0.08);

      /* Leaderboard-specific mapped to light */
      --bg-card:     #FFFFFF;
      --border:      #E5E9F0;
      --border-soft: #E5E9F0;
      --teal:        #2563EB;
      --teal-dim:    rgba(37,99,235,0.10);
      --teal-glow:   rgba(37,99,235,0.20);
      --gold:        #d97706;
      --silver:      #64748B;
      --bronze:      #92400e;
      --purple:      #7c3aed;
      --amber:       #d97706;
      --header-h:    64px;
      --safe-b:      env(safe-area-inset-bottom, 0px);
      --r-card:      14px;
      --r-pill:      999px;
      --font-d:      'Syne', sans-serif;
      --font-b:      'DM Sans', sans-serif;
    }

    /* ── DARK MODE ── */
    [data-theme="dark"] {
      --bg:          #0B1220;
      --surface:     #0F1A2E;
      --surface2:    #111D33;
      --border-c:    rgba(255,255,255,0.08);
      --text:        #E8F0FE;
      --text-2:      #94A3B8;
      --text-3:      #475569;
      --header-bg:   rgba(11,18,32,0.97);
      --shadow-sm:   0 1px 4px rgba(0,0,0,0.3);
      --shadow:      0 2px 12px rgba(0,0,0,0.35);

      /* Leaderboard-specific mapped to dark */
      --bg-card:     rgba(255,255,255,0.04);
      --border:      rgba(0,230,200,0.18);
      --border-soft: rgba(255,255,255,0.07);
      --teal:        #00e6c8;
      --teal-dim:    rgba(0,230,200,0.12);
      --teal-glow:   rgba(0,230,200,0.30);
      --gold:        #ffd700;
      --silver:      #c0c0c0;
      --bronze:      #cd7f32;
      --purple:      #7c5cfc;
      --amber:       #ffb830;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overscroll-behavior: none; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-b);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100dvh;
      transition: background 0.2s ease, color 0.2s ease;
    }
    /* Dark mode atmospheric gradient */
    [data-theme="dark"] body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 55% at 10% -8%, rgba(0,230,200,0.07) 0%, transparent 55%),
        radial-gradient(ellipse 60% 45% at 90% 90%, rgba(124,92,252,0.08) 0%, transparent 55%),
        linear-gradient(155deg, #0B1220 0%, #0F1A2E 45%, #0B1220 100%);
    }
    /* Light mode — very subtle */
    [data-theme="light"] body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 5% 0%, rgba(37,99,235,0.04) 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 95% 90%, rgba(124,92,252,0.03) 0%, transparent 55%);
    }

    /* ── HEADER ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h); z-index: 100;
      display: flex; align-items: center; gap: 12px;
      padding: 0 18px;
      background: var(--header-bg);
      backdrop-filter: blur(22px) saturate(180%);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .back-btn {
      width: 38px; height: 38px; border-radius: 12px;
      border: 1px solid var(--border-soft); background: var(--bg-card);
      color: var(--text-2); display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; flex-shrink: 0;
      transition: all 0.2s ease; text-decoration: none;
    }
    .back-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }
    .header-info { flex: 1; }
    .header-label {
      font-family: var(--font-d); font-size: 9px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--teal); opacity: 0.65;
    }
    .header-title {
      font-family: var(--font-d); font-size: 18px; font-weight: 700;
      color: var(--text); letter-spacing: -0.4px; line-height: 1.2;
    }
    .header-refresh {
      width: 38px; height: 38px; border-radius: 12px;
      border: 1px solid var(--border-soft); background: var(--bg-card);
      color: var(--text-2); display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; transition: all 0.2s ease;
    }
    .header-refresh:hover { border-color: var(--teal); color: var(--teal); }
    .header-refresh.spinning { animation: spin 0.8s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SCROLL ── */
    .scroll-wrap {
      position: relative; z-index: 1;
      padding-top: calc(var(--header-h) + 20px);
      padding-bottom: calc(32px + var(--safe-b));
      max-width: 600px; margin: 0 auto;
      padding-left: 16px; padding-right: 16px;
    }

    /* ── MY CARD ── */
    .my-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      padding: 18px 18px 16px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.4s ease;
    }
    [data-theme="dark"] .my-card {
      background: linear-gradient(135deg, rgba(0,230,200,0.1), rgba(124,92,252,0.08));
      box-shadow: 0 0 30px rgba(0,230,200,0.1);
    }
    .my-card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .my-avatar {
      width: 52px; height: 52px; border-radius: 16px;
      background: var(--teal-dim); border: 2px solid var(--teal);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 0 18px var(--teal-glow);
    }
    .my-info { flex: 1; min-width: 0; }
    .my-name {
      font-family: var(--font-d); font-size: 16px; font-weight: 700;
      color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .my-badge { font-size: 12px; color: var(--gold); margin-top: 2px; font-weight: 500; }
    .my-stats { display: flex; gap: 10px; }
    .stat-chip {
      flex: 1; background: var(--surface2); border: 1px solid var(--border-soft);
      border-radius: 12px; padding: 8px 10px; text-align: center;
    }
    .stat-chip-val {
      font-family: var(--font-d); font-size: 18px; font-weight: 700; color: var(--teal);
    }
    .stat-chip-val.timer { color: var(--amber); }
    .stat-chip-lbl { font-size: 10px; color: var(--text-2); margin-top: 2px; letter-spacing: 0.5px; }

    /* ── XP BREAKDOWN ── */
    .xp-breakdown {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
    }
    .xp-pill {
      font-size: 10px; font-weight: 600;
      padding: 3px 9px; border-radius: var(--r-pill);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .xp-pill.study { background: rgba(0,230,200,0.1); color: var(--teal); border: 1px solid rgba(0,230,200,0.2); }
    .xp-pill.timer { background: rgba(255,184,48,0.1); color: var(--amber); border: 1px solid rgba(255,184,48,0.2); }
    .xp-pill.total { background: rgba(124,92,252,0.12); color: #a78bfa; border: 1px solid rgba(124,92,252,0.25); }

    /* ── LEVEL BAR ── */
    .level-wrap { margin-top: 14px; }
    .level-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    .level-label { font-family: var(--font-d); font-size: 12px; font-weight: 700; color: var(--text); }
    .level-pct { font-size: 11px; color: var(--text-2); }
    .level-track {
      height: 7px; border-radius: var(--r-pill);
      background: var(--border-soft); overflow: hidden;
    }
    .level-fill {
      height: 100%; border-radius: var(--r-pill);
      background: linear-gradient(90deg, var(--teal), var(--purple));
      transition: width 1s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ── SECTION HEAD ── */
    .section-head {
      display: flex; align-items: center; gap: 10px;
      margin: 0 0 14px;
      font-family: var(--font-d); font-size: 13px; font-weight: 700;
      color: var(--text-2); letter-spacing: 1px; text-transform: uppercase;
    }
    .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border-soft); }

    /* ── PODIUM ── */
    .podium {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 10px; margin-bottom: 28px; padding: 0 4px;
      animation: fadeUp 0.5s ease 0.1s both;
    }
    .podium-slot { flex: 1; max-width: 130px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .podium-slot.first  { order: 2; }
    .podium-slot.second { order: 1; }
    .podium-slot.third  { order: 3; }
    .podium-avatar {
      width: 56px; height: 56px; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; border: 2px solid transparent;
    }
    .podium-slot.first  .podium-avatar { width: 68px; height: 68px; border-radius: 22px; font-size: 26px; }
    .first  .podium-avatar { background: rgba(255,215,0,0.15);   border-color: var(--gold);   box-shadow: 0 0 20px rgba(255,215,0,0.35); }
    .second .podium-avatar { background: rgba(192,192,192,0.12); border-color: var(--silver); box-shadow: 0 0 14px rgba(192,192,192,0.25); }
    .third  .podium-avatar { background: rgba(205,127,50,0.12);  border-color: var(--bronze); box-shadow: 0 0 14px rgba(205,127,50,0.25); }
    .podium-medal { font-size: 20px; }
    .first .podium-medal { font-size: 26px; }
    .podium-name {
      font-family: var(--font-d); font-size: 12px; font-weight: 700;
      color: var(--text); text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    }
    .podium-xp { font-size: 11px; color: var(--teal); font-weight: 600; }
    .podium-base {
      width: 100%; border-radius: 12px 12px 6px 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-d); font-size: 22px; font-weight: 800; color: var(--text-3);
    }
    .first  .podium-base { background: rgba(255,215,0,0.12);   height: 70px; }
    .second .podium-base { background: rgba(192,192,192,0.08); height: 52px; }
    .third  .podium-base { background: rgba(205,127,50,0.08);  height: 42px; }

    /* ── RANK LIST ── */
    .rank-list { display: flex; flex-direction: column; gap: 8px; animation: fadeUp 0.5s ease 0.15s both; }
    .rank-row {
      display: flex; align-items: center; gap: 13px;
      background: var(--bg-card); border: 1px solid var(--border-soft);
      border-radius: 14px; padding: 12px 14px; transition: all 0.2s ease;
    }
    .rank-row:hover { background: var(--surface2); border-color: var(--border); }
    .rank-row.is-me { background: var(--teal-dim); border-color: var(--border); box-shadow: 0 0 20px var(--teal-glow); }
    .rank-num {
      font-family: var(--font-d); font-size: 14px; font-weight: 800;
      color: var(--text-3); min-width: 28px; text-align: center;
    }
    .rank-avatar {
      width: 40px; height: 40px; border-radius: 13px;
      background: var(--teal-dim); border: 1px solid var(--border-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .rank-row.is-me .rank-avatar { border-color: var(--teal); box-shadow: 0 0 10px var(--teal-glow); }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name {
      font-family: var(--font-d); font-size: 14px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rank-badge { font-size: 11px; color: var(--text-2); margin-top: 1px; }
    .rank-right { text-align: right; flex-shrink: 0; }
    .rank-xp { font-family: var(--font-d); font-size: 14px; font-weight: 700; color: var(--teal); }
    .rank-streak { font-size: 11px; color: var(--text-2); margin-top: 1px; }

    /* ── WEEKLY SECTION ── */
    .weekly-list { display: flex; flex-direction: column; gap: 8px; animation: fadeUp 0.5s ease 0.2s both; }

    /* ── EMPTY / LOADING ── */
    .empty { text-align: center; padding: 48px 24px; color: var(--text-2); font-size: 14px; line-height: 2; }
    .empty-icon { font-size: 44px; display: block; margin-bottom: 12px; }
    .loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 40px 0; color: var(--text-2); font-size: 14px; }
    .spinner { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border-soft); border-top-color: var(--teal); animation: spin 0.7s linear infinite; }

    /* ── LEVEL UP POPUP ── */
    .popup-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.82); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .popup-overlay.show { opacity: 1; pointer-events: all; }
    .popup-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px; padding: 36px 28px 28px;
      max-width: 320px; width: 90%; text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
      transform: scale(0.85) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .popup-overlay.show .popup-box { transform: scale(1) translateY(0); }
    .popup-icon { font-size: 56px; display: block; margin-bottom: 12px; animation: popBounce 0.6s ease 0.2s both; }
    @keyframes popBounce { 0%{transform:scale(0);}60%{transform:scale(1.2);}100%{transform:scale(1);} }
    .popup-title { font-family: var(--font-d); font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .popup-sub { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 22px; }
    .popup-close {
      background: linear-gradient(135deg, var(--teal), var(--purple));
      border: none; border-radius: 14px; padding: 13px 32px;
      color: #000; font-family: var(--font-d); font-size: 14px; font-weight: 700;
      cursor: pointer; width: 100%; transition: opacity 0.2s ease;
    }
    .popup-close:hover { opacity: 0.85; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .mt-24 { margin-top: 24px; }
    .mt-16 { margin-top: 16px; }
  </style>
</head>
<body>

  <header class="header">
    <a href="javascript:history.back()" class="back-btn">←</a>
    <div class="header-info">
      <div class="header-label">Study Grid Prep</div>
      <div class="header-title">Leaderboard 🏆</div>
    </div>
    <button class="header-refresh" id="refreshBtn" title="Refresh" onclick="loadLeaderboard()">↻</button>
  </header>

  <main class="scroll-wrap">
    <!-- MY CARD -->
    <div class="my-card" id="myCard" style="display:none;">
      <div class="my-card-top">
        <div class="my-avatar" id="myAvatar">👤</div>
        <div class="my-info">
          <div class="my-name" id="myName">—</div>
          <div class="my-badge" id="myBadge">—</div>
        </div>
        <div style="font-family:var(--font-d);font-size:22px;font-weight:800;color:var(--text-2);" id="myRankLabel">#—</div>
      </div>
      <div class="my-stats">
        <div class="stat-chip">
          <div class="stat-chip-val" id="myXP">0</div>
          <div class="stat-chip-lbl">Total XP</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-val timer" id="myTimerXP">0</div>
          <div class="stat-chip-lbl">⏱ Focus XP</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-val" id="myStreak">0</div>
          <div class="stat-chip-lbl">🔥 Streak</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-val" id="myLevel">1</div>
          <div class="stat-chip-lbl">Level</div>
        </div>
      </div>
      <!-- XP breakdown pills -->
      <div class="xp-breakdown">
        <span class="xp-pill study">📚 Study: <b id="myStudyXP">0</b></span>
        <span class="xp-pill timer">⏱ Timer: <b id="myTimerXPPill">0</b></span>
        <span class="xp-pill total">⚡ Total: <b id="myTotalXPPill">0</b></span>
      </div>
      <div class="level-wrap">
        <div class="level-row">
          <span class="level-label" id="levelLabel">Level 1</span>
          <span class="level-pct" id="levelPct">0%</span>
        </div>
        <div class="level-track"><div class="level-fill" id="levelFill" style="width:0%"></div></div>
      </div>
    </div>

    <!-- PODIUM -->
    <div class="section-head">🥇 Top Champions</div>
    <div id="podiumWrap"><div class="loading"><div class="spinner"></div> Loading...</div></div>

    <!-- RANK LIST -->
    <div id="rankListWrap" class="mt-16"></div>


    <!-- WEEKLY -->
    <div class="section-head mt-24">📅 This Week</div>
    <div id="weeklyWrap"><div class="loading"><div class="spinner"></div> Loading...</div></div>
  </main>

  <!-- POPUP -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-box">
      <span class="popup-icon" id="popupIcon">🚀</span>
      <div class="popup-title" id="popupTitle">Level Up!</div>
      <div class="popup-sub" id="popupSub">You reached a new level!</div>
      <button class="popup-close" onclick="closePopup()">Awesome! 🎉</button>
    </div>
  </div>

  <script type="module">
    import { db, auth, onAuthStateChanged } from "./firebase.js";
    import {
      collection, query, orderBy, limit,
      getDocs, getDoc, doc, where, Timestamp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let currentUser = null;
    let prevLevel   = null;
    let prevRank    = null;
    let allEntries  = [];

    /* ── Level system (based on TOTAL XP = study + timer) ── */
    const THRESHOLDS = [0, 100, 250, 500, 800, 1200, 1700, 2300];
    function getLevel(xp) {
      for (let i = THRESHOLDS.length - 1; i >= 0; i--) {
        if (xp >= THRESHOLDS[i]) return i + 1;
      }
      return 1;
    }
    function getLevelProgress(xp) {
      const lv = getLevel(xp);
      if (lv >= 8) return 100;
      const from = THRESHOLDS[lv - 1], to = THRESHOLDS[lv];
      return Math.round(((xp - from) / (to - from)) * 100);
    }
    function getBadge(xp) {
      if (xp >= 500) return "🏆 Study Grid Champion";
      if (xp >= 300) return "⚡ Study Master";
      if (xp >= 150) return "🔥 Focused Learner";
      if (xp >= 50)  return "⭐ Rising Learner";
      return "🏅 Beginner";
    }
    function nameInitial(name) { return (name || "?")[0].toUpperCase(); }

    /* ── Auth ── */
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        await renderMyCard(user);
        await loadLeaderboard();
      } else {
        document.getElementById("myCard").style.display = "none";
        await loadLeaderboard();
      }
    });

    /* ── My card — combined XP: studyXP (playlist+todo) + timerXP (focus) ── */
    async function renderMyCard(user) {
      const studyXP = parseInt(localStorage.getItem("uw_xp")    || "0", 10);
      const streak  = parseInt(localStorage.getItem("uw_streak") || "0", 10);

      // Read timerXP + focusTime from leaderboard/{uid}
      let timerXP   = 0;
      let focusTime = 0;
      try {
        const lbSnap = await getDoc(doc(db, "leaderboard", user.uid));
        if (lbSnap.exists()) {
          timerXP   = lbSnap.data().timerXP  || 0;
          focusTime = lbSnap.data().focusTime || 0;
        }
      } catch(e) {}

      // COMBINED XP = playlist + todo + timer (all 3 sources)
      const totalXP = studyXP + timerXP;
      const level   = getLevel(totalXP);
      const pct     = getLevelProgress(totalXP);
      const badge   = getBadge(totalXP);

      document.getElementById("myCard").style.display       = "";
      document.getElementById("myAvatar").textContent       = nameInitial(user.displayName);
      document.getElementById("myName").textContent         = user.displayName || "You";
      document.getElementById("myBadge").textContent        = badge;
      document.getElementById("myXP").textContent           = totalXP;
      document.getElementById("myTimerXP").textContent      = timerXP;
      document.getElementById("myStreak").textContent       = streak;
      document.getElementById("myLevel").textContent        = level;
      document.getElementById("myStudyXP").textContent      = studyXP;
      document.getElementById("myTimerXPPill").textContent  = timerXP;
      document.getElementById("myTotalXPPill").textContent  = totalXP;
      document.getElementById("levelLabel").textContent     = `Level ${level}`;
      document.getElementById("levelPct").textContent       = pct + "%";
      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.getElementById("levelFill").style.width = pct + "%";
      }));
    }

    /* ── Load leaderboard — COMBINED XP: playlist + todo + timer ── */
    window.loadLeaderboard = async function() {
      const btn = document.getElementById("refreshBtn");
      btn.classList.add("spinning");
      try {
        // Fetch all leaderboard docs. Order by xp (playlist+todo) first — we re-sort by combined below.
        const snap = await getDocs(
          query(collection(db, "leaderboard"), orderBy("xp", "desc"), limit(200))
        );

        // Build entries: combined XP = xp (playlist+todo from uw-core.js) + timerXP (focus from script.js)
        const raw = snap.docs.map(d => {
          const data     = d.data();
          const studyXP  = data.xp      || 0;   // playlist + todo XP
          const timerXP  = data.timerXP || 0;   // focus timer XP
          const totalXP  = studyXP + timerXP;   // COMBINED — all 3 sources
          return {
            uid:       d.id,
            name:      data.name || "Anonymous",
            studyXP,
            timerXP,
            xp:        totalXP,   // xp used for ranking = combined total
            streak:    data.streak || 0,
            focusTime: data.focusTime || 0,
            level:     getLevel(totalXP)
          };
        });

        // Deduplicate by uid
        const seen = new Set();
        const deduped = raw.filter(e => {
          if (seen.has(e.uid)) return false;
          seen.add(e.uid);
          return true;
        });

        // Sort by combined XP descending, assign ranks
        deduped.sort((a, b) => b.xp - a.xp);
        allEntries = deduped.map((e, i) => ({ ...e, rank: i + 1 }));

        renderPodium();
        renderRankList();
        renderWeekly();
        updateMyRank();
        checkLevelUp();
      } catch(e) {
        console.warn("[Leaderboard]", e);
        document.getElementById("podiumWrap").innerHTML = `<div class="empty"><span class="empty-icon">⚠️</span>Could not load data.<br>Check your connection.</div>`;
        document.getElementById("weeklyWrap").innerHTML = "";
      }
      setTimeout(() => btn.classList.remove("spinning"), 800);
    };

    /* ── Podium ── */
    function renderPodium() {
      const top3 = allEntries.slice(0, 3);
      if (!top3.length) {
        document.getElementById("podiumWrap").innerHTML = `<div class="empty"><span class="empty-icon">🏆</span>No users yet.<br>Start studying to appear here!</div>`;
        return;
      }
      const medals  = ["🥇","🥈","🥉"];
      const classes = ["first","second","third"];
      const html = top3.map((u, i) => {
        const focusStr = u.focusTime >= 60
          ? `${Math.floor(u.focusTime/60)}h ${u.focusTime%60}m`
          : u.focusTime > 0 ? `${u.focusTime}m` : "";
        // Show combined XP breakdown: study + timer
        const breakdown = (u.studyXP > 0 || u.timerXP > 0)
          ? `<div style="font-size:9px;color:rgba(255,255,255,0.5);margin-top:1px;">
               📚${u.studyXP || 0} + ⏱${u.timerXP || 0}
             </div>`
          : "";
        return `
        <div class="podium-slot ${classes[i]}">
          <div class="podium-medal">${medals[i]}</div>
          <div class="podium-avatar">${nameInitial(u.name)}</div>
          <div class="podium-name">${escHtml(u.name)}</div>
          <div class="podium-xp">⭐ ${u.xp} XP</div>
          ${breakdown}
          ${focusStr ? `<div style="font-size:10px;color:var(--amber);margin-top:2px;">⏱ ${focusStr}</div>` : ""}
          <div class="podium-base">${i + 1}</div>
        </div>
      `}).join("");
      document.getElementById("podiumWrap").innerHTML = `<div class="podium">${html}</div>`;
    }

    /* ── Rank list (4th–20th) — combined XP ── */
    function renderRankList() {
      const rest  = allEntries.slice(3, 20);  // positions 4 to 20
      const myUid = currentUser?.uid;
      if (!rest.length) { document.getElementById("rankListWrap").innerHTML = ""; return; }

      const rows = rest.map(u => {
        const isMe = u.uid === myUid;
        const focusStr = u.focusTime > 0
          ? `<span style="color:var(--amber);margin-left:4px">⏱ ${u.focusTime >= 60 ? Math.floor(u.focusTime/60)+'h '+u.focusTime%60+'m' : u.focusTime+'m'}</span>`
          : "";
        // Show XP breakdown: study (playlist+todo) + timer
        const breakdownStr = (u.studyXP > 0 || u.timerXP > 0)
          ? `<span style="font-size:10px;opacity:0.5;margin-left:4px;">(📚${u.studyXP||0}+⏱${u.timerXP||0})</span>`
          : "";
        return `
          <div class="rank-row ${isMe ? "is-me" : ""}">
            <div class="rank-num">#${u.rank}</div>
            <div class="rank-avatar">${nameInitial(u.name)}</div>
            <div class="rank-info">
              <div class="rank-name">${escHtml(u.name)}${isMe ? " (You)" : ""}</div>
              <div class="rank-badge">${getBadge(u.xp)}${focusStr}</div>
            </div>
            <div class="rank-right">
              <div class="rank-xp">⭐ ${u.xp}${breakdownStr}</div>
              <div class="rank-streak">🔥 ${u.streak}</div>
            </div>
          </div>`;
      }).join("");
      document.getElementById("rankListWrap").innerHTML = `<div class="rank-list">${rows}</div>`;
    }

    /* ── Weekly — entries updated this week ── */
    async function renderWeekly() {
      try {
        // FIX: Avoid composite index error — query only by updatedAt, then sort in JS
        const weekAgo = new Date();
        weekAgo.setDate(weekAgo.getDate() - 7);

        // Simple single-field query (no composite index needed)
        const snap = await getDocs(
          query(
            collection(db, "leaderboard"),
            where("updatedAt", ">=", Timestamp.fromDate(weekAgo)),
            limit(50)
          )
        );

        const myUid = currentUser?.uid;
        const entries = snap.docs.map((d) => {
          const data     = d.data();
          // COMBINED weekly XP: playlist/todo XP + weekly timer XP
          const studyXP  = data.xp             || 0;  // playlist + todo
          const timerXP  = data.timerXP        || 0;  // cumulative focus XP
          const weeklyTimerXP = data.weeklyTimerXP || timerXP;
          // For weekly view: combine study XP + weekly timer XP
          const weeklyTotal = studyXP + weeklyTimerXP;
          return {
            uid:    d.id,
            name:   data.name || "Anonymous",
            xp:     weeklyTotal,    // sort by combined weekly XP
            studyXP,
            timerXP: weeklyTimerXP,
            focusTime: data.focusTime || 0,
            streak: data.streak || 0
          };
        });

        // Deduplicate
        const seen = new Set();
        const deduped = entries.filter(e => { if (seen.has(e.uid)) return false; seen.add(e.uid); return true; });
        // Sort by combined weekly XP desc
        deduped.sort((a, b) => b.xp - a.xp);

        if (!deduped.length) {
          document.getElementById("weeklyWrap").innerHTML = `<div class="empty"><span class="empty-icon">📅</span>No activity this week yet.</div>`;
          return;
        }

        const rows = deduped.slice(0, 20).map((u, i) => {
          const isMe = u.uid === myUid;
          const focusStr = u.focusTime > 0
            ? `<span style="color:var(--amber);margin-left:4px">⏱ ${u.focusTime >= 60 ? Math.floor(u.focusTime/60)+'h '+u.focusTime%60+'m' : u.focusTime+'m'}</span>`
            : "";
          return `
            <div class="rank-row ${isMe ? "is-me" : ""}">
              <div class="rank-num">#${i+1}</div>
              <div class="rank-avatar">${nameInitial(u.name)}</div>
              <div class="rank-info">
                <div class="rank-name">${escHtml(u.name)}${isMe ? " (You)" : ""}</div>
                <div class="rank-badge">${getBadge(u.xp)}${focusStr}</div>
              </div>
              <div class="rank-right">
                <div class="rank-xp">⭐ ${u.xp} XP</div>
                <div class="rank-streak">🔥 ${u.streak}</div>
              </div>
            </div>`;
        }).join("");
        document.getElementById("weeklyWrap").innerHTML = `<div class="weekly-list">${rows}</div>`;
      } catch(e) {
        console.warn("[Weekly]", e);
        // Fallback: show from already-loaded allEntries (already combined XP)
        const myUid = currentUser?.uid;
        if (allEntries.length) {
          const rows = allEntries.slice(0, 20).map((u, i) => {
            const isMe = u.uid === myUid;
            return `
              <div class="rank-row ${isMe ? "is-me" : ""}">
                <div class="rank-num">#${i+1}</div>
                <div class="rank-avatar">${nameInitial(u.name)}</div>
                <div class="rank-info">
                  <div class="rank-name">${escHtml(u.name)}${isMe ? " (You)" : ""}</div>
                  <div class="rank-badge">${getBadge(u.xp)}</div>
                </div>
                <div class="rank-right">
                  <div class="rank-xp">⭐ ${u.xp} XP</div>
                  <div class="rank-streak">🔥 ${u.streak}</div>
                </div>
              </div>`;
          }).join("");
          document.getElementById("weeklyWrap").innerHTML = `<div class="weekly-list">${rows}</div>`;
        } else {
          document.getElementById("weeklyWrap").innerHTML =
            `<div class="empty"><span class="empty-icon">📅</span>Weekly data loading...</div>`;
        }
      }
    }

    /* ── My rank ── */
    function updateMyRank() {
      if (!currentUser) return;
      const me = allEntries.find(u => u.uid === currentUser.uid);
      if (!me) return;
      const rankEl = document.getElementById("myRankLabel");
      if (rankEl) rankEl.textContent = `#${me.rank}`;
      if (prevRank !== null && me.rank < prevRank) showPopup("📈", "Rank Up!", `You moved to #${me.rank}! Keep going!`);
      prevRank = me.rank;
    }

    function checkLevelUp() {
      if (!currentUser) return;
      const xp    = parseInt(localStorage.getItem("uw_xp") || "0", 10);
      const level = getLevel(xp);
      if (prevLevel !== null && level > prevLevel) showPopup("🚀", `Level ${level}!`, `Amazing! You reached Level ${level}. ${getBadge(xp)}`);
      prevLevel = level;
    }

    function showPopup(icon, title, sub) {
      document.getElementById("popupIcon").textContent  = icon;
      document.getElementById("popupTitle").textContent = title;
      document.getElementById("popupSub").textContent   = sub;
      document.getElementById("popupOverlay").classList.add("show");
    }
    window.closePopup = () => document.getElementById("popupOverlay").classList.remove("show");

    window.addEventListener("uw_xp_changed", () => { if (currentUser) renderMyCard(currentUser); });

    function escHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>

<script src="theme.js"></script>
</body>
</html>
