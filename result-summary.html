<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Test Summary — Study Grid Prep</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="/icon-192.png">
<meta name="theme-color" content="#0f2027">

<!-- AUTH GATE -->
<script>
(function(){
  var isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(isPWA && !localStorage.getItem("userName")){
    document.documentElement.style.display='none';
    window.location.replace("login.html");
  }
})();
</script>

<!-- THEME — instant, no flash -->
<script>
(function(){
  var saved = localStorage.getItem("theme");
  var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute("data-theme", saved || (systemDark ? "dark" : "light"));
})();
</script>
<style>html{ visibility:hidden; } html[data-theme]{ visibility:visible; }</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">

<style>
/* ============================================================
   DESIGN SYSTEM — exact match to existing pages
============================================================ */
:root {
  --bg-start:       #ffffff;
  --bg-end:         #f0f4f8;
  --primary:        #22D3EE;
  --primary-dark:   #06B6D4;
  --secondary:      #34D399;
  --accent:         #F43F5E;
  --text-primary:   #111111;
  --text-secondary: #555555;
  --card-bg:        rgba(0,0,0,0.04);
  --card-border:    rgba(0,0,0,0.08);
  --header-bg:      #ffffff;
  --glass-bg:       rgba(0,0,0,0.03);
  --radius:         16px;
  --shadow:         0 4px 24px rgba(0,0,0,0.09);
  --transition:     0.26s ease;
  --green:          #10B981;
  --red:            #EF4444;
  --amber:          #F59E0B;
  --purple:         #8B5CF6;
}
[data-theme="dark"] {
  --bg-start:       #0B1220;
  --bg-end:         #0F172A;
  --text-primary:   #E2E8F0;
  --text-secondary: #94A3B8;
  --card-bg:        rgba(255,255,255,0.04);
  --card-border:    rgba(255,255,255,0.08);
  --header-bg:      rgba(11,18,32,0.98);
  --glass-bg:       rgba(255,255,255,0.04);
  --shadow:         0 4px 28px rgba(0,0,0,0.38);
}

/* ============================================================
   RESET / BASE
============================================================ */
*, *::before, *::after {
  margin:0; padding:0; box-sizing:border-box;
  font-family:'Poppins', sans-serif;
  -webkit-tap-highlight-color: transparent;
}
html { background: var(--bg-start); height:100%; }
body {
  background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
  color: var(--text-primary);
  min-height:100%; min-height:100dvh;
  display:flex; flex-direction:column;
  overscroll-behavior-y: none;
  animation: pageIn 0.36s ease forwards;
}
@keyframes pageIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ============================================================
   PAGE TRANSITION OVERLAY
============================================================ */
#pageTransition {
  position:fixed; inset:0;
  background: var(--bg-start);
  z-index:99999; opacity:0; pointer-events:none;
  transition: opacity 0.22s ease;
}
#pageTransition.leaving { opacity:1; pointer-events:all; }

/* ============================================================
   FIXED HEADER
============================================================ */
header {
  position: sticky; top:0; z-index:900;
  display:flex; align-items:center;
  justify-content:space-between;
  padding: 14px 18px;
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--card-border);
  gap:12px;
  flex-shrink:0;
}
.hdr-left {
  display:flex; flex-direction:column; gap:1px; flex:1; min-width:0;
}
.hdr-title {
  font-size:clamp(13px, 3.8vw, 17px);
  font-weight:700; color:var(--text-primary);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  line-height:1.25;
}
.hdr-subtitle {
  font-size:11px; color:var(--text-secondary);
  font-weight:500; letter-spacing:0.03em;
}
.hdr-logo {
  font-size:12px; font-weight:700;
  color:var(--primary); letter-spacing:0.06em;
  text-transform:uppercase; flex-shrink:0;
}
.hdr-avatar {
  width:34px; height:34px; border-radius:50%;
  background: linear-gradient(135deg,#22D3EE,#06B6D4);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:#0B1220;
  flex-shrink:0; box-shadow:0 2px 8px rgba(34,211,238,0.3);
}

/* ============================================================
   SCROLLABLE BODY
============================================================ */
main {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:24px 18px 120px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
main::-webkit-scrollbar { width:3px; }
main::-webkit-scrollbar-thumb { background:var(--card-border); border-radius:99px; }

/* ============================================================
   SUBMITTED BANNER
============================================================ */
.submitted-banner {
  display:flex; align-items:center; gap:12px;
  padding:14px 18px;
  background: rgba(16,185,129,0.08);
  border:1px solid rgba(16,185,129,0.25);
  border-radius: var(--radius);
  margin-bottom:20px;
  animation: slideDown 0.4s ease 0.1s both;
}
@keyframes slideDown {
  from { opacity:0; transform:translateY(-10px); }
  to   { opacity:1; transform:translateY(0); }
}
.banner-icon {
  width:38px; height:38px; border-radius:50%;
  background: rgba(16,185,129,0.15);
  display:flex; align-items:center; justify-content:center;
  color: var(--green); font-size:16px; flex-shrink:0;
}
.banner-text { flex:1; min-width:0; }
.banner-title {
  font-size:13px; font-weight:700; color:var(--green);
}
.banner-sub { font-size:11px; color:var(--text-secondary); margin-top:1px; }

/* ============================================================
   META ROW (exam info pills)
============================================================ */
.meta-row {
  display:flex; flex-wrap:wrap; gap:8px;
  margin-bottom:20px;
  animation: fadeUp 0.4s ease 0.15s both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.meta-pill {
  display:flex; align-items:center; gap:6px;
  padding:6px 12px; border-radius:99px;
  background: var(--card-bg);
  border:1px solid var(--card-border);
  font-size:11px; font-weight:600;
  color:var(--text-secondary); letter-spacing:0.03em;
}
.meta-pill i { font-size:10px; color:var(--primary); }

/* ============================================================
   MAIN SUMMARY CARD
============================================================ */
.summary-card {
  background: var(--header-bg);
  border:1px solid var(--card-border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow:hidden;
  margin-bottom:18px;
  animation: fadeUp 0.45s ease 0.2s both;
  position:relative;
}
/* Subtle top accent line */
.summary-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0;
  height:3px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
}

.card-header {
  padding:16px 20px 12px;
  border-bottom:1px solid var(--card-border);
  display:flex; align-items:center; gap:10px;
}
.card-header-icon {
  width:32px; height:32px; border-radius:9px;
  background: rgba(34,211,238,0.1);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; color:var(--primary);
}
.card-header-title {
  font-size:14px; font-weight:700; color:var(--text-primary);
}
.card-header-sub {
  font-size:11px; color:var(--text-secondary); margin-top:1px;
}

/* Stats rows inside card */
.stat-row {
  display:flex; align-items:center;
  padding:14px 20px;
  border-bottom:1px solid var(--card-border);
  transition: background 0.18s;
}
.stat-row:last-child { border-bottom:none; }
.stat-row:hover { background: var(--glass-bg); }

.stat-label-wrap {
  display:flex; align-items:center; gap:10px; flex:1; min-width:0;
}
.stat-dot {
  width:10px; height:10px; border-radius:3px; flex-shrink:0;
}
.stat-label {
  font-size:13px; font-weight:500; color:var(--text-secondary);
  white-space:nowrap;
}
.stat-value {
  font-size:18px; font-weight:800;
  color:var(--text-primary);
  font-variant-numeric:tabular-nums;
  letter-spacing:-0.02em;
  flex-shrink:0;
}
.stat-value.green  { color:var(--green); }
.stat-value.red    { color:var(--red); }
.stat-value.amber  { color:var(--amber); }
.stat-value.purple { color:var(--purple); }

/* Score bar inside card */
.score-bar-wrap {
  padding:16px 20px;
  border-bottom:1px solid var(--card-border);
}
.score-bar-label {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:8px;
}
.score-bar-title { font-size:12px; font-weight:600; color:var(--text-secondary); }
.score-bar-val   { font-size:13px; font-weight:800; color:var(--primary); }
.score-bar-track {
  height:7px; background:var(--card-bg);
  border-radius:99px; overflow:hidden;
  border:1px solid var(--card-border);
}
.score-bar-fill {
  height:100%; border-radius:99px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  width:0; transition:width 1.1s cubic-bezier(0.4,0,0.2,1) 0.6s;
}

/* Time taken pill */
.time-pill {
  margin:14px 20px 16px;
  display:inline-flex; align-items:center; gap:8px;
  padding:8px 14px; border-radius:10px;
  background: rgba(34,211,238,0.06);
  border:1px solid rgba(34,211,238,0.18);
  font-size:12px; font-weight:600; color:var(--primary);
}

/* ============================================================
   CTA BUTTON
============================================================ */
.cta-wrap {
  animation: fadeUp 0.5s ease 0.4s both;
  padding-bottom:8px;
}
.cta-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:16px 24px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 50%, #8B5CF6 100%);
  background-size:200% 200%; background-position:0% 50%;
  color:#0B1220; font-size:15px; font-weight:700;
  border:none; border-radius:var(--radius);
  cursor:pointer; letter-spacing:0.02em;
  box-shadow:0 6px 24px rgba(34,211,238,0.28);
  transition: background-position 0.4s ease, transform 0.18s, box-shadow 0.18s;
}
.cta-btn:hover {
  background-position:100% 50%;
  box-shadow:0 8px 32px rgba(34,211,238,0.38);
  transform:translateY(-2px);
}
.cta-btn:active {
  transform:scale(0.97) translateY(0);
  box-shadow:0 3px 12px rgba(34,211,238,0.22);
}
.cta-btn i { font-size:16px; }

.cta-note {
  text-align:center; font-size:11px; color:var(--text-secondary);
  margin-top:10px;
}

/* ============================================================
   NO DATA STATE
============================================================ */
.no-data {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; padding:60px 24px; text-align:center;
}
.no-data-icon { font-size:44px; color:var(--text-secondary); opacity:0.4; }
.no-data-title { font-size:16px; font-weight:600; }
.no-data-sub   { font-size:13px; color:var(--text-secondary); }
.no-data-btn {
  margin-top:8px; padding:11px 24px;
  background:var(--primary); color:#0B1220;
  border:none; border-radius:12px;
  font-size:13px; font-weight:700;
  cursor:pointer; transition:all 0.18s;
}
.no-data-btn:active { transform:scale(0.97); }

/* ============================================================
   CONFETTI PARTICLES (CSS-only, subtle)
============================================================ */
.confetti-wrap {
  position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:800; overflow:hidden;
}
.confetti-piece {
  position:absolute; top:-20px;
  width:8px; height:8px; border-radius:2px;
  opacity:0; animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { opacity:1; transform:translateY(0) rotate(0deg); }
  100% { opacity:0; transform:translateY(100vh) rotate(720deg); }
}
</style>
</head>

<body>

<!-- Page Transition -->
<div id="pageTransition"></div>

<!-- Confetti (appears on load) -->
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- ===== FIXED HEADER ===== -->
<header>
  <div class="hdr-left">
    <div class="hdr-title" id="hdrTitle">Mock Test Summary</div>
    <div class="hdr-subtitle" id="hdrSubtitle">Study Grid Prep</div>
  </div>
  <div class="hdr-logo"></div>
  <div class="hdr-avatar" id="hdrAvatar">S</div>
</header>

<!-- ===== SCROLLABLE MAIN ===== -->
<main>

  <!-- Submitted Banner -->
  <div class="submitted-banner">
    <div class="banner-icon"><i class="fa-solid fa-circle-check"></i></div>
    <div class="banner-text">
      <div class="banner-title">Test Submitted Successfully</div>
      <div class="banner-sub" id="bannerSub">Your responses have been recorded.</div>
    </div>
  </div>

  <!-- Meta pills -->
  <div class="meta-row" id="metaRow"></div>

  <!-- Summary Card -->
  <div class="summary-card" id="summaryCard">
    <div class="card-header">
      <div class="card-header-icon"><i class="fa-solid fa-clipboard-list"></i></div>
      <div>
        <div class="card-header-title">Response Summary</div>
        <div class="card-header-sub">NTA-style overview of your attempt</div>
      </div>
    </div>

    <!-- Score bar -->
    <div class="score-bar-wrap">
      <div class="score-bar-label">
        <span class="score-bar-title">Score Progress</span>
        <span class="score-bar-val" id="scoreBarLabel">— / —</span>
      </div>
      <div class="score-bar-track">
        <div class="score-bar-fill" id="scoreBarFill"></div>
      </div>
    </div>

    <!-- Stats rows -->
    <div id="statsRows"></div>

    <!-- Time pill -->
    <div class="time-pill" id="timePill">
      <i class="fa-regular fa-clock"></i>
      <span id="timePillText">— mins taken</span>
    </div>
  </div>

  <!-- CTA Button -->
  <div class="cta-wrap">
    <button class="cta-btn" onclick="goToAnalysis()">
      Go To Results &amp; Analysis
      <i class="fa-solid fa-arrow-right"></i>
    </button>
    <div class="cta-note">Detailed question-wise analysis with correct answers</div>
  </div>

</main>

<script src="theme.js"></script>

<script>
/* ============================================================
   RESULT SUMMARY PAGE — result-summary.html
   Reads from localStorage: lastTestResult
   Written by mock.html on submit
============================================================ */

/* ── Smooth navigate ── */
window.navigate = function(url) {
  const v = document.getElementById('pageTransition');
  if (v) v.classList.add('leaving');
  setTimeout(() => { window.location.href = url; }, 210);
};

window.goToAnalysis = function() {
  navigate('result-analysis.html');
};

/* ── Helpers ── */
function pad(n) { return String(n).padStart(2,'0'); }

function formatTime(seconds) {
  if (!seconds || isNaN(seconds)) return '0 min';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${h}h ${pad(m)}m ${pad(s)}s`;
  if (m > 0) return `${m}m ${pad(s)}s`;
  return `${s}s`;
}

function escHtml(str) {
  if (!str && str !== 0) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Animate number from 0 to val ── */
function animateNumber(el, target, duration) {
  if (!el || isNaN(target)) return;
  const start = 0;
  const startTime = performance.now();
  function tick(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3); // ease-out-cubic
    el.textContent = Math.round(start + (target - start) * eased);
    if (progress < 1) requestAnimationFrame(tick);
    else el.textContent = target;
  }
  requestAnimationFrame(tick);
}

/* ── MAIN INIT ── */
(function init() {
  /* 1. Load result from localStorage */
  let result = null;
  try {
    const raw = localStorage.getItem('lastTestResult');
    if (raw) result = JSON.parse(raw);
  } catch(e) { result = null; }

  /* 2. Also read direct localStorage keys as fallback */
  const exam     = (result?.exam     || localStorage.getItem('selectedExam')     || 'exam').toUpperCase();
  const year     = result?.year      || localStorage.getItem('selectedYear')     || '';
  const shift    = result?.shift     || localStorage.getItem('selectedShift')    || '';
  let subjects   = result?.subjects;
  if (!subjects) {
    try { subjects = JSON.parse(localStorage.getItem('selectedSubjects') || '[]'); } catch(e){ subjects = []; }
  }
  const userName = localStorage.getItem('userName') || 'Student';

  /* 3. Header */
  const hdrTitle = document.getElementById('hdrTitle');
  if (hdrTitle) hdrTitle.textContent = `${exam} Mock Test Summary`;

  const hdrSubtitle = document.getElementById('hdrSubtitle');
  if (hdrSubtitle) hdrSubtitle.textContent = 'Study Grid Prep';

  const avatar = document.getElementById('hdrAvatar');
  if (avatar) avatar.textContent = (userName || 'S').charAt(0).toUpperCase();

  /* 4. No result guard */
  if (!result) {
    const sc = document.getElementById('summaryCard');
    if (sc) sc.innerHTML = `
      <div class="no-data">
        <div class="no-data-icon"><i class="fa-regular fa-circle-xmark"></i></div>
        <div class="no-data-title">No Result Data Found</div>
        <div class="no-data-sub">Please complete a mock test first.</div>
        <button class="no-data-btn" onclick="navigate('mock-home.html')">Go to Mock Tests</button>
      </div>`;
    document.getElementById('metaRow').style.display = 'none';
    document.querySelector('.submitted-banner').style.display = 'none';
    document.querySelector('.cta-wrap').style.display = 'none';
    return;
  }

  /* 5. Pull stats from result object */
  const total       = result.total       || 0;
  const attempted   = result.correct + result.incorrect || 0;
  const unattempted = result.unattempted  || (total - attempted);
  const correct     = result.correct      || 0;
  const incorrect   = result.incorrect    || 0;
  const score       = result.score        || 0;
  const timeTaken   = result.timeTaken    || 0;

  // Max possible score — dynamic based on exam marking scheme
  const markingScheme = result.marking || localStorage.getItem('selectedMarking') || (result.exam === 'jee' ? '+4/-1' : '+5/-1');
  const posPerQ = parseInt(markingScheme.split('/')[0]) || (result.exam === 'jee' ? 4 : 5);
  const maxScore = total * posPerQ;

  // Marked for review — compute from answers if present
  let marked = 0;
  if (result.answers) {
    Object.values(result.answers).forEach(secAns => {
      Object.values(secAns).forEach(a => {
        if (a && a.marked) marked++;
      });
    });
  }

  /* 6. Banner subtitle */
  const bannerSub = document.getElementById('bannerSub');
  if (bannerSub) {
    const dateStr = result.submittedAt
      ? new Date(result.submittedAt).toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' })
      : new Date().toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' });
    bannerSub.textContent = `Submitted on ${dateStr}`;
  }

  /* 7. Meta pills */
  const metaRow = document.getElementById('metaRow');
  if (metaRow) {
    const pills = [
      { icon:'fa-graduation-cap', label: exam },
      year  ? { icon:'fa-calendar',        label: String(year) } : null,
      shift ? { icon:'fa-clock-rotate-left', label: shift }      : null,
      Array.isArray(subjects) && subjects.length > 0
        ? { icon:'fa-book-open', label: subjects.join(', ') }
        : null,
    ].filter(Boolean);

    metaRow.innerHTML = pills.map(p => `
      <div class="meta-pill">
        <i class="fa-solid ${p.icon}"></i>
        ${escHtml(p.label)}
      </div>`).join('');
  }

  /* 8. Score bar */
  const scoreBarLabel = document.getElementById('scoreBarLabel');
  const scoreBarFill  = document.getElementById('scoreBarFill');
  if (scoreBarLabel) scoreBarLabel.textContent = `${score} / ${maxScore}`;
  if (scoreBarFill && maxScore > 0) {
    const pct = Math.max(0, Math.min(100, ((score / maxScore) * 100)));
    setTimeout(() => { scoreBarFill.style.width = pct + '%'; }, 400);
  }

  /* 9. Stat rows */
  const rows = [
    { label:'Total Questions',      value:total,       color:'',        dot:'#9CA3AF' },
    { label:'Attempted',            value:attempted,   color:'',        dot:'#22D3EE' },
    { label:'Unattempted',          value:unattempted, color:'amber',   dot:'#F59E0B' },
    { label:'Marked for Review',    value:marked,      color:'purple',  dot:'#8B5CF6' },
    { label:'Correct Answers',      value:correct,     color:'green',   dot:'#10B981' },
    { label:'Incorrect Answers',    value:incorrect,   color:'red',     dot:'#EF4444' },
  ];

  const statsRows = document.getElementById('statsRows');
  if (statsRows) {
    statsRows.innerHTML = rows.map((r, i) => `
      <div class="stat-row" style="animation:fadeUp 0.35s ease ${0.25 + i * 0.07}s both;">
        <div class="stat-label-wrap">
          <div class="stat-dot" style="background:${r.dot};"></div>
          <span class="stat-label">${r.label}</span>
        </div>
        <span class="stat-value ${r.color}" id="sv_${i}">0</span>
      </div>`).join('');

    // Animate each number
    rows.forEach((r, i) => {
      const el = document.getElementById('sv_' + i);
      setTimeout(() => animateNumber(el, r.value, 800), 300 + i * 80);
    });
  }

  /* 10. Time pill */
  const timePillText = document.getElementById('timePillText');
  if (timePillText) timePillText.textContent = `Time taken: ${formatTime(timeTaken)}`;

  /* 11. Confetti (light celebration on decent score) */
  if (correct > 0) spawnConfetti();

})();

/* ── Confetti ── */
function spawnConfetti() {
  const wrap = document.getElementById('confettiWrap');
  if (!wrap) return;
  const colors = ['#22D3EE','#34D399','#F43F5E','#8B5CF6','#F59E0B'];
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random() * 100}%;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      width:${6 + Math.random() * 6}px;
      height:${6 + Math.random() * 6}px;
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration:${1.8 + Math.random() * 2}s;
      animation-delay:${Math.random() * 0.8}s;
    `;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

/* ── Theme-color meta sync ── */
(function() {
  const meta = document.querySelector('meta[name="theme-color"]');
  if (!meta) return;
  function sync() {
    meta.content = document.documentElement.getAttribute('data-theme') === 'dark' ? '#0B1220' : '#ffffff';
  }
  sync();
  new MutationObserver(sync).observe(document.documentElement, { attributes:true, attributeFilter:['data-theme'] });
})();
</script>
