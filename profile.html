<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Untitled World</title>
<link rel="icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg-start:#0B1220; --bg-end:#0F172A;
  --primary:#22D3EE; --primary-dark:#06B6D4;
  --secondary:#34D399; --accent:#F43F5E;
  --text-primary:#E2E8F0; --text-secondary:#94A3B8;
  --card-bg:rgba(255,255,255,0.03); --card-border:rgba(255,255,255,0.08);
  --radius:16px; --shadow:0 4px 20px rgba(0,0,0,0.3); --transition:0.25s ease;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
html{background:var(--bg-start);}
body{
  background:linear-gradient(160deg,var(--bg-start) 0%,var(--bg-end) 100%);
  min-height:100vh; color:var(--text-primary);
  padding-bottom:90px;
  padding-top:76px;
  animation:pageIn 0.3s ease forwards;
}
/* ⚠️ ONLY opacity — NO transform on body.
   transform:translateY on body breaks ALL position:fixed children (known CSS bug) */
@keyframes pageIn{from{opacity:0;}to{opacity:1;}}

/* ===== FIXED TOP HEADER (APP STYLE) ===== */
.top-bar{
  position:fixed;
  top:0; left:0; width:100%;
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;
  background:rgba(11,18,32,0.92);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--card-border);
  z-index:1000;
  box-sizing:border-box;
}
.avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:18px;color:#0B1220;
  box-shadow:0 0 0 3px rgba(34,211,238,0.2);flex-shrink:0;
}
.user-info{display:flex;flex-direction:column;flex:1;min-width:0;}
#userName{font-weight:600;font-size:15px;color:var(--text-primary);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-email{font-size:11px;color:var(--text-secondary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.goal-badge{
  background:rgba(34,211,238,0.1);color:var(--primary);
  border:1px solid rgba(34,211,238,0.25);
  padding:5px 12px;border-radius:50px;font-size:12px;font-weight:600;flex-shrink:0;
}

.profile-container{
  max-width:440px;margin:auto;
  padding:8px 20px 24px;
  display:flex;flex-direction:column;gap:16px;
}
.profile-card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);
  transition:var(--transition);
}
.profile-card:hover{border-color:rgba(34,211,238,0.2);}
.section-title{
  font-size:14px;font-weight:600;color:var(--primary);
  display:flex;align-items:center;gap:8px;margin-bottom:16px;
  text-transform:uppercase;letter-spacing:0.5px;
}
.input-label{
  display:block;font-size:12px;color:var(--text-secondary);
  font-weight:500;margin-bottom:6px;letter-spacing:0.3px;
}
.edtech-input,.edtech-select{
  width:100%;padding:12px 16px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.25);color:var(--text-primary);
  font-size:14px;outline:none;margin-bottom:16px;
  font-family:'Poppins',sans-serif;box-sizing:border-box;
  transition:var(--transition);-webkit-appearance:none;appearance:none;
}
.edtech-input:focus,.edtech-select:focus{
  border-color:rgba(34,211,238,0.5);
  box-shadow:0 0 0 3px rgba(34,211,238,0.08);
}
.edtech-input::placeholder{color:var(--text-secondary);}
.edtech-select option{background:#162030;color:var(--text-primary);}

/* ===== NAME DISPLAY ROW ===== */
.name-display-row{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:12px 14px;
  margin-bottom:16px;
}
.name-avatar-sm{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:16px;color:#0B1220;
}
.name-display-info{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;}
.name-display-label{font-size:11px;color:var(--text-secondary);}
.name-display-value{font-size:14px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.divider-line{
  height:1px;background:rgba(255,255,255,0.06);
  margin:4px 0 16px 0;
}

/* ===== FIXED DATE CHIP ===== */
.fixed-date-chip{
  width:100%;padding:12px 16px;
  border-radius:12px;
  border:1px solid rgba(34,211,238,0.3);
  background:rgba(34,211,238,0.05);
  color:var(--primary);
  font-size:14px;font-weight:600;
  margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}

/* ===== COUNTDOWN CHIP ===== */
.countdown-chip{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:rgba(251,191,36,0.08);
  border:1px solid rgba(251,191,36,0.25);
  border-radius:10px;
  padding:9px 14px;
  color:#FBBF24;
  font-size:13px;font-weight:600;
  margin-bottom:16px;
}

.save-btn{
  width:100%;padding:14px;border:none;border-radius:50px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#0B1220;font-weight:700;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(34,211,238,0.25);transition:var(--transition);
}
.save-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(34,211,238,0.35);}
.save-btn:active{transform:scale(0.97);}

#msg{
  display:none;margin-top:12px;padding:10px 16px;
  background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);
  border-radius:10px;color:var(--secondary);font-size:13px;
  font-weight:600;text-align:center;
}

.sub-promo-card{
  background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.25);
  color:#FBBF24 !important;padding:14px 20px;border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;gap:10px;
  text-decoration:none;font-weight:600;font-size:14px;transition:var(--transition);cursor:pointer;
}
.sub-promo-card:hover{background:rgba(251,191,36,0.1);}
.sub-promo-card:active{transform:scale(0.97);}

.logout-btn{
  background:rgba(244,63,94,0.06);border:1px solid rgba(244,63,94,0.25);
  color:#F87171;width:100%;padding:14px;border-radius:var(--radius);
  font-weight:600;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;transition:var(--transition);
}
.logout-btn:hover{background:rgba(244,63,94,0.1);}
.logout-btn:active{transform:scale(0.97);}

.follow-section{text-align:center;padding:4px 0;}
.follow-section p{
  margin-bottom:12px;font-size:13px;font-weight:600;
  color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;
}
.social-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}

.yt-promo-card{
  background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.3);
  border-radius:50px;padding:9px 18px;display:inline-flex;align-items:center;
  justify-content:center;gap:8px;color:#ff4757 !important;text-decoration:none;
  font-weight:600;font-size:13px;transition:var(--transition);
}
.yt-promo-card:hover{background:rgba(255,71,87,0.14);}
.yt-promo-card:active{transform:scale(0.97);}

.contact-promo-card{
  background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.3);
  border-radius:50px;padding:9px 18px;display:inline-flex;align-items:center;
  justify-content:center;gap:8px;color:var(--primary) !important;text-decoration:none;
  font-weight:600;font-size:13px;transition:var(--transition);
}
.contact-promo-card:hover{background:rgba(34,211,238,0.14);}
.contact-promo-card:active{transform:scale(0.97);}

.made-line{
  font-family:'Playfair Display',serif;font-size:14px;
  font-style:italic;text-align:center;color:var(--text-secondary);padding:8px 0;
}

/* ===== NTA CARD ===== */
.nta-card{
  background:rgba(0,48,135,0.12);
  border:1px solid rgba(0,48,135,0.35);
  border-radius:14px;
  padding:12px 14px;
  margin-bottom:14px;
}
.nta-logo-box{
  display:flex;align-items:center;gap:12px;
}
.nta-logo-wrap{
  flex-shrink:0;
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
}
.nta-real-logo{
  width:48px;height:48px;
  object-fit:contain;
  border-radius:8px;
  background:white;
  padding:3px;
}
.nta-info{display:flex;flex-direction:column;gap:5px;flex:1;}
.nta-exam-name{font-size:15px;font-weight:700;color:#E2E8F0;}
.nta-exam-badges{display:flex;gap:6px;align-items:center;}
.nta-badge-nta{
  font-size:10px;font-weight:700;
  background:rgba(0,48,135,0.5);
  border:1px solid rgba(100,149,237,0.4);
  color:#93C5FD;padding:2px 8px;border-radius:50px;
}
.nta-badge-year{
  font-size:10px;font-weight:700;
  background:rgba(251,191,36,0.12);
  border:1px solid rgba(251,191,36,0.3);
  color:#FBBF24;padding:2px 8px;border-radius:50px;
}
.exam-side-logo{
  width:40px;height:40px;
  object-fit:contain;
  flex-shrink:0;
  border-radius:8px;
}

/* ===== NOTIFICATION ROW ===== */
.notif-row{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(251,191,36,0.06);
  border:1px solid rgba(251,191,36,0.2);
  border-radius:12px;
  padding:11px 14px;
  margin-bottom:14px;
  gap:10px;
}
.notif-row-text{
  display:flex;align-items:center;gap:8px;
  font-size:13px;color:var(--text-secondary);font-weight:500;
}
.notif-toggle{
  background:linear-gradient(135deg,#FBBF24,#F59E0B);
  color:#0B1220;border:none;
  border-radius:50px;padding:5px 14px;
  font-size:12px;font-weight:700;cursor:pointer;
  white-space:nowrap;transition:var(--transition);flex-shrink:0;
}
.notif-toggle.enabled{
  background:rgba(52,211,153,0.15);
  border:1px solid rgba(52,211,153,0.3);
  color:var(--secondary);
}

/* ===== BOTTOM NAV ===== */
.pwa-bottom-nav{
  position:fixed;bottom:0;left:0;width:100%;height:64px;
  background:rgba(11,18,32,0.95);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  display:flex;justify-content:space-around;align-items:center;
  z-index:2000;border-top:1px solid var(--card-border);
}
.pwa-bottom-nav a{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-decoration:none;color:var(--text-secondary);font-size:11px;
  gap:4px;padding:8px 12px;border-radius:12px;transition:var(--transition);min-width:52px;
}
.pwa-bottom-nav a i{font-size:18px;}
.pwa-bottom-nav a.active{color:var(--primary);}
.pwa-bottom-nav a:not(.active):hover{color:var(--text-primary);}
.pwa-bottom-nav a .fa-youtube{color:#ff4757 !important;}
</style>
</head>
<body>

<div class="top-bar">

  <div class="user-info">

<div class="profile-container">

    <!-- Goal Select -->

            id="ntaLogoImg"

            class="nta-real-logo"
            onerror="this.style.display='none'; document.getElementById('ntaFallback').style.display='flex';"
          >
          <!-- Fallback if logo doesn't load -->

      min="2026-04-02" max="2026-04-20"

    <!-- Boards date picker (any date) -->
    <input type="date" id="boardsDatePicker" class="edtech-input"
      min="2026-01-01" max="2027-12-31"
      style="display:none;">

    <!-- Fixed date chip for NEET / CUET -->
    <div class="fixed-date-chip" id="fixedDateChip" style="display:none;"></div>

    <!-- Countdown chip -->
    <div class="countdown-chip" id="countdownChip" style="display:none;">
      <i class="fa-solid fa-fire" style="color:#fb923c;"></i>
      <span id="countdownText">--</span>
    </div>

    <!-- Notification enable row -->
    <div class="notif-row" id="notifRow" style="display:none;">
      <div class="notif-row-text">

        <span>Daily exam reminder</span>

      <button class="notif-toggle" id="notifToggle" onclick="toggleNotif()">Enable</button>
    </div>

    <button class="save-btn" onclick="saveProfile()" style="margin-top:4px;">
      <i class="fa-solid fa-floppy-disk"></i> Save
    </button>
    <div id="msg"></div>
  </div>

  <a href="subscription.html" class="sub-promo-card">

  <div class="follow-section">

    <div class="social-row">
      <a href="https://www.youtube.com/@untitledworld01" target="_blank" class="yt-promo-card">
        <i class="fa-brands fa-youtube"></i> YouTube
      </a>
      <a href="contact.html" class="contact-promo-card">

</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_13GJOiLQwxsirfJ7T_4WinaxVmSp7fs",
  authDomain: "untitled-world-2e645.firebaseapp.com",
  projectId: "untitled-world-2e645",
  storageBucket: "untitled-world-2e645.firebasestorage.app",
  messagingSenderId: "990115586087",
  appId: "1:990115586087:web:963f68bd59dec5ef0c6e02"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ===== EXAM DATA (2026) =====
const EXAM_INFO = {
  JEE:    { 
    date: "2026-04-02", label: "2 Apr 2026",  name: "JEE Main 2026",   nta: true,
    logo: "https://jeemain.nta.ac.in/webinfo2024/File/GetFile?FilePathKey=LogoBgWhite"
  },
  NEET:   { 
    date: "2026-05-04", label: "4 May 2026",  name: "NEET UG 2026",    nta: true,
    logo: "https://neet.nta.nic.in/webinfo2024/File/GetFile?FilePathKey=LogoBgWhite"
  },
  CUET:   { 
    date: "2026-05-14", label: "14 May 2026", name: "CUET UG 2026",    nta: true,
    logo: "https://cuet.samarth.ac.in/images/cuet-logo.png"
  },
  Boards: { date: null, label: null, name: "Board Exams", nta: false, logo: null }
};

// ===== LOAD =====
const name          = localStorage.getItem("customUserName") || localStorage.getItem("userName") || "User";
const email         = localStorage.getItem("userEmail") || "";
const savedGoal     = localStorage.getItem("goal")     || "JEE";
const savedExamDate = localStorage.getItem("examDate") || "";

document.getElementById("userName").innerText    = name;
document.getElementById("userEmail").innerText   = email;
document.getElementById("avatar").innerText      = name.charAt(0).toUpperCase();
document.getElementById("goalBadge").innerText   = savedGoal;
document.getElementById("nameDisplay").innerText = name;
document.getElementById("avatarSm").innerText    = name.charAt(0).toUpperCase();
document.getElementById("goalSelect").value      = savedGoal;

// Update notif button state on load
updateNotifBtn();
onGoalChange(savedExamDate);

// ===== GOAL CHANGE =====
function onGoalChange(prefillDate) {
  const goal        = document.getElementById("goalSelect").value;
  const jeePicker   = document.getElementById("jeeDatePicker");
  const boardsPicker= document.getElementById("boardsDatePicker");
  const fixedChip   = document.getElementById("fixedDateChip");
  const countdownEl = document.getElementById("countdownChip");
  const ntaCard     = document.getElementById("ntaCard");
  const dateLabel   = document.getElementById("dateLabel");
  const notifRow    = document.getElementById("notifRow");

  // Reset all
  jeePicker.style.display    = "none";
  boardsPicker.style.display = "none";
  fixedChip.style.display    = "none";
  ntaCard.style.display      = "none";
  dateLabel.style.display    = "none";
  countdownEl.style.display  = "none";
  notifRow.style.display     = "none";

  const info = EXAM_INFO[goal];

  // Show NTA card for JEE/NEET/CUET
  if(info.nta) {
    ntaCard.style.display = "block";
    document.getElementById("ntaExamName").innerText = info.name;
    // Set per-exam logo on right side
    const examLogoEl = document.getElementById("examLogoImg");
    if(info.logo) {
      examLogoEl.src = info.logo;
      examLogoEl.alt = info.name;
      examLogoEl.style.display = "block";
    } else {
      examLogoEl.style.display = "none";
    }
  }

  dateLabel.style.display = "block";

  if(goal === "JEE") {
    jeePicker.style.display = "block";
    const prefill = (prefillDate && prefillDate.startsWith("2026-04")) ? prefillDate : info.date;
    jeePicker.value = prefill;
    showCountdown(jeePicker.value);
    jeePicker.oninput = () => showCountdown(jeePicker.value);

  } else if(goal === "Boards") {
    boardsPicker.style.display = "block";
    if(prefillDate) boardsPicker.value = prefillDate;
    if(boardsPicker.value) showCountdown(boardsPicker.value);
    boardsPicker.oninput = () => showCountdown(boardsPicker.value);

  } else {
    // NEET / CUET — fixed date
    fixedChip.style.display = "flex";
    fixedChip.innerHTML = `<i class="fa-solid fa-calendar-check"></i> ${info.label}`;
    showCountdown(info.date);
  }

  // Show notif row whenever there's a countdown
  notifRow.style.display = "flex";
}

function showCountdown(dateStr) {
  if(!dateStr) return;
  const countdownEl = document.getElementById("countdownChip");
  const examTs  = new Date(dateStr); examTs.setHours(0,0,0,0);
  const todayTs = new Date();        todayTs.setHours(0,0,0,0);
  const diff    = Math.ceil((examTs - todayTs) / 86400000);

  countdownEl.style.display = "flex";
  const txt = document.getElementById("countdownText");
  if(diff > 0)      txt.innerText = `${diff} days left — You got this! 💪`;
  else if(diff===0) txt.innerText = "Exam is TODAY! All the best 🙏";
  else              txt.innerText = "Exam date has passed.";
}

// ===== NOTIFICATION =====
function updateNotifBtn() {
  const btn = document.getElementById("notifToggle");
  if(!btn) return;
  const granted = Notification.permission === "granted";
  const enabled = localStorage.getItem("examNotifEnabled") === "true";
  if(granted && enabled) {
    btn.textContent = "✓ Enabled";
    btn.className   = "notif-toggle enabled";
  } else {
    btn.textContent = "Enable";
    btn.className   = "notif-toggle";
  }
}

async function toggleNotif() {
  if(Notification.permission === "granted" && localStorage.getItem("examNotifEnabled")==="true") {
    localStorage.removeItem("examNotifEnabled");
    updateNotifBtn();
    return;
  }
  try {
    const perm = await Notification.requestPermission();
    if(perm === "granted") {
      localStorage.setItem("examNotifEnabled", "true");
      updateNotifBtn();
      // Show test notification
      const goal = localStorage.getItem("goal") || "JEE";
      const days = getDaysLeft();
      new Notification("📚 Untitled World", {
        body: `${EXAM_INFO[goal]?.name || goal} — ${days > 0 ? days+" days left!" : "Exam today!"} 🔥`,
        icon: "/icon-192.png",
        badge: "/icon-192.png"
      });
    }
  } catch(e) { console.log(e); }
}

function getDaysLeft() {
  const date = localStorage.getItem("examDate");
  if(!date) return 0;
  const d = new Date(date); d.setHours(0,0,0,0);
  const t = new Date();     t.setHours(0,0,0,0);
  return Math.ceil((d - t) / 86400000);
}

// ===== SAVE =====
async function saveProfile() {
  const selectedGoal = document.getElementById("goalSelect").value;
  let examDate = "";

  if(selectedGoal === "JEE") {
    examDate = document.getElementById("jeeDatePicker").value || EXAM_INFO.JEE.date;
  } else if(selectedGoal === "Boards") {
    examDate = document.getElementById("boardsDatePicker").value || "";
  } else {
    examDate = EXAM_INFO[selectedGoal]?.date || "";
  }

  localStorage.setItem("goal",     selectedGoal);
  localStorage.setItem("examDate", examDate);
  document.getElementById("goalBadge").innerText = selectedGoal;

  try {
    const docKey = localStorage.getItem("userName") || name;
    await setDoc(doc(db,"users",docKey), { goal: selectedGoal, examDate: examDate }, { merge: true });
  } catch(e) { console.log("Firestore:", e); }

  window.dispatchEvent(new StorageEvent('storage', { key: 'goal', newValue: selectedGoal }));

  const msgBox = document.getElementById("msg");
  msgBox.innerHTML = '<i class="fa-solid fa-circle-check"></i> Saved!';
  msgBox.style.display = "block";
  setTimeout(() => { msgBox.style.display = "none"; }, 2500);
}

// ===== LOGOUT =====
function logout() {
  document.body.style.opacity = "0";
  document.body.style.transition = "opacity 0.2s ease";
  setTimeout(() => {
    ["userName","customUserName","userEmail","goal","examDate","seenWelcome","examNotifEnabled"]
      .forEach(k => localStorage.removeItem(k));
    window.location.href = "login.html";
  }, 200);
}

window.saveProfile  = saveProfile;
window.logout       = logout;
window.onGoalChange = onGoalChange;
window.toggleNotif  = toggleNotif;
</script>
