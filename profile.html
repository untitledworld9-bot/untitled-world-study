<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Profile - Study Grid Prep</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="/icon-192.png">
<meta name="theme-color" content="#0f2027">

<!-- ✅ AUTH GUARD -->
<script>
(function(){
  if(!localStorage.getItem("userName")){
    document.documentElement.style.display='none';
    window.location.replace("login.html");
  }
})();
</script>

<!-- ✅ THEME: Apply instantly before paint -->
<script>
(function(){
  var saved = localStorage.getItem("theme");
  var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var theme = saved ? saved : (systemDark ? "dark" : "light");
  document.documentElement.setAttribute("data-theme", theme);
})();
</script>

<style>html{visibility:hidden;}html[data-theme]{visibility:visible;}</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ─── VIEW TRANSITION (SPA-like smooth nav) ─── */
@view-transition { navigation: auto; }
.pwa-bottom-nav{ view-transition-name: bottom-nav; }
::view-transition-old(bottom-nav),
::view-transition-new(bottom-nav){ animation: none; }
::view-transition-old(root){
  animation: vtOut 0.22s cubic-bezier(0.4,0,1,1) forwards;
}
::view-transition-new(root){
  animation: vtIn 0.28s cubic-bezier(0,0,0.2,1) forwards;
}
@keyframes vtOut{
  from{ opacity:1; transform:translateY(0); }
  to{   opacity:0; transform:translateY(8px); }
}
@keyframes vtIn{
  from{ opacity:0; transform:translateY(8px); }
  to{   opacity:1; transform:translateY(0); }
}

/* ─── DESIGN TOKENS (same as dashboard-home) ─── */
:root{
  --bg:#F5F7FA;
  --surface:#FFFFFF;
  --surface2:#F0F3F8;
  --border:#E5E9F0;
  --text:#0F172A;
  --text2:#64748B;
  --text3:#94A3B8;
  --accent:#2563EB;
  --accent2:#0EA5E9;
  --green:#10B981;
  --orange:#F97316;
  --purple:#7C3AED;
  --red:#EF4444;
  --header-bg:rgba(255,255,255,0.97);
  --nav-bg:rgba(255,255,255,0.97);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.06);
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-md:0 4px 20px rgba(0,0,0,0.1);
  --r:14px;
  --t:0.2s ease;
}
[data-theme="dark"]{
  --bg:#0B1220;
  --surface:#0F1A2E;
  --surface2:#111D33;
  --border:rgba(255,255,255,0.08);
  --text:#E8F0FE;
  --text2:#94A3B8;
  --text3:#475569;
  --header-bg:rgba(11,18,32,0.97);
  --nav-bg:rgba(11,18,32,0.97);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.3);
  --shadow:0 2px 12px rgba(0,0,0,0.35);
  --shadow-md:0 6px 24px rgba(0,0,0,0.5);
}

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
html{ background:var(--bg); }
body{
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:80px;
  animation:pageIn 0.25s ease;
  user-select:none; -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:none;
}
@keyframes pageIn{ from{ opacity:0; } to{ opacity:1; } }

/* ─── HEADER ─── */
header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:13px 16px;
  background:var(--header-bg);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:9999;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  box-shadow:var(--shadow-sm);
}
.hd-avatar{
  width:40px; height:40px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,#2563EB,#0EA5E9);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:17px; color:#fff;
  box-shadow:0 3px 10px rgba(37,99,235,0.3);
}
.hd-info{ flex:1; min-width:0; }
.hd-name{
  font-size:15px; font-weight:700; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.hd-email{
  font-size:11px; color:var(--text2);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.hd-badge{
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text2); padding:5px 12px; border-radius:50px;
  font-size:12px; font-weight:600; flex-shrink:0;
}

/* ─── MAIN WRAP ─── */
.wrap{ max-width:480px; margin:0 auto; padding:14px 14px 10px 14px; }

/* ─── CARD ─── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:16px;
  box-shadow:var(--shadow-sm);
  margin-bottom:10px;
}

/* ─── SECTION TITLE ─── */
.sec-title{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px;
}
.sec-title-left{
  display:flex; align-items:center; gap:8px;
  font-size:13px; font-weight:700; color:var(--text);
}
.sec-title-left i{ color:var(--accent); font-size:14px; }
.edit-btn{
  display:flex; align-items:center; gap:6px;
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text2); font-size:12px; font-weight:600;
  padding:5px 12px; border-radius:50px;
  cursor:pointer; transition:var(--t);
}
.edit-btn:active{ transform:scale(0.97); }

/* ─── VIEW MODE ─── */
#viewMode{ display:block; }

.vm-name-row{
  display:flex; align-items:center; gap:12px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px; margin-bottom:12px;
}
.vm-avatar{
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,#2563EB,#0EA5E9);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:16px; color:#fff;
}
.vm-name-info{ flex:1; min-width:0; }
.vm-name-label{ font-size:11px; color:var(--text2); }
.vm-name-val{ font-size:15px; font-weight:600; color:var(--text); }

/* ─── EXAM LOGO CARD ─── */
.nta-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:13px 14px;
  margin-bottom:12px;
  display:flex; align-items:center; gap:12px;
}
.nta-logo{
  width:44px; height:44px; flex-shrink:0;
  object-fit:contain; border-radius:10px;
  background:white; padding:4px;
  box-shadow:var(--shadow-sm);
}
.nta-fallback{
  width:44px; height:44px; flex-shrink:0; border-radius:10px;
  background:linear-gradient(135deg,#2563EB,#0EA5E9);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:800; color:white; letter-spacing:0.5px;
}
.nta-info{ flex:1; }
.nta-exam-name{ font-size:14px; font-weight:700; color:var(--text); }
.nta-badges{ display:flex; gap:6px; margin-top:4px; }
.badge-nta{
  font-size:10px; font-weight:600;
  background:rgba(37,99,235,0.1); border:1px solid rgba(37,99,235,0.2);
  color:var(--accent); padding:2px 8px; border-radius:50px;
}
.badge-year{
  font-size:10px; font-weight:600;
  background:rgba(249,115,22,0.1); border:1px solid rgba(249,115,22,0.2);
  color:var(--orange); padding:2px 8px; border-radius:50px;
}

/* ─── DAYS CHIP ─── */
.days-chip{
  display:flex; align-items:center; gap:14px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:12px; padding:14px 16px; margin-bottom:12px;
}
.days-big{
  font-size:38px; font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; line-height:1;
}
.days-right{ display:flex; flex-direction:column; gap:2px; }
.days-label{ font-size:11px; color:var(--text2); font-weight:500; }
.days-exam{ font-size:13px; font-weight:600; color:var(--text); }
.days-date{ font-size:11px; color:var(--text2); }

/* ─── NOTIF ROW ─── */
.notif-allow-row{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:12px; padding:11px 14px; margin-bottom:4px;
}
.notif-row-text{
  display:flex; align-items:center; gap:8px;
  font-size:13px; color:var(--text2); font-weight:500;
}
.notif-toggle-btn{
  background:var(--accent); color:#fff; border:none;
  border-radius:50px; padding:6px 16px;
  font-size:12px; font-weight:600; cursor:pointer;
  white-space:nowrap; transition:var(--t);
}
.notif-toggle-btn:active{ transform:scale(0.97); opacity:0.9; }

/* ─── EDIT MODE ─── */
#editMode{ display:none; }

.input-label{
  display:block; font-size:12px; color:var(--text2);
  font-weight:500; margin-bottom:6px; letter-spacing:0.3px;
}
.edtech-input,.edtech-select{
  width:100%; padding:12px 16px; border-radius:12px;
  border:1px solid var(--border);
  background:var(--surface2); color:var(--text);
  font-size:14px; outline:none; margin-bottom:14px;
  font-family:'Poppins',sans-serif; box-sizing:border-box;
  transition:var(--t); -webkit-appearance:none; appearance:none;
}
.edtech-input:focus,.edtech-select:focus{
  border-color:rgba(37,99,235,0.4);
  box-shadow:0 0 0 3px rgba(37,99,235,0.08);
}
.edtech-input::placeholder{ color:var(--text3); }
.edtech-select option{ background:var(--surface); color:var(--text); }

.fixed-date-chip{
  width:100%; padding:12px 16px; border-radius:12px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text2); font-size:14px; font-weight:500;
  margin-bottom:14px; display:flex; align-items:center; gap:8px;
}

.save-btn{
  width:100%; padding:14px; border:none; border-radius:50px;
  background:var(--accent);
  color:#fff; font-weight:700; font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 4px 16px rgba(37,99,235,0.25); transition:var(--t);
  margin-top:4px;
}
.save-btn:active{ transform:scale(0.97); opacity:0.92; }

/* ─── SUCCESS TOAST ─── */
.toast{
  display:none;
  margin-top:12px; padding:10px 16px;
  background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.25);
  border-radius:10px; color:var(--green);
  font-size:13px; font-weight:600; text-align:center;
}

/* ─── ACTION CARDS ─── */
/* Subscription — subtle */
.sub-card{
  display:flex; align-items:center; justify-content:center; gap:10px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:14px 20px;
  color:var(--text) !important; text-decoration:none;
  font-weight:600; font-size:14px; transition:var(--t);
  margin-bottom:10px; box-shadow:var(--shadow-sm);
  cursor:pointer;
}
.sub-card i{ color:var(--orange); }
.sub-card:active{ transform:scale(0.975); background:var(--surface2); }

/* Logout */
.logout-btn{
  background:var(--surface); border:1px solid var(--border);
  color:var(--red); width:100%; padding:14px; border-radius:var(--r);
  font-weight:600; font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:10px;
  transition:var(--t); margin-bottom:10px; box-shadow:var(--shadow-sm);
}
.logout-btn:active{ transform:scale(0.975); background:var(--surface2); }

/* ─── FOLLOW SECTION ─── */
.follow-section{
  margin:10px auto 0 auto;
  display:flex; flex-direction:column; align-items:center; gap:0;
}
.follow-label{
  font-size:13px; font-weight:600; color:var(--text);
  margin-bottom:14px; letter-spacing:0.1px;
}
.social-icons-row{
  display:flex; align-items:center; justify-content:center; gap:14px;
}
.social-icon-btn{
  width:56px; height:56px; border-radius:16px;
  background:var(--surface2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  text-decoration:none; font-size:22px;
  transition:all 0.2s ease; cursor:pointer;
  box-shadow:var(--shadow-sm);
  -webkit-tap-highlight-color:transparent;
}
.social-icon-btn:active{ transform:scale(0.88); }
.contact-icon-btn{
  width:56px; height:56px; border-radius:16px;
  background:var(--surface2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  text-decoration:none; font-size:20px;
  transition:all 0.2s ease;
  box-shadow:var(--shadow-sm);
}
.contact-icon-btn:active{ transform:scale(0.88); }

.made-line{
  margin:10px auto 4px auto;
  font-family:'Playfair Display',serif;
  font-size:12.5px; font-style:italic; font-weight:500;
  text-align:center; color:var(--text3);
}

/* ─── LOADING STATE ─── */
#loadingState{
  text-align:center; padding:40px 20px; color:var(--text2); font-size:14px;
}
.spinner{
  width:32px; height:32px; border-radius:50%;
  border:3px solid rgba(37,99,235,0.15);
  border-top-color:var(--accent);
  animation:spin 0.7s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ─── BOTTOM NAV ─── */
.pwa-bottom-nav{
  position:fixed; bottom:0; left:0; width:100%; height:60px;
  background:var(--nav-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  display:flex; justify-content:space-around; align-items:center;
  z-index:10000; border-top:1px solid var(--border);
}
[data-theme="light"] .pwa-bottom-nav{ background:rgba(255,255,255,0.98) !important; box-shadow:0 -1px 0 rgba(0,0,0,0.06); }
[data-theme="dark"] .pwa-bottom-nav{ background:rgba(11,18,32,0.98) !important; }

.nav-tab{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-decoration:none; color:var(--text3); font-size:10px; font-weight:500;
  gap:3px; padding:5px 8px; border-radius:12px;
  transition:color 0.15s ease, transform 0.12s ease; min-width:52px; flex:1;
  cursor:pointer; border:none; background:none;
  -webkit-tap-highlight-color:transparent;
}
.nav-tab i{ font-size:18px; transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1), color 0.15s ease; }
.nav-tab span{ font-size:10px; }
.nav-tab:hover,.nav-tab.active{ color:var(--accent) !important; }
.nav-tab.active i{ color:var(--accent); transform:scale(1.18); }
.nav-tab:active{ transform:scale(0.88); }
.nav-tab:active i{ transform:scale(0.88); }

/* Light mode extras */
[data-theme="light"] header{ box-shadow:0 2px 12px rgba(0,0,0,0.08); }
[data-theme="light"] .card{ box-shadow:0 2px 12px rgba(0,0,0,0.06); }
</style>
</head>
<body>

<!-- FIXED TOP HEADER -->
<header>
  <div class="hd-avatar" id="hdAvatar">A</div>
  <div class="hd-info">
    <div class="hd-name" id="hdName">Loading...</div>
    <div class="hd-email" id="hdEmail"></div>
  </div>
  <div class="hd-badge" id="hdBadge">--</div>
</header>

<!-- MAIN WRAP -->
<div class="wrap">

  <!-- Loading spinner -->
  <div id="loadingState">
    <div class="spinner"></div>
    Loading your profile...
  </div>

  <!-- PROFILE CARD (hidden until loaded) -->
  <div class="card" id="profileCard" style="display:none;">

    <!-- Card header with Edit button -->
    <div class="sec-title">
      <div class="sec-title-left">
        <i class="fa-solid fa-sliders"></i> My Profile
      </div>
      <button class="edit-btn" id="editBtn" onclick="openEdit()">
        <i class="fa-solid fa-pen"></i> Edit
      </button>
    </div>

    <!-- ══ VIEW MODE ══ -->
    <div id="viewMode">

      <!-- Name row -->
      <div class="vm-name-row">
        <div class="vm-avatar" id="vmAvatar">A</div>
        <div class="vm-name-info">
          <div class="vm-name-label">Signed in as</div>
          <div class="vm-name-val" id="vmName">User</div>
        </div>
        <i class="fa-brands fa-google" style="color:#4285F4;font-size:17px;flex-shrink:0;"></i>
      </div>

      <!-- Exam logo card -->
      <div class="nta-card" id="vmNtaCard">
        <img class="nta-logo" id="ntaLogoImg" src="" alt="Exam Logo"
          onerror="this.style.display='none';document.getElementById('ntaFb').style.display='flex';">
        <div class="nta-fallback" id="ntaFb" style="display:none;">NTA</div>
        <div class="nta-info">
          <div class="nta-exam-name" id="vmExamName">JEE Main 2026</div>
          <div class="nta-badges">
            <span class="badge-nta">NTA Exam</span>
            <span class="badge-year">2026</span>
          </div>
        </div>
      </div>

      <!-- Days left chip -->
      <div class="days-chip" id="vmDaysChip" style="display:none;">
        <div class="days-big" id="vmDaysBig">--</div>
        <div class="days-right">
          <div class="days-label">Days Left</div>
          <div class="days-exam" id="vmDaysExam">JEE Main 2026</div>
          <div class="days-date" id="vmDaysDate"></div>
        </div>
      </div>

      <!-- Notification allow row — hidden if already granted -->
      <div class="notif-allow-row" id="notifAllowRow">
        <div class="notif-row-text">
          <i class="fa-solid fa-bell" style="color:var(--orange);"></i>
          <span>Daily exam reminder</span>
        </div>
        <button class="notif-toggle-btn" onclick="enableNotif()">Enable</button>
      </div>

    </div><!-- /viewMode -->

    <!-- ══ EDIT MODE ══ -->
    <div id="editMode">

      <label class="input-label">Your Name</label>
      <input type="text" id="editName" class="edtech-input" placeholder="Enter your name">

      <label class="input-label">🎯 Select Goal</label>
      <select id="editGoal" class="edtech-select" onchange="onGoalChange()">
        <option value="JEE">JEE Main 2026</option>
        <option value="NEET">NEET 2026</option>
        <option value="CUET">CUET 2026</option>
        <option value="Boards">Boards</option>
      </select>

      <label class="input-label" id="editDateLabel" style="display:none;">📅 Exam Date</label>
      <input type="date" id="jeePicker" class="edtech-input"
        min="2026-04-02" max="2026-04-20" style="display:none;">
      <input type="date" id="boardsPicker" class="edtech-input"
        min="2026-01-01" max="2027-12-31" style="display:none;">
      <div class="fixed-date-chip" id="fixedDateChip" style="display:none;"></div>

      <button class="save-btn" onclick="saveProfile()">
        <i class="fa-solid fa-floppy-disk"></i> Save Changes
      </button>
      <div class="toast" id="toast"></div>

    </div><!-- /editMode -->

  </div><!-- /profileCard -->

  <!-- Subscription -->
  <a class="sub-card" onclick="window.location.href='subscription.html';">
    <i class="fa-solid fa-crown"></i> My Subscription
  </a>

  <!-- Logout -->
  <button class="logout-btn" onclick="doLogout()">
    <i class="fa-solid fa-right-from-bracket"></i> Logout
  </button>

  <!-- Follow -->
  <div class="follow-section">
    <div class="follow-label">Follow Us On</div>
    <div class="social-icons-row">
      <a href="https://www.youtube.com/@studygridprep" target="_blank" class="social-icon-btn" title="YouTube">
        <i class="fa-brands fa-youtube" style="color:#EF4444;"></i>
      </a>
      <a href="contact.html" class="contact-icon-btn" title="Contact Us">
        <i class="fa-solid fa-headset" style="color:var(--accent);"></i>
      </a>
    </div>
  </div>

  <p class="made-line">Crafted with ❤️ for Focused Learners</p>

</div><!-- /wrap -->

<!-- Bottom Nav — Home | Playlist | Leaderboard | Profile -->
<div id="pwaBottomNav" class="pwa-bottom-nav">
  <button class="nav-tab" id="nav-home" onclick="smoothNav('dashboard-home.html','nav-home')">
    <i class="fa-solid fa-house"></i><span>Home</span>
  </button>
  <button class="nav-tab" id="nav-playlist" onclick="smoothNav('playlist.html','nav-playlist')">
    <i class="fa-brands fa-youtube"></i><span>Playlist</span>
  </button>
  <button class="nav-tab" id="nav-lb" onclick="smoothNav('mainleaderboard.html','nav-lb')">
    <i class="fa-solid fa-trophy"></i><span>Leaderboard</span>
  </button>
  <button class="nav-tab active" id="nav-profile" onclick="smoothNav('profile.html','nav-profile')">
    <i class="fa-regular fa-circle-user"></i><span>Profile</span>
  </button>
</div>

<!-- ── FIREBASE + PROFILE LOGIC ── -->
<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyB_13GJOiLQwxsirfJ7T_4WinaxVmSp7fs",
  authDomain:"untitled-world-2e645.firebaseapp.com",
  projectId:"untitled-world-2e645",
  storageBucket:"untitled-world-2e645.firebasestorage.app",
  messagingSenderId:"990115586087",
  appId:"1:990115586087:web:963f68bd59dec5ef0c6e02"
};
const app  = initializeApp(cfg);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── EXAM CONFIG ──
const EXAMS = {
  JEE:    { date:"2026-04-02", label:"2 Apr 2026",  name:"JEE Main 2026",  nta:true  },
  NEET:   { date:"2026-05-03", label:"3 May 2026",  name:"NEET UG 2026",   nta:true  },
  CUET:   { date:"2026-05-11", label:"11 May 2026", name:"CUET UG 2026",   nta:true  },
  Boards: { date:"2026-02-15", label:"15 Feb 2026", name:"Board Exams",    nta:false }
};

// ── Logo map per exam ──
const LOGO_MAP = {
  JEE:  "https://untitledworld.us.cc/assets/jee.png",
  NEET: "https://untitledworld.us.cc/assets/jee.png",
  CUET: "https://untitledworld.us.cc/assets/cuet.png"
};

let currentUser = null;
let profileData = {};

// ── WAIT FOR AUTH → THEN LOAD FROM FIRESTORE ──
onAuthStateChanged(auth, async (user) => {
  if(!user){
    window.location.replace("login.html");
    return;
  }
  currentUser = user;

  // Try loading from Firestore first (survives reinstall)
  try {
    const snap = await getDoc(doc(db, "users", user.uid));
    if(snap.exists()){
      profileData = snap.data();
    }
  } catch(e){ console.log("Firestore load:", e); }

  // Fallback to displayName from Google if no stored name
  const name     = profileData.displayName || user.displayName || "User";
  const email    = profileData.email       || user.email       || "";
  const goal     = profileData.goal        || localStorage.getItem("goal") || "JEE";
  const examDate = profileData.examDate    || localStorage.getItem("examDate") || (EXAMS[goal]?.date || "");

  // Cache locally for speed
  localStorage.setItem("userName",  name);
  localStorage.setItem("userEmail", email);
  localStorage.setItem("goal",      goal);
  if(examDate) localStorage.setItem("examDate", examDate);

  profileData = { ...profileData, displayName:name, email, goal, examDate };

  renderProfile(name, email, goal, examDate);
});

// ── RENDER PROFILE (VIEW MODE) ──
function renderProfile(name, email, goal, examDate){
  // Header
  document.getElementById("hdAvatar").innerText = name.charAt(0).toUpperCase();
  document.getElementById("hdName").innerText   = name;
  document.getElementById("hdEmail").innerText  = email;
  document.getElementById("hdBadge").innerText  = goal;

  // View mode fields
  document.getElementById("vmAvatar").innerText = name.charAt(0).toUpperCase();
  document.getElementById("vmName").innerText   = name;

  // Exam logo card
  const info   = EXAMS[goal];
  const ntaCard = document.getElementById("vmNtaCard");
  if(info.nta){
    ntaCard.style.display = "flex";
    document.getElementById("vmExamName").innerText = info.name;
    // Set correct logo
    const logoImg = document.getElementById("ntaLogoImg");
    const logoFb  = document.getElementById("ntaFb");
    if(LOGO_MAP[goal]){
      logoImg.src = LOGO_MAP[goal];
      logoImg.style.display = "";
      logoFb.style.display  = "none";
    } else {
      logoImg.style.display = "none";
      logoFb.style.display  = "flex";
    }
  } else {
    ntaCard.style.display = "none";
  }

  // Days chip
  renderDaysChip(goal, examDate);

  // Notification row — hide if already granted
  checkNotifRow();

  // Show card, hide loader
  document.getElementById("loadingState").style.display = "none";
  document.getElementById("profileCard").style.display  = "block";
}

function renderDaysChip(goal, examDate){
  const chip = document.getElementById("vmDaysChip");
  const date = examDate || EXAMS[goal]?.date;
  if(!date){ chip.style.display="none"; return; }

  const examTs  = new Date(date); examTs.setHours(0,0,0,0);
  const todayTs = new Date();     todayTs.setHours(0,0,0,0);
  const diff    = Math.ceil((examTs - todayTs) / 86400000);

  if(diff <= 0){ chip.style.display="none"; return; }

  chip.style.display = "flex";
  document.getElementById("vmDaysBig").innerText   = diff;
  document.getElementById("vmDaysExam").innerText  = EXAMS[goal]?.name || goal;
  document.getElementById("vmDaysDate").innerText  = EXAMS[goal]?.label || date;
}

function checkNotifRow(){
  const row = document.getElementById("notifAllowRow");
  const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(!isPWA || Notification.permission === "granted"){
    row.style.display = "none";
  } else {
    row.style.display = "flex";
  }
}

// ── OPEN EDIT MODE ──
window.openEdit = function(){
  const name  = profileData.displayName || "";
  const goal  = profileData.goal        || "JEE";
  const eDate = profileData.examDate    || "";

  document.getElementById("editName").value  = name;
  document.getElementById("editGoal").value  = goal;

  document.getElementById("viewMode").style.display = "none";
  document.getElementById("editMode").style.display = "block";
  document.getElementById("editBtn").innerHTML      = '<i class="fa-solid fa-xmark"></i> Cancel';
  document.getElementById("editBtn").onclick        = cancelEdit;

  onGoalChange(eDate);
};

window.cancelEdit = function(){
  document.getElementById("editMode").style.display = "none";
  document.getElementById("viewMode").style.display = "block";
  document.getElementById("editBtn").innerHTML      = '<i class="fa-solid fa-pen"></i> Edit';
  document.getElementById("editBtn").onclick        = openEdit;
};

// ── GOAL CHANGE IN EDIT MODE ──
window.onGoalChange = function(prefillDate){
  const goal       = document.getElementById("editGoal").value;
  const jeePicker  = document.getElementById("jeePicker");
  const brdPicker  = document.getElementById("boardsPicker");
  const fixedChip  = document.getElementById("fixedDateChip");
  const dateLabel  = document.getElementById("editDateLabel");

  jeePicker.style.display = "none";
  brdPicker.style.display = "none";
  fixedChip.style.display = "none";
  dateLabel.style.display = "none";

  const saved = prefillDate || profileData.examDate || "";

  if(goal === "JEE"){
    dateLabel.style.display = "block";
    jeePicker.style.display = "block";
    jeePicker.min = "2026-01-21";
    jeePicker.max = "2026-04-20";
    jeePicker.value = (saved && saved >= "2026-01-01") ? saved : "2026-04-02";
  } else if(goal === "Boards"){
    dateLabel.style.display = "block";
    brdPicker.style.display = "block";
    brdPicker.value = saved || "2026-02-15";
  } else {
    const info = EXAMS[goal];
    if(info.label){
      dateLabel.style.display = "block";
      fixedChip.style.display = "flex";
      fixedChip.innerHTML = `<i class="fa-solid fa-calendar-check"></i> ${info.label}`;
    }
  }
};

// ── SAVE ──
window.saveProfile = async function(){
  const newName = document.getElementById("editName").value.trim();
  const goal    = document.getElementById("editGoal").value;
  if(!newName) {
    document.getElementById("editName").style.borderColor = "rgba(244,63,94,.6)";
    setTimeout(()=>{ document.getElementById("editName").style.borderColor = ""; }, 1500);
    return;
  }

  let examDate = "";
  if(goal === "JEE")       examDate = document.getElementById("jeePicker").value  || EXAMS.JEE.date;
  else if(goal==="Boards") examDate = document.getElementById("boardsPicker").value || EXAMS.Boards.date;
  else                     examDate = EXAMS[goal]?.date || "";

  // Update local state
  profileData.displayName = newName;
  profileData.goal        = goal;
  profileData.examDate    = examDate;

  // localStorage cache
  localStorage.setItem("userName",  newName);
  localStorage.setItem("goal",      goal);
  if(examDate) localStorage.setItem("examDate", examDate);

  // ── SAVE TO FIRESTORE ──
  try {
    await setDoc(doc(db, "users", currentUser.uid), {
      displayName: newName,
      email:       currentUser.email,
      goal:        goal,
      examDate:    examDate,
    }, { merge: true });
  } catch(e){ console.log("Firestore save:", e); }

  // Show success toast
  const toast = document.getElementById("toast");
  toast.innerHTML = '<i class="fa-solid fa-circle-check"></i> Saved successfully!';
  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display = "none";
    cancelEdit();
    renderProfile(newName, currentUser.email, goal, examDate);
    window.dispatchEvent(new StorageEvent('storage', { key:'goal', newValue:goal }));
  }, 1500);
};

// ── NOTIFICATION ──
window.enableNotif = async function(){
  try {
    const perm = await Notification.requestPermission();
    if(perm === "granted"){
      localStorage.setItem("examNotifEnabled", "true");
      document.getElementById("notifAllowRow").style.display = "none";
      const goal  = profileData.goal || "JEE";
      const date  = profileData.examDate || EXAMS[goal]?.date;
      const diff  = date ? Math.ceil((new Date(date) - new Date()) / 86400000) : 0;
      new Notification("📚 Untitled World", {
        body: `${EXAMS[goal]?.name || goal} — ${diff > 0 ? diff+" days left! Study hard 🔥" : "Exam time!"}`,
        icon: "/icon-192.png",
        badge:"/icon-192.png"
      });
    }
  } catch(e){ console.log(e); }
};

// ── LOGOUT ──
window.doLogout = function(){
  document.body.style.opacity = "0";
  document.body.style.transition = "opacity .2s ease";
  setTimeout(()=>{
    ["userName","customUserName","userEmail","goal","examDate","seenWelcome","examNotifEnabled"]
      .forEach(k => localStorage.removeItem(k));
    window.location.href = "login.html";
  }, 200);
};
</script>

<!-- ── SMOOTH BOTTOM NAV ── -->
<script>
window.smoothNav = function(url, tabId){
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const tapped = document.getElementById(tabId);
  if(tapped) tapped.classList.add('active');

  if(window.location.pathname.endsWith(url) || window.location.href.includes(url)){
    return;
  }

  if(document.startViewTransition){
    document.startViewTransition(() => {
      window.location.href = url;
    });
  } else {
    document.body.style.transition = 'opacity 0.18s ease';
    document.body.style.opacity = '0';
    setTimeout(() => { window.location.href = url; }, 160);
  }
};
</script>

<script src="theme.js"></script>
</body>
</html>
