<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Untitled World</title>
<link rel="icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg-start:#0B1220; --bg-end:#0F172A;
  --primary:#22D3EE; --primary-dark:#06B6D4;
  --secondary:#34D399; --accent:#F43F5E;
  --text-primary:#E2E8F0; --text-secondary:#94A3B8;
  --card-bg:rgba(255,255,255,0.03); --card-border:rgba(255,255,255,0.08);
  --radius:16px; --shadow:0 4px 20px rgba(0,0,0,0.3); --transition:0.25s ease;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
html{background:var(--bg-start);}
body{
  background:linear-gradient(160deg,var(--bg-start) 0%,var(--bg-end) 100%);
  min-height:100vh; color:var(--text-primary);
  padding-bottom:90px;
  animation:pageIn 0.3s ease forwards;
}
@keyframes pageIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.top-bar{
  display:flex;align-items:center;gap:12px;
  padding:20px 20px 12px 20px;
  max-width:440px;margin:auto;
}
.avatar{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:20px;color:#0B1220;
  box-shadow:0 0 0 3px rgba(34,211,238,0.2),var(--shadow);flex-shrink:0;
}
.user-info{display:flex;flex-direction:column;flex:1;}
#userName{font-weight:600;font-size:16px;color:var(--text-primary);line-height:1.3;}
.user-email{font-size:12px;color:var(--text-secondary);margin-top:2px;}
.goal-badge{
  background:rgba(34,211,238,0.1);color:var(--primary);
  border:1px solid rgba(34,211,238,0.25);
  padding:5px 12px;border-radius:50px;font-size:12px;font-weight:600;flex-shrink:0;
}

.profile-container{
  max-width:440px;margin:auto;
  padding:8px 20px 24px;
  display:flex;flex-direction:column;gap:16px;
}
.profile-card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);
  transition:var(--transition);
}
.profile-card:hover{border-color:rgba(34,211,238,0.2);}
.section-title{
  font-size:14px;font-weight:600;color:var(--primary);
  display:flex;align-items:center;gap:8px;margin-bottom:16px;
  text-transform:uppercase;letter-spacing:0.5px;
}
.input-label{
  display:block;font-size:12px;color:var(--text-secondary);
  font-weight:500;margin-bottom:6px;letter-spacing:0.3px;
}
.edtech-input,.edtech-select{
  width:100%;padding:12px 16px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.25);color:var(--text-primary);
  font-size:14px;outline:none;margin-bottom:16px;
  font-family:'Poppins',sans-serif;box-sizing:border-box;
  transition:var(--transition);-webkit-appearance:none;appearance:none;
}
.edtech-input:focus,.edtech-select:focus{
  border-color:rgba(34,211,238,0.5);
  box-shadow:0 0 0 3px rgba(34,211,238,0.08);
}
.edtech-input::placeholder{color:var(--text-secondary);}
.edtech-select option{background:#162030;color:var(--text-primary);}

.save-btn{
  width:100%;padding:14px;border:none;border-radius:50px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#0B1220;font-weight:700;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(34,211,238,0.25);transition:var(--transition);
}
.save-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(34,211,238,0.35);}
.save-btn:active{transform:scale(0.97);}

#msg{
  display:none;margin-top:12px;padding:10px 16px;
  background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);
  border-radius:10px;color:var(--secondary);font-size:13px;
  font-weight:600;text-align:center;
}

.sub-promo-card{
  background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.25);
  color:#FBBF24 !important;padding:14px 20px;border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;gap:10px;
  text-decoration:none;font-weight:600;font-size:14px;transition:var(--transition);cursor:pointer;
}
.sub-promo-card:hover{background:rgba(251,191,36,0.1);}
.sub-promo-card:active{transform:scale(0.97);}

.logout-btn{
  background:rgba(244,63,94,0.06);border:1px solid rgba(244,63,94,0.25);
  color:#F87171;width:100%;padding:14px;border-radius:var(--radius);
  font-weight:600;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;transition:var(--transition);
}
.logout-btn:hover{background:rgba(244,63,94,0.1);}
.logout-btn:active{transform:scale(0.97);}

.follow-section{text-align:center;padding:4px 0;}
.follow-section p{
  margin-bottom:12px;font-size:13px;font-weight:600;
  color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;
}
.social-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}

.yt-promo-card{
  background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.3);
  border-radius:50px;padding:9px 18px;display:inline-flex;align-items:center;
  justify-content:center;gap:8px;color:#ff4757 !important;text-decoration:none;
  font-weight:600;font-size:13px;transition:var(--transition);
}
.yt-promo-card:hover{background:rgba(255,71,87,0.14);}
.yt-promo-card:active{transform:scale(0.97);}

.contact-promo-card{
  background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.3);
  border-radius:50px;padding:9px 18px;display:inline-flex;align-items:center;
  justify-content:center;gap:8px;color:var(--primary) !important;text-decoration:none;
  font-weight:600;font-size:13px;transition:var(--transition);
}
.contact-promo-card:hover{background:rgba(34,211,238,0.14);}
.contact-promo-card:active{transform:scale(0.97);}

.made-line{
  font-family:'Playfair Display',serif;font-size:14px;
  font-style:italic;text-align:center;color:var(--text-secondary);padding:8px 0;
}

/* ===== BOTTOM NAV ===== */
.pwa-bottom-nav{
  position:fixed;bottom:0;left:0;width:100%;height:64px;
  background:rgba(11,18,32,0.95);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  display:flex;justify-content:space-around;align-items:center;
  z-index:2000;border-top:1px solid var(--card-border);
}
.pwa-bottom-nav a{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-decoration:none;color:var(--text-secondary);font-size:11px;
  gap:4px;padding:8px 12px;border-radius:12px;transition:var(--transition);min-width:52px;
}
.pwa-bottom-nav a i{font-size:18px;}
.pwa-bottom-nav a.active{color:var(--primary);}
.pwa-bottom-nav a:not(.active):hover{color:var(--text-primary);}
.pwa-bottom-nav a .fa-youtube{color:#ff4757 !important;}
</style>
</head>
<body>

<div class="top-bar">
  <div class="avatar" id="avatar">A</div>
  <div class="user-info">
    <div id="userName">User</div>
    <div class="user-email" id="userEmail">user@gmail.com</div>
  </div>
  <div id="goalBadge" class="goal-badge">JEE</div>
</div>

<div class="profile-container">

  <div class="profile-card">
    <h3 class="section-title"><i class="fa-solid fa-user-pen"></i> Edit Profile</h3>
    <label class="input-label">Your Name</label>
    <input type="text" id="nameInput" class="edtech-input" placeholder="Enter your name">
    <label class="input-label">Select Goal</label>
    <select id="goalSelect" class="edtech-select">
      <option value="JEE">JEE</option>
      <option value="NEET">NEET</option>
      <option value="CUET">CUET</option>
      <option value="Boards">Boards</option>
    </select>
    <button class="save-btn" onclick="saveProfile()">
      <i class="fa-solid fa-floppy-disk"></i> Save Changes
    </button>
    <div id="msg"></div>
  </div>

  <a href="#" class="sub-promo-card">
    <i class="fa-solid fa-crown"></i> My Subscription
  </a>

  <button class="logout-btn" onclick="logout()">
    <i class="fa-solid fa-right-from-bracket"></i> Logout
  </button>

  <div class="follow-section">
    <p>Follow us on</p>
    <div class="social-row">
      <a href="https://www.youtube.com/@untitledworld01" target="_blank" class="yt-promo-card">
        <i class="fa-brands fa-youtube"></i> YouTube
      </a>
      <a href="contact.html" class="contact-promo-card">
        <i class="fa-solid fa-headset"></i> Contact Us
      </a>
    </div>
  </div>

  <p class="made-line">Crafted with ❤️ for Focused Learners</p>

</div>

<div id="pwaBottomNav" class="pwa-bottom-nav">
  <a href="index.html">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>
  <a href="mocktest.html">
    <i class="fa-solid fa-file-pen"></i>
    <span>Mock Test</span>
  </a>
  <a href="timer.html">
    <i class="fa-solid fa-stopwatch"></i>
    <span>Focus</span>
  </a>
  <a href="playlist.html">
    <i class="fa-brands fa-youtube"></i>
    <span>Playlist</span>
  </a>
  <a href="profile.html" class="active">
    <i class="fa-solid fa-user"></i>
    <span>Profile</span>
  </a>
</div>

<script>
let name = localStorage.getItem("userName") || "User";
let email = localStorage.getItem("userEmail") || "user@gmail.com";
let savedGoal = localStorage.getItem("goal") || "JEE";

document.getElementById("userName").innerText = name;
document.getElementById("userEmail").innerText = email;
document.getElementById("avatar").innerText = name.charAt(0).toUpperCase();
document.getElementById("goalBadge").innerText = savedGoal;
document.getElementById("nameInput").value = name;
document.getElementById("goalSelect").value = savedGoal;

function saveProfile(){
  let newName = document.getElementById("nameInput").value.trim();
  let selectedGoal = document.getElementById("goalSelect").value;

  if(!newName){
    const inp = document.getElementById("nameInput");
    inp.style.borderColor = "rgba(244,63,94,0.6)";
    setTimeout(() => { inp.style.borderColor = ""; }, 1500);
    return;
  }

  localStorage.setItem("userName", newName);
  localStorage.setItem("goal", selectedGoal);

  document.getElementById("userName").innerText = newName;
  document.getElementById("avatar").innerText = newName.charAt(0).toUpperCase();
  document.getElementById("goalBadge").innerText = selectedGoal;

  const msgBox = document.getElementById("msg");
  msgBox.innerHTML = '<i class="fa-solid fa-circle-check"></i> Profile saved successfully!';
  msgBox.style.display = "block";
  setTimeout(() => { msgBox.style.display = "none"; }, 2500);
}

function logout(){
  document.body.style.opacity = "0";
  document.body.style.transition = "opacity 0.2s ease";
  setTimeout(() => {
    localStorage.removeItem("userName");
    localStorage.removeItem("userEmail");
    localStorage.removeItem("goal");
    localStorage.removeItem("seenWelcome");
    window.location.href = "login.html";
  }, 200);
}
</script>
</body>
</html>
