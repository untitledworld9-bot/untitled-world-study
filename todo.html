<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Todo List — Untitled World</title>

  <!-- Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES — Untitled World Brand Theme
    ============================================================ */
    :root {
      --bg-deep:        #070f1f;
      --bg-mid:         #0a1628;
      --bg-card:        rgba(255,255,255,0.04);
      --bg-card-hover:  rgba(255,255,255,0.07);
      --border:         rgba(0,230,200,0.18);
      --border-soft:    rgba(255,255,255,0.08);
      --teal:           #00e6c8;
      --teal-dim:       rgba(0,230,200,0.12);
      --teal-glow:      rgba(0,230,200,0.30);
      --teal-dark:      #00b8a0;
      --red-priority:   #ff4d6d;
      --red-dim:        rgba(255,77,109,0.12);
      --green-priority: #00d68f;
      --green-dim:      rgba(0,214,143,0.12);
      --text-primary:   #e8f4f2;
      --text-secondary: #7ea8a0;
      --text-muted:     #3d6060;
      --shadow-card:    0 8px 32px rgba(0,0,0,0.45);
      --shadow-glow:    0 0 24px rgba(0,230,200,0.18);
      --radius-card:    18px;
      --radius-pill:    999px;
      --font-display:   'Syne', sans-serif;
      --font-body:      'DM Sans', sans-serif;
      --header-h:       68px;
      --safe-bottom:    env(safe-area-inset-bottom, 0px);
    }

    /* ============================================================
       RESET + BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overscroll-behavior: none; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      overflow-x: hidden;
      min-height: 100dvh;
    }

    /* Atmospheric mesh background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 90% 60% at 8% -5%,  rgba(0,230,200,0.06) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 95% 85%, rgba(0,100,140,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0,25,45,0.5)    0%, transparent 70%),
        linear-gradient(155deg, #070f1f 0%, #0c1e30 45%, #081620 100%);
    }

    /* ============================================================
       STICKY HEADER
    ============================================================ */
    .app-header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px;
      background: rgba(7,15,31,0.84);
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 32px rgba(0,0,0,0.4), 0 1px 0 rgba(0,230,200,0.05);
    }

    .header-left { display: flex; align-items: center; gap: 11px; }

    .header-icon {
      width: 40px; height: 40px;
      background: var(--teal-dim);
      border: 1px solid var(--border);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 14px var(--teal-glow);
      color: var(--teal);
    }

    .header-title-group { line-height: 1.25; }
    .header-app-name {
      font-family: var(--font-display);
      font-size: 9.5px; font-weight: 700;
      letter-spacing: 2.2px; text-transform: uppercase;
      color: var(--teal); opacity: 0.65;
    }
    .header-page-title {
      font-family: var(--font-display);
      font-size: 17px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -0.4px;
    }

    .header-right { display: flex; align-items: center; gap: 9px; }

    /* Header counter */
    .task-counter-pill {
      padding: 5px 11px;
      background: var(--bg-card); border: 1px solid var(--border-soft);
      border-radius: var(--radius-pill);
      font-size: 11px; font-weight: 500; color: var(--text-secondary);
    }
    .task-counter-pill b { color: var(--teal); font-weight: 700; }

    /* XP badge */
    .xp-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 13px;
      background: var(--teal-dim); border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      cursor: pointer; transition: all 0.2s ease;
    }
    .xp-badge:hover { background: rgba(0,230,200,0.2); box-shadow: var(--shadow-glow); }
    .xp-badge svg   { color: var(--teal); }
    .xp-val {
      font-family: var(--font-display);
      font-size: 13px; font-weight: 700; color: var(--teal);
    }

    /* ============================================================
       XP TOAST
    ============================================================ */
    .xp-toast {
      position: fixed;
      top: calc(var(--header-h) + 14px);
      left: 50%; transform: translateX(-50%) translateY(-16px);
      z-index: 500;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      background: rgba(10,22,40,0.95);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      box-shadow: 0 8px 30px rgba(0,0,0,0.5), var(--shadow-glow);
      font-family: var(--font-display);
      font-size: 14px; font-weight: 700; color: var(--teal);
      opacity: 0; pointer-events: none;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .xp-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .xp-toast svg { color: var(--teal); }

    /* ============================================================
       MAIN SCROLL CONTAINER
    ============================================================ */
    .main-scroll {
      position: relative; z-index: 1;
      padding-top: calc(var(--header-h) + 0px);
      padding-bottom: calc(96px + var(--safe-bottom));
      min-height: 100dvh;
    }

    /* ============================================================
       TAB BAR
    ============================================================ */
    .tab-bar-wrap {
      position: sticky; top: var(--header-h); z-index: 90;
      background: rgba(7,15,31,0.8);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border-soft);
      padding: 0 14px;
    }

    .tab-bar {
      display: flex; gap: 4px;
      overflow-x: auto; scrollbar-width: none;
      padding: 10px 0;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      border: 1px solid transparent; background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
      transition: all 0.22s ease;
    }
    .tab-btn:hover { color: var(--text-secondary); background: var(--bg-card); }
    .tab-btn.active {
      background: var(--teal-dim); border-color: var(--border);
      color: var(--teal);
      box-shadow: 0 0 18px var(--teal-glow);
    }

    .tab-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px;
      border-radius: var(--radius-pill);
      background: var(--teal); color: var(--bg-deep);
      font-size: 10px; font-weight: 700;
    }
    .tab-btn:not(.active) .tab-count { background: var(--text-muted); opacity: 0.5; }

    /* ============================================================
       CONTENT PANELS
    ============================================================ */
    .content-panel { display: none; padding: 18px 16px 0; }
    .content-panel.active { display: block; animation: fadeSlideUp 0.3s ease; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       NOTIFICATION PERMISSION BANNER
    ============================================================ */
    .notif-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 15px; margin-bottom: 14px;
      background: linear-gradient(135deg, rgba(0,230,200,0.08), rgba(0,80,100,0.06));
      border: 1px solid var(--border); border-radius: var(--radius-card);
    }
    .notif-banner svg { color: var(--teal); flex-shrink: 0; }
    .notif-banner-body { flex: 1; }
    .notif-banner-title { font-weight: 600; font-size: 13px; color: var(--text-primary); margin-bottom: 2px; }
    .notif-banner-sub   { font-size: 11px; color: var(--text-secondary); }
    .notif-allow-btn {
      flex-shrink: 0; padding: 7px 14px;
      background: var(--teal-dim); border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--teal); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease;
    }
    .notif-allow-btn:hover { background: rgba(0,230,200,0.2); }

    /* ============================================================
       REMINDER CARD
    ============================================================ */
    .reminder-card {
      background: var(--bg-card); border: 1px solid var(--border-soft);
      border-radius: var(--radius-card);
      padding: 15px 16px; margin-bottom: 18px;
    }
    .reminder-card-title {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-display); font-size: 13px; font-weight: 700;
      color: var(--text-primary); margin-bottom: 12px;
    }
    .reminder-card-title svg { color: var(--teal); }

    .reminder-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 0; border-top: 1px solid var(--border-soft);
    }
    .reminder-row-label { font-size: 13px; color: var(--text-secondary); }
    .reminder-row-right { display: flex; align-items: center; gap: 10px; }

    .time-input-mini {
      width: 82px; padding: 5px 9px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border-soft);
      border-radius: 10px; text-align: center;
      font-family: var(--font-body); font-size: 12px; color: var(--text-primary);
      outline: none; transition: all 0.2s ease;
    }
    .time-input-mini:focus { border-color: var(--teal); box-shadow: 0 0 0 2px rgba(0,230,200,0.1); }

    /* Toggle */
    .toggle { position: relative; width: 44px; height: 24px; cursor: pointer; }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute; inset: 0;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.08); border: 1px solid var(--border-soft);
      transition: all 0.25s ease; cursor: pointer;
    }
    .toggle-track::after {
      content: ''; position: absolute;
      top: 3px; left: 3px; width: 16px; height: 16px;
      border-radius: 50%; background: var(--text-muted);
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toggle input:checked + .toggle-track {
      background: var(--teal-dim); border-color: var(--teal);
      box-shadow: 0 0 10px var(--teal-glow);
    }
    .toggle input:checked + .toggle-track::after { transform: translateX(20px); background: var(--teal); }

    /* ============================================================
       SECTION HEADER
    ============================================================ */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; padding: 0 2px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 15px; font-weight: 700; color: var(--text-primary);
      display: flex; align-items: center; gap: 9px;
    }
    .section-badge {
      font-size: 11px; font-weight: 700;
      padding: 2px 9px; border-radius: var(--radius-pill);
      background: var(--teal-dim); border: 1px solid rgba(0,230,200,0.22);
      color: var(--teal);
    }

    /* ============================================================
       CALENDAR STRIP (Upcoming)
    ============================================================ */
    .strip-month {
      font-family: var(--font-display);
      font-size: 12px; font-weight: 600;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--text-secondary); margin-bottom: 10px; padding: 0 2px;
    }
    .calendar-strip {
      display: flex; gap: 8px;
      overflow-x: auto; scrollbar-width: none;
      padding-bottom: 4px; margin-bottom: 18px;
    }
    .calendar-strip::-webkit-scrollbar { display: none; }

    .strip-day {
      flex-shrink: 0; width: 54px; height: 70px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      border-radius: 16px; border: 1px solid var(--border-soft);
      background: var(--bg-card); cursor: pointer;
      transition: all 0.22s ease;
    }
    .strip-day:hover { background: var(--bg-card-hover); border-color: var(--border); }
    .strip-day.active {
      background: var(--teal-dim); border-color: var(--teal);
      box-shadow: 0 0 20px var(--teal-glow);
    }
    .strip-day-name {
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--text-muted);
    }
    .strip-day-num {
      font-family: var(--font-display);
      font-size: 19px; font-weight: 700; color: var(--text-secondary);
    }
    .strip-day-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; }
    .strip-day.active .strip-day-name { color: var(--teal); }
    .strip-day.active .strip-day-num  { color: var(--teal); }
    .strip-day.has-tasks .strip-day-dot { background: var(--teal); }
    .strip-day.active.has-tasks .strip-day-dot { background: var(--teal); }

    /* ============================================================
       CALENDAR GRID (Calendar tab)
    ============================================================ */
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .cal-nav-btn {
      width: 38px; height: 38px; border-radius: 12px;
      border: 1px solid var(--border-soft); background: var(--bg-card);
      color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s ease;
    }
    .cal-nav-btn:hover { border-color: var(--border); color: var(--teal); background: var(--teal-dim); }
    .cal-nav-title {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700; color: var(--text-primary);
    }

    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px; margin-bottom: 8px;
    }
    .cal-weekdays span {
      text-align: center; font-size: 10px; font-weight: 700;
      letter-spacing: 0.4px; text-transform: uppercase;
      color: var(--text-muted); padding: 4px 0;
    }

    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;
      margin-bottom: 22px;
    }
    .cal-cell {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      border-radius: 11px;
      font-family: var(--font-display); font-size: 14px; font-weight: 600;
      color: var(--text-secondary); cursor: pointer;
      position: relative; transition: all 0.18s ease;
    }
    .cal-cell:hover:not(.empty) { background: var(--bg-card-hover); color: var(--text-primary); }
    .cal-cell.empty { cursor: default; pointer-events: none; }
    .cal-cell.today { color: var(--teal); }
    .cal-cell.selected { background: var(--teal); color: var(--bg-deep); box-shadow: 0 0 14px var(--teal-glow); }
    .cal-cell.has-tasks::after {
      content: ''; position: absolute; bottom: 4px;
      width: 4px; height: 4px; border-radius: 50%; background: var(--teal);
    }
    .cal-cell.selected.has-tasks::after { background: var(--bg-deep); }

    /* ============================================================
       TASKS LIST
    ============================================================ */
    .tasks-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }

    /* ============================================================
       TASK CARD
    ============================================================ */
    .task-card {
      position: relative; overflow: hidden;
      background: var(--bg-card); border: 1px solid var(--border-soft);
      border-radius: var(--radius-card);
      display: flex; align-items: flex-start; gap: 13px;
      padding: 14px 14px 14px 18px;
      cursor: default; user-select: none;
      transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }
    .task-card:hover { background: var(--bg-card-hover); border-color: var(--border); box-shadow: var(--shadow-card); }

    /* Priority left strip */
    .task-card::before {
      content: ''; position: absolute;
      left: 0; top: 10px; bottom: 10px; width: 3px;
      border-radius: 0 3px 3px 0; background: transparent;
      transition: background 0.25s ease;
    }
    .task-card.priority-green::before { background: var(--green-priority); box-shadow: 0 0 8px rgba(0,214,143,0.4); }
    .task-card.priority-red::before   { background: var(--red-priority);   box-shadow: 0 0 8px rgba(255,77,109,0.4); }

    /* Swipe delete background */
    .swipe-bg {
      position: absolute; right: 0; top: 0; bottom: 0; width: 90px;
      background: linear-gradient(90deg, transparent, rgba(255,77,109,0.8));
      border-radius: 0 var(--radius-card) var(--radius-card) 0;
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 20px; opacity: 0; pointer-events: none;
      transition: opacity 0.15s ease;
      color: #fff;
    }

    /* Completion flash */
    @keyframes completeFlash {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.02); border-color: var(--teal); box-shadow: 0 0 22px var(--teal-glow); }
      100% { transform: scale(1); }
    }
    @keyframes uncompleteFlash {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.98); }
      100% { transform: scale(1); }
    }
    .task-card.completing   { animation: completeFlash 0.45s ease forwards; }
    .task-card.uncompleting { animation: uncompleteFlash 0.3s ease forwards; }

    /* Custom Checkbox */
    .cb-wrap { flex-shrink: 0; padding-top: 1px; }
    .cb-input { display: none; }
    .cb-ui {
      width: 23px; height: 23px; border-radius: 7px;
      border: 2px solid var(--text-muted); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cb-ui svg { opacity: 0; transform: scale(0); color: var(--bg-deep); transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
    .cb-input:checked + .cb-ui { background: var(--teal); border-color: var(--teal); box-shadow: 0 0 12px var(--teal-glow); }
    .cb-input:checked + .cb-ui svg { opacity: 1; transform: scale(1); }

    /* Task body */
    .task-body { flex: 1; min-width: 0; }
    .task-name {
      font-size: 14.5px; font-weight: 500; color: var(--text-primary);
      line-height: 1.45; word-break: break-word;
      transition: all 0.3s ease;
    }
    .task-name.done { text-decoration: line-through; color: var(--text-muted); opacity: 0.55; }

    .task-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; margin-top: 7px; }

    .meta-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 9px; border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.04); border: 1px solid var(--border-soft);
      font-size: 11px; font-weight: 500; color: var(--text-secondary);
    }
    .meta-chip svg { opacity: 0.55; }

    .priority-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 9px; border-radius: var(--radius-pill);
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.2px;
    }
    .priority-chip.green { background: var(--green-dim); border: 1px solid rgba(0,214,143,0.2); color: var(--green-priority); }
    .priority-chip.red   { background: var(--red-dim);   border: 1px solid rgba(255,77,109,0.2); color: var(--red-priority); }

    /* Task action buttons */
    .task-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .task-action-btn {
      width: 30px; height: 30px; border-radius: 9px;
      border: 1px solid var(--border-soft); background: transparent;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s ease;
    }
    .task-action-btn:hover { background: var(--bg-card-hover); border-color: var(--border); color: var(--text-secondary); }
    .task-action-btn.edit:hover   { color: var(--teal); background: var(--teal-dim); border-color: var(--border); }
    .task-action-btn.delete:hover { color: var(--red-priority); background: var(--red-dim); border-color: rgba(255,77,109,0.25); }

    /* ============================================================
       EMPTY STATE
    ============================================================ */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      padding: 44px 24px; gap: 13px;
      animation: fadeSlideUp 0.4s ease;
    }
    .empty-icon {
      width: 82px; height: 82px; border-radius: 24px;
      background: var(--bg-card); border: 1px solid var(--border-soft);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 28px rgba(0,0,0,0.3);
    }
    .empty-icon svg { color: var(--teal); opacity: 0.4; }
    .empty-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text-secondary); }
    .empty-sub  { font-size: 13px; color: var(--text-muted); text-align: center; max-width: 210px; line-height: 1.65; }
    .empty-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      background: var(--teal-dim); border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--teal); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.22s ease;
    }
    .empty-btn:hover { background: rgba(0,230,200,0.2); box-shadow: var(--shadow-glow); }

    /* ============================================================
       FAB
    ============================================================ */
    .fab {
      position: fixed;
      bottom: calc(76px + var(--safe-bottom)); right: 20px;
      z-index: 200;
      width: 58px; height: 58px; border-radius: 50%;
      border: none; background: var(--teal); color: var(--bg-deep);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(0,230,200,0.45);
      animation: fabPulse 3s ease-in-out infinite;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes fabPulse {
      0%,100% { box-shadow: 0 4px 22px rgba(0,230,200,0.45), 0 0 0 0 rgba(0,230,200,0.18); }
      50%      { box-shadow: 0 4px 22px rgba(0,230,200,0.45), 0 0 0 11px rgba(0,230,200,0); }
    }
    .fab:hover { transform: scale(1.1); background: #00ffdd; animation: none; box-shadow: 0 6px 30px rgba(0,230,200,0.6); }
    .fab:active { transform: scale(0.93); }
    .fab svg { transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
    .fab.open svg { transform: rotate(45deg); }

    /* ============================================================
       MODAL OVERLAY + SHEET
    ============================================================ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.28s ease;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }

    .modal-sheet {
      width: 100%; max-width: 520px;
      background: linear-gradient(155deg, #0e1e30 0%, #091523 100%);
      border: 1px solid var(--border); border-bottom: none;
      border-radius: 28px 28px 0 0;
      max-height: 90dvh; overflow-y: auto; scrollbar-width: none;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
      box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
      padding-bottom: calc(24px + var(--safe-bottom));
    }
    .modal-sheet::-webkit-scrollbar { display: none; }
    .modal-overlay.show .modal-sheet { transform: translateY(0); }

    .modal-handle { width: 42px; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.1); margin: 14px auto 0; }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border-soft);
    }
    .modal-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .modal-close {
      width: 32px; height: 32px; border-radius: 10px;
      border: 1px solid var(--border-soft); background: var(--bg-card);
      color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s ease;
    }
    .modal-close:hover { color: var(--red-priority); border-color: rgba(255,77,109,0.28); background: var(--red-dim); }

    .modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 18px; }

    /* Form fields */
    .field-group { display: flex; flex-direction: column; gap: 8px; }
    .field-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.9px;
      text-transform: uppercase; color: var(--text-secondary);
    }
    .field-input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border-soft);
      border-radius: 14px; padding: 12px 14px;
      font-family: var(--font-body); font-size: 15px; color: var(--text-primary);
      outline: none; resize: none; transition: all 0.2s ease;
    }
    .field-input::placeholder { color: var(--text-muted); }
    .field-input:focus { border-color: var(--teal); background: rgba(0,230,200,0.03); box-shadow: 0 0 0 3px rgba(0,230,200,0.09); }

    .datetime-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

    /* Priority */
    .priority-row { display: flex; gap: 9px; }
    .p-opt { flex: 1; position: relative; }
    .p-opt input { display: none; }
    .p-opt label {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 11px 10px;
      border-radius: 14px; border: 1px solid var(--border-soft);
      background: var(--bg-card); color: var(--text-secondary);
      font-size: 12.5px; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease;
    }
    .p-opt.p-none  label:hover { background: rgba(255,255,255,0.07); }
    .p-opt.p-green label:hover { background: var(--green-dim); border-color: rgba(0,214,143,0.28); color: var(--green-priority); }
    .p-opt.p-red   label:hover { background: var(--red-dim);   border-color: rgba(255,77,109,0.28);  color: var(--red-priority); }
    .p-opt.p-none  input:checked + label { background: rgba(255,255,255,0.07); border-color: var(--border); color: var(--text-secondary); }
    .p-opt.p-green input:checked + label { background: var(--green-dim); border-color: var(--green-priority); color: var(--green-priority); box-shadow: 0 0 14px rgba(0,214,143,0.22); }
    .p-opt.p-red   input:checked + label { background: var(--red-dim);   border-color: var(--red-priority);   color: var(--red-priority);   box-shadow: 0 0 14px rgba(255,77,109,0.22); }

    /* Save button */
    .save-btn {
      width: 100%; padding: 15px;
      border-radius: 16px; border: none;
      background: var(--teal); color: var(--bg-deep);
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(0,230,200,0.28);
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .save-btn:hover { background: #00ffdd; box-shadow: 0 6px 30px rgba(0,230,200,0.5); transform: translateY(-1px); }
    .save-btn:active { transform: scale(0.97); }

    /* ============================================================
       UTILITY
    ============================================================ */
    .hidden { display: none !important; }

    /* Desktop tweaks */
    @media (min-width: 520px) {
      .modal-overlay { align-items: center; }
      .modal-sheet { border-radius: 28px; border-bottom: 1px solid var(--border); margin: 20px; max-height: 86dvh; }
    }
    @media (min-width: 768px) {
      .fab { bottom: 30px; }
      .main-scroll { padding-bottom: 120px; }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 5px; }
    }
  </style>
</head>
<body>

  <!-- ====================== HEADER ====================== -->
  <header class="app-header">
    <div class="header-left">
      <div class="header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
      <div class="header-title-group">
        <div class="header-page-title">Your Todo List</div>
      </div>
    </div>
    <div class="header-right">

      <div class="xp-badge" id="xpBadge">

  <!-- ====================== XP TOAST ====================== -->

  <!-- ====================== MAIN SCROLL ====================== -->
  <div class="main-scroll">

    <!-- TAB BAR -->
    <div class="tab-bar-wrap">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="today" onclick="switchTab('today')">

            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>

        <button class="tab-btn" data-tab="tomorrow" onclick="switchTab('tomorrow')">

            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>

            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
          </svg>
          Upcoming <span class="tab-count" id="cnt-upcoming">0</span>
        </button>
        <button class="tab-btn" data-tab="calendar" onclick="switchTab('calendar')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>

    <!-- ===== TODAY PANEL ===== -->
    <div class="content-panel active" id="panel-today">

      <!-- Notification permission banner -->
      <div class="notif-banner hidden" id="notifBanner">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>

        <div class="notif-banner-body">
          <div class="notif-banner-title">Enable Notifications</div>
          <div class="notif-banner-sub">Stay on top of your tasks with smart reminders</div>

        <button class="notif-allow-btn" onclick="requestNotifPermission()">Allow</button>
      </div>

      <div class="reminder-card">
        <div class="reminder-card-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          Daily Reminders
        </div>
        <div class="reminder-row">
          <div class="reminder-row-label">Morning Reminder</div>

            <label class="toggle">
              <input type="checkbox" id="morningToggle" onchange="saveReminderSettings()" />
              <div class="toggle-track"></div>

          <div class="reminder-row-label">Evening Reminder</div>
          <div class="reminder-row-right">

            <label class="toggle">
              <input type="checkbox" id="eveningToggle" onchange="saveReminderSettings()" />

        <div class="cal-nav-title" id="calNavTitle"></div>

      <div class="cal-grid" id="calGrid"></div>
      <div class="section-header">
        <div class="section-title">

  <!-- ====================== FAB ====================== -->
  <button class="fab" id="fab" onclick="openModal()" aria-label="Add task">

      <line x1="12" y1="5" x2="12" y2="19"/>

  <!-- ====================== MODAL ====================== -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal-sheet" id="modalSheet">

      <div class="modal-header">
        <div class="modal-title" id="modalTitle">New Task</div>

      <div class="modal-body">

        <!-- Task name textarea -->

          <textarea class="field-input" id="taskName" rows="2" placeholder="What needs to be done?"></textarea>

        <!-- Date + Time -->
        <div class="datetime-row">

            <label class="field-label">Date</label>
            <input type="date" class="field-input" id="taskDate" />
          </div>
          <div class="field-group">
            <label class="field-label">Time (optional)</label>

        <!-- Priority -->
        <div class="field-group">

            <div class="p-opt p-none">
              <input type="radio" name="prio" id="pNone" value="none" checked />
              <label for="pNone">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                None
              </label>
            </div>
            <div class="p-opt p-green">
              <input type="radio" name="prio" id="pGreen" value="green" />
              <label for="pGreen">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="var(--green-priority)"><circle cx="12" cy="12" r="10"/></svg>
                Important
              </label>

            <div class="p-opt p-red">
              <input type="radio" name="prio" id="pRed" value="red" />
              <label for="pRed">

            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Save Task
        </button>

      </div>

  <!-- ====================== JAVASCRIPT ====================== -->
  <script>
    /* ============================================================
       CONSTANTS & STATE
    ============================================================ */
    const STORAGE_TASKS    = 'uw_tasks_v2';
    const STORAGE_XP       = 'uw_xp';          // Shared key with existing app XP system
    const STORAGE_REMIND   = 'uw_reminders';
    const STORAGE_BONUS    = 'uw_todo_daily_bonus';

    let tasks     = [];            // Array of task objects
    let editingId = null;          // ID of task being edited (null = new)
    let calMonth  = new Date();    // Month displayed in calendar grid
    let calSel    = todayKey();    // Currently selected calendar date (YYYY-MM-DD)
    let notifTimers = {};          // taskId → setTimeout handle

    /* ============================================================
       DATE HELPERS
    ============================================================ */
    // Returns "YYYY-MM-DD" in LOCAL time
    function dateKey(d) {
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }
    function pad(n) { return String(n).padStart(2,'0'); }
    function todayKey()    { return dateKey(new Date()); }
    function tomorrowKey() { const d=new Date(); d.setDate(d.getDate()+1); return dateKey(d); }

    // Parse "YYYY-MM-DD" as a LOCAL date (avoids UTC off-by-one)
    function parseDate(str) {
      const [y,m,d] = str.split('-').map(Number);
      return new Date(y, m-1, d);
    }

    function friendlyDate(str) {
      if (!str) return '';
      if (str === todayKey())    return 'Today';
      if (str === tomorrowKey()) return 'Tomorrow';
      return parseDate(str).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    }

    function fmt12(t) {
      if (!t) return '';
      const [h,m] = t.split(':').map(Number);
      return `${h%12||12}:${pad(m)} ${h>=12?'PM':'AM'}`;
    }

    /* ============================================================
       XP SYSTEM — shares 'uw_xp' key with existing app dashboard
    ============================================================ */
    function getXP() { return parseInt(localStorage.getItem(STORAGE_XP)||'0',10); }

    function setXP(v) {
      v = Math.max(0, v);
      localStorage.setItem(STORAGE_XP, String(v));
      document.getElementById('xpDisplay').textContent = v + ' XP';
      // Fire event so the home dashboard can react in real-time
      window.dispatchEvent(new CustomEvent('uw_xp_changed', { detail: { xp: v } }));
    }

    function addXP(amount, label) {
      setXP(getXP() + amount);
      showXPToast(label || `+${amount} XP`);
    }

    function removeXP(amount) { setXP(getXP() - amount); }

    function showXPToast(msg) {
      const t = document.getElementById('xpToast');
      document.getElementById('xpToastMsg').textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Called after every task completion toggle
    function handleXP(task, wasDone) {
      if (task.done && !wasDone) {
        // Completing → award +2 XP once
        if (!task.xpAwarded) {
          task.xpAwarded = true;
          addXP(2, '+2 XP');
          checkDailyBonus();
        }
      } else if (!task.done && wasDone) {
        // Unchecking → revoke +2 XP if it was awarded
        if (task.xpAwarded) {
          task.xpAwarded = false;
          removeXP(2);
        }
      }
    }

    // Award +10 XP when 5 tasks are completed on the same calendar day
    function checkDailyBonus() {
      const today = todayKey();
      const bonuses = JSON.parse(localStorage.getItem(STORAGE_BONUS)||'{}');
      if (bonuses[today]) return; // already given today

      const completedToday = tasks.filter(t => t.date === today && t.done).length;
      if (completedToday >= 5) {
        bonuses[today] = true;
        localStorage.setItem(STORAGE_BONUS, JSON.stringify(bonuses));
        setTimeout(() => addXP(10, '🎯 Bonus +10 XP!'), 800);
      }
    }

    /* ============================================================
       STORAGE
    ============================================================ */
    function loadTasks() {
      try { tasks = JSON.parse(localStorage.getItem(STORAGE_TASKS)||'[]'); }
      catch { tasks = []; }
    }

    function saveTasks() { localStorage.setItem(STORAGE_TASKS, JSON.stringify(tasks)); }

    function loadReminders() {
      try {
        const s = JSON.parse(localStorage.getItem(STORAGE_REMIND)||'{}');
        document.getElementById('morningToggle').checked = !!s.morningOn;
        document.getElementById('eveningToggle').checked  = !!s.eveningOn;
        if (s.morningTime) document.getElementById('morningTime').value = s.morningTime;
        if (s.eveningTime)  document.getElementById('eveningTime').value  = s.eveningTime;
      } catch {}
    }

    function saveReminderSettings() {
      const s = {
        morningOn:   document.getElementById('morningToggle').checked,
        eveningOn:    document.getElementById('eveningToggle').checked,
        morningTime:  document.getElementById('morningTime').value,
        eveningTime:  document.getElementById('eveningTime').value,
      };
      localStorage.setItem(STORAGE_REMIND, JSON.stringify(s));
      scheduleReminders();
    }

    /* ============================================================
       NOTIFICATIONS
    ============================================================ */
    function requestNotifPermission() {
      if (!('Notification' in window)) return;
      Notification.requestPermission().then(p => {
        if (p === 'granted') {
          document.getElementById('notifBanner').classList.add('hidden');
          scheduleTaskNotifs();
          scheduleReminders();
        }
      });
    }

    function checkNotifBanner() {
      if (!('Notification' in window)) return;
      if (Notification.permission !== 'granted')
        document.getElementById('notifBanner').classList.remove('hidden');
    }

    // Use the existing app notification system if available, otherwise fall back
    function fireNotif(title, body) {
      if (Notification.permission !== 'granted') return;
      if (typeof window.showUWNotification === 'function') {
        window.showUWNotification(title, body); return;
      }
            // Add data url so the service worker knows where to go
      const options = { 
          body, 
          icon: '/icon-192.png', 
          tag: 'uw-todo-' + Date.now(),
          data: { url: "/todo.html" } // NAYA LINE
      };

      try {
        new Notification(title, options);
      } catch {
        navigator.serviceWorker?.ready.then(r => r.showNotification(title, options));
      }
    }

    // Schedule per-task time alerts
    function scheduleTaskNotifs() {
      Object.values(notifTimers).forEach(clearTimeout);
      notifTimers = {};
      const now = Date.now();
      tasks.forEach(task => {
        if (task.done || !task.date || !task.time) return;
        const [h,m] = task.time.split(':').map(Number);
        const d = parseDate(task.date);
        d.setHours(h, m, 0, 0);
        const ms = d.getTime() - now;
        if (ms > 0 && ms < 7*86400000) {
          notifTimers[task.id] = setTimeout(() => {
            if (!task.done) fireNotif('Reminder 🔔', `Your Task\n${task.name}\n\nTask Time Reached`);
          }, ms);
        }
      });
    }

    // Daily reminder schedulers
    function scheduleReminders() {
      clearTimeout(window._rMorning); clearTimeout(window._rEvening);
      const s = JSON.parse(localStorage.getItem(STORAGE_REMIND)||'{}');
      if (s.morningOn) scheduleOneReminder(s.morningTime||'08:00', 'm');
      if (s.eveningOn)  scheduleOneReminder(s.eveningTime ||'20:00', 'e');
    }

    function scheduleOneReminder(timeStr, slot) {
      const now = new Date(), [h,m] = timeStr.split(':').map(Number);
      const fire = new Date(now); fire.setHours(h,m,0,0);
      if (fire <= now) fire.setDate(fire.getDate()+1);
      const timer = setTimeout(() => {
        const inc = tasks.filter(t => t.date === todayKey() && !t.done).length;
        if (inc) fireNotif('Untitled World', `You have ${inc} incomplete task${inc>1?'s':''} today.`);
        scheduleOneReminder(timeStr, slot); // reschedule for next day
      }, fire - now);
      if (slot==='m') window._rMorning = timer; else window._rEvening = timer;
    }

    /* ============================================================
       MODAL: OPEN / CLOSE / SAVE
    ============================================================ */
    function openModal(id) {
      editingId = id || null;
      const fab = document.getElementById('fab');

      if (editingId) {
        const t = tasks.find(x => x.id === editingId);
        document.getElementById('modalTitle').textContent = 'Edit Task';
        document.getElementById('taskName').value = t.name;
        document.getElementById('taskDate').value = t.date||'';
        document.getElementById('taskTime').value = t.time||'';
        document.querySelector(`input[name="prio"][value="${t.priority||'none'}"]`).checked = true;
      } else {
        document.getElementById('modalTitle').textContent = 'New Task';
        document.getElementById('taskName').value = '';
        document.getElementById('taskDate').value = todayKey();
        document.getElementById('taskTime').value = '';
        document.querySelector('input[name="prio"][value="none"]').checked = true;
      }

      document.getElementById('modalOverlay').classList.add('show');
      fab.classList.add('open');
      setTimeout(() => document.getElementById('taskName').focus(), 350);
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
      document.getElementById('fab').classList.remove('open');
      editingId = null;
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    function saveTask() {
      const nameEl = document.getElementById('taskName');
      const name = nameEl.value.trim();
      if (!name) {
        nameEl.style.borderColor = 'var(--red-priority)';
        nameEl.style.boxShadow   = '0 0 0 3px rgba(255,77,109,0.15)';
        setTimeout(() => { nameEl.style.borderColor=''; nameEl.style.boxShadow=''; }, 1600);
        nameEl.focus(); return;
      }

      const date     = document.getElementById('taskDate').value;
      const time     = document.getElementById('taskTime').value;
      const priority = document.querySelector('input[name="prio"]:checked').value;

      if (editingId) {
        const idx = tasks.findIndex(x => x.id === editingId);
        if (idx > -1) tasks[idx] = { ...tasks[idx], name, date, time, priority };
      } else {
        tasks.push({
          id: 'task_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
          name, date, time, priority, done: false, xpAwarded: false, createdAt: Date.now()
        });
      }

      saveTasks();
      closeModal();
      renderAll();
      scheduleTaskNotifs();
    }

    /* ============================================================
       TASK TOGGLE & DELETE
    ============================================================ */
    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      const wasDone = task.done;
      task.done = !task.done;

      handleXP(task, wasDone);
      saveTasks();

      // Play completion animation on the card
      const card = document.querySelector(`[data-task-id="${id}"]`);
      if (card) {
        card.classList.add(task.done ? 'completing' : 'uncompleting');
        card.addEventListener('animationend', () =>
          card.classList.remove('completing','uncompleting'), { once: true });
      }

      // Notify if task is still incomplete (unchecked while today)
      if (!task.done && task.date === todayKey() && Notification.permission === 'granted') {
        fireNotif('Untitled World', `Your Task\n${task.name}\n\nIncomplete`);
      }

      renderAll();
    }

    function deleteTask(id) {
      const idx = tasks.findIndex(t => t.id === id);
      if (idx < 0) return;
      if (tasks[idx].xpAwarded) removeXP(2); // revoke XP if awarded
      tasks.splice(idx, 1);
      saveTasks(); renderAll(); scheduleTaskNotifs();
    }

    /* ============================================================
       SWIPE TO DELETE (Touch)
    ============================================================ */
    function attachSwipe(card, id) {
      let sx=0, dx=0, active=false;
      const bg = card.querySelector('.swipe-bg');

      card.addEventListener('touchstart', e => { sx=e.touches[0].clientX; active=true; }, {passive:true});
      card.addEventListener('touchmove', e => {
        if (!active) return;
        dx = e.touches[0].clientX - sx;
        if (dx < 0) {
          card.style.transform = `translateX(${Math.max(dx,-100)}px)`;
          bg.style.opacity = Math.min(Math.abs(dx)/80, 1);
        }
      }, {passive:true});
      card.addEventListener('touchend', () => {
        active = false;
        if (dx < -80) {
          card.style.transition = 'all 0.3s ease';
          card.style.transform  = 'translateX(-120%)';
          card.style.opacity    = '0';
          setTimeout(() => deleteTask(id), 290);
        } else {
          card.style.transform = '';
          bg.style.opacity     = '0';
        }
        dx = 0;
      });
    }

    /* ============================================================
       BUILD TASK CARD DOM
    ============================================================ */
    function buildCard(task) {
      const card = document.createElement('div');
      card.className = 'task-card' + (task.priority&&task.priority!=='none' ? ' priority-'+task.priority : '');
      card.dataset.taskId = task.id;

      // Swipe delete background
      const bg = document.createElement('div');
      bg.className = 'swipe-bg';
      bg.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
      </svg>`;
      card.appendChild(bg);

      // Checkbox
      const cbWrap = document.createElement('div');
      cbWrap.className = 'cb-wrap';
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'cb-input';
      cb.id = 'cb_'+task.id; cb.checked = task.done;
      cb.addEventListener('change', () => toggleTask(task.id));
      const cbUi = document.createElement('label');
      cbUi.className = 'cb-ui'; cbUi.htmlFor = 'cb_'+task.id;
      cbUi.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
      cbWrap.appendChild(cb); cbWrap.appendChild(cbUi);
      card.appendChild(cbWrap);

      // Body
      const body = document.createElement('div');
      body.className = 'task-body';

      const nameEl = document.createElement('div');
      nameEl.className = 'task-name' + (task.done ? ' done' : '');
      nameEl.textContent = task.name;
      body.appendChild(nameEl);

      const meta = document.createElement('div');
      meta.className = 'task-meta';

      if (task.time) meta.innerHTML += `<span class="meta-chip">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${fmt12(task.time)}</span>`;

      if (task.date) meta.innerHTML += `<span class="meta-chip">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ${friendlyDate(task.date)}</span>`;

      if (task.priority && task.priority!=='none') {
        const labels = { green:'Important', red:'Very Important' };
        meta.innerHTML += `<span class="priority-chip ${task.priority}">
          <svg width="7" height="7" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
          ${labels[task.priority]}</span>`;
      }

      body.appendChild(meta);
      card.appendChild(body);

      // Action buttons
      const acts = document.createElement('div');
      acts.className = 'task-actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'task-action-btn edit'; editBtn.title = 'Edit task';
      editBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
      editBtn.addEventListener('click', e => { e.stopPropagation(); openModal(task.id); });

      const delBtn = document.createElement('button');
      delBtn.className = 'task-action-btn delete'; delBtn.title = 'Delete task';
      delBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`;
      delBtn.addEventListener('click', e => { e.stopPropagation(); deleteTask(task.id); });

      acts.appendChild(editBtn); acts.appendChild(delBtn);
      card.appendChild(acts);

      attachSwipe(card, task.id);
      return card;
    }

    function buildEmpty() {
      const div = document.createElement('div');
      div.className = 'empty-state';
      div.innerHTML = `
        <div class="empty-icon">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <div class="empty-title">All Clear!</div>
        <div class="empty-sub">No tasks yet. Tap the button below to add your first one.</div>
        <div class="empty-btn" onclick="openModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Task
        </div>`;
      return div;
    }

    /* ============================================================
       RENDER ALL PANELS
    ============================================================ */
    function renderList(containerId, list) {
      const c = document.getElementById(containerId);
      c.innerHTML = '';
      if (!list.length) { c.appendChild(buildEmpty()); return; }
      list.forEach(t => c.appendChild(buildCard(t)));
    }

    function renderAll() {
      const today    = todayKey();
      const tomorrow = tomorrowKey();

      const listToday    = tasks.filter(t => t.date === today);
      const listTomorrow = tasks.filter(t => t.date === tomorrow);
      const listUpcoming = tasks.filter(t => t.date && t.date > tomorrow);
      const listCal      = tasks.filter(t => t.date === calSel);

      renderList('list-today',    listToday);
      renderList('list-tomorrow', listTomorrow);
      renderList('list-upcoming', listUpcoming);
      renderList('list-calendar', listCal);

      // Tab counts
      document.getElementById('cnt-today').textContent    = listToday.length;
      document.getElementById('cnt-tomorrow').textContent = listTomorrow.length;
      document.getElementById('cnt-upcoming').textContent = listUpcoming.length;
      document.getElementById('cnt-calendar').textContent = listCal.length;

      // Section badges
      document.getElementById('badge-today').textContent    = listToday.length;
      document.getElementById('badge-tomorrow').textContent = listTomorrow.length;
      document.getElementById('badge-upcoming').textContent = listUpcoming.length;
      document.getElementById('badge-calendar').textContent = listCal.length;

      // Header counter
      document.getElementById('doneCount').textContent  = tasks.filter(t=>t.done).length;
      document.getElementById('totalCount').textContent = tasks.length;

      // XP display
      document.getElementById('xpDisplay').textContent = getXP() + ' XP';

      // Calendar elements
      renderStrip();
      renderCalGrid();
      document.getElementById('calDateLabel').textContent = friendlyDate(calSel)||'—';
    }

    /* ============================================================
       CALENDAR STRIP (Upcoming tab)
    ============================================================ */
    function renderStrip() {
      const strip = document.getElementById('calStrip');
      strip.innerHTML = '';
      const now = new Date();
      document.getElementById('stripMonth').textContent =
        now.toLocaleDateString('en-US', { month:'long', year:'numeric' });

      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      for (let i=2; i<30; i++) {
        const d = new Date(now); d.setDate(now.getDate()+i);
        const dk = dateKey(d);
        const hasTasks = tasks.some(t => t.date === dk);
        const cell = document.createElement('div');
        cell.className = 'strip-day' + (hasTasks?' has-tasks':'') + (dk===calSel?' active':'');
        cell.innerHTML = `
          <span class="strip-day-name">${days[d.getDay()]}</span>
          <span class="strip-day-num">${d.getDate()}</span>
          <span class="strip-day-dot"></span>`;
        cell.addEventListener('click', () => {
          calSel = dk;
          switchTab('calendar');
          renderAll();
        });
        strip.appendChild(cell);
      }
    }

    /* ============================================================
       CALENDAR GRID (Calendar tab)
    ============================================================ */
    function renderCalGrid() {
      const grid = document.getElementById('calGrid');
      const wd   = document.getElementById('calWeekdays');
      grid.innerHTML = '';
      const y = calMonth.getFullYear(), m = calMonth.getMonth();
      const todayStr = todayKey();

      document.getElementById('calNavTitle').textContent =
        new Date(y,m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});

      wd.innerHTML = ['Su','Mo','Tu','We','Th','Fr','Sa']
        .map(d=>`<span>${d}</span>`).join('');

      const firstDay = new Date(y,m,1).getDay();
      const lastDay  = new Date(y,m+1,0).getDate();

      for (let i=0; i<firstDay; i++) {
        const e=document.createElement('div'); e.className='cal-cell empty'; grid.appendChild(e);
      }
      for (let d=1; d<=lastDay; d++) {
        const dk = dateKey(new Date(y,m,d));
        const hasTasks = tasks.some(t=>t.date===dk);
        const cell = document.createElement('div');
        cell.className = 'cal-cell'+(hasTasks?' has-tasks':'')+(dk===todayStr?' today':'')+(dk===calSel?' selected':'');
        cell.textContent = d;
        cell.addEventListener('click', () => { calSel=dk; renderAll(); });
        grid.appendChild(cell);
      }
    }

    function changeMonth(dir) {
      calMonth.setMonth(calMonth.getMonth()+dir);
      renderCalGrid();
    }

    /* ============================================================
       TAB SWITCHING
    ============================================================ */
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tab===tab));
      document.querySelectorAll('.content-panel').forEach(p =>
        p.classList.toggle('active', p.id==='panel-'+tab));
      renderAll();
    }

    /* ============================================================
       KEYBOARD SHORTCUTS
    ============================================================ */
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
      if ((e.ctrlKey||e.metaKey) && e.key==='Enter') {
        if (document.getElementById('modalOverlay').classList.contains('show')) saveTask();
      }
    });

    /* ============================================================
       LISTEN FOR XP CHANGES FROM OTHER PAGES
       (e.g. if home dashboard updates XP, reflect here)
    ============================================================ */
    window.addEventListener('uw_xp_changed', () => {
      document.getElementById('xpDisplay').textContent = getXP() + ' XP';
    });

    /* ============================================================
       INIT
    ============================================================ */
    (function init() {
      loadTasks();
      loadReminders();
      checkNotifBanner();
      renderAll();
      scheduleTaskNotifs();
      scheduleReminders();
    })();
  </script>

</body>
